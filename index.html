<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRR Hospital Management System</title>
    <style>
        :root { --primary: #1b5e20; --accent: #c62828; --bg: #f4f7f6; }
        body { font-family: 'Calibri', sans-serif; background: var(--bg); margin: 0; padding: 10px; font-size: 12pt; color: #000; }
        
        /* Dashboard UI */
        .container { max-width: 1150px; margin: auto; background: white; padding: 20px; border-radius: 8px; border-top: 8px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 15px; }
        .center-side { text-align: center; flex: 2; overflow: hidden; }
        .center-side h1 { color: var(--accent); margin: 0; font-size: clamp(18px, 4vw, 28px); font-weight: bold; text-transform: uppercase; white-space: nowrap; }
        .doc-side { border: 2.5px solid #000; padding: 15px; text-align: center; background: #fffde7; min-width: 320px; border-radius: 4px; box-shadow: 3px 3px 0px #000; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1.5px solid #000; border-radius: 4px; font-size: 11pt; box-sizing: border-box; }
        
        .btn { padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-reg { background: var(--primary); color: white; width: 100%; font-size: 14pt; margin-top: 10px; }
        
        .btn-select { background: #2e7d32 !important; color: white !important; padding: 8px 16px; border-radius: 4px; border: none; font-weight: bold; transition: background 0.3s; }
        .btn-select:hover { background: #1b5e20 !important; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #263238; color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-weight: bold; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); overflow-y: auto; }
        .modal-content { background: white; margin: 2% auto; padding: 25px; width: 90%; max-width: 800px; border-radius: 12px; }

        /* PRINT SYSTEM */
        #printArea { display: none; }
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { display: block !important; position: absolute; left: 0; top: 0; width: 100%; }

            .print-page-wrapper {
                width: 21.59cm; height: 27.7cm; position: relative; margin: 0 auto; padding: 0.4cm 1cm;
                box-sizing: border-box; page-break-after: always; background: white !important;
                -webkit-print-color-adjust: exact !important; 
            }

            .watermark { 
                position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                opacity: 0.08 !important; width: 500px; z-index: 0 !important; display: block !important;
            }
            
            .print-main-content { position: relative; z-index: 10; }
            .print-footer-container { position: absolute; bottom: 0.1cm !important; left: 1cm; right: 1cm; z-index: 10; }

            .med-print-table th { 
                background: #333333 !important; color: #ffffff !important; padding: 8px; border: 2px solid #000; font-size: 14pt; -webkit-print-color-adjust: exact;
            }

            .print-vitals-box { background: #e8f5e9 !important; border: 2px solid #000; border-top: none; padding: 8px; display: flex; justify-content: space-between; font-size: 14pt; font-weight: 900; -webkit-print-color-adjust: exact; }
            .print-hospital-name h1 { white-space: nowrap !important; font-size: 26pt !important; }

            @page { size: letter; margin: 0 !important; }

            @media (max-width: 768px) {
                .print-page-wrapper { height: 27.5cm; padding: 0.2cm 0.4cm; }
                .print-hospital-name h1 { font-size: 20pt !important; }
            }
        }

        .print-header { display: flex; align-items: center; justify-content: space-between; border-bottom: 5px solid #1b5e20; padding-bottom: 5px; margin-bottom: 10px; position: relative; z-index: 10; }
        .print-hospital-name { text-align: center; flex: 1; }
        .print-hospital-name h1 { color: #c62828; margin: 0; font-weight: 900; }
        .print-doc-box { border: 2.5px solid #000 !important; padding: 8px; text-align: center; width: 300px; border-radius: 8px; }
        .print-data-box { border: 2px solid #000; padding: 8px; font-size: 14pt; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 5px; font-weight: bold; }
        .med-print-table { width: 100%; border-collapse: collapse; border: 2px solid #000; margin-top: 10px; }
        .med-print-table td { padding: 8px; border: 1px solid #000; font-size: 14pt; font-weight: bold; }
        .telugu-services { font-size: 9.8pt; color: #1b5e20; font-weight: bold; text-align: center; line-height: 1.3; margin-bottom: 5px; }
        .footer-banner { background: #1976d2 !important; color: white !important; padding: 10px; flex: 1; text-align: center; font-weight: bold; font-size: 14pt; border-radius: 6px; }
        .signature-right { text-align: right; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.jpg" style="width:90px">
        <div class="center-side">
            <h1>SRI RAJA RAJESHWARI HOSPITAL</h1>
            <p style="font-size:12px; font-weight:bold;">Suraram Colony, NTR Road, Opp: Ramaleela Maidanam, TG 500055</p>
        </div>
        <div class="doc-side">
            <b style="font-size: 20px;">DR. M. JAYACHANDER</b><br>
            <span>MBBS, M.D. (GENERAL MEDICINE)</span>
        </div>
    </div>

    <input type="hidden" id="current_opd_id" value="">

    <div class="grid">
        <input type="text" id="p_name" placeholder="Patient Name">
        <input type="number" id="p_age" placeholder="Age">
        <select id="p_sex"><option>Male</option><option>Female</option></select>
        <input type="text" id="p_phone" placeholder="Phone">
        <input type="text" id="p_address" placeholder="Address">
        <input type="text" id="p_weight" placeholder="Weight">
        <input type="text" id="p_bp" placeholder="BP">
        <input type="text" id="p_pr" placeholder="Pulse">
        <input type="text" id="p_spo2" placeholder="SpO2">
        <input type="text" id="p_temp" placeholder="Temp">
    </div>
    <button class="btn btn-reg" id="mainActionBtn" onclick="savePatient()">Register Patient</button>
    
    <input type="text" id="pSearch" style="width:100%; margin-top:20px; padding:12px;" placeholder="🔍 Search Patient..." onkeyup="filterTable()">
    <table>
        <thead><tr><th>OPD ID</th><th>Name</th><th>Action</th></tr></thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<div id="printArea"></div>

<div id="actionModal" class="modal">
    <div class="modal-content">
        <h2 id="menuPatientName"></h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn" style="background:#1565c0; color:white;" onclick="openEdit()">EDIT</button>
            <button class="btn" style="background:#ef6c00; color:white;" onclick="openTreat()">TREAT</button>
            <button class="btn" style="background:#2e7d32; color:white;" onclick="generatePrint('PRESCRIPTION')">PRINT Rx</button>
            <button class="btn" style="background:#25D366; color:white;" onclick="sendWhatsApp()">WhatsApp</button>
            <button class="btn" style="background:#c62828; color:white;" onclick="generatePrint('REGISTRATION')">PRINT REG</button>
        </div>
        <button class="btn" style="width:100%; margin-top:10px; background:#666; color:white;" onclick="document.getElementById('actionModal').style.display='none'">Close</button>
    </div>
</div>

<div id="treatModal" class="modal">
    <div class="modal-content">
        <h2>Treatment</h2>
        <div style="margin-bottom:10px;"><b>Complaints:</b><textarea id="t_complaints"></textarea></div>
        <div style="margin-bottom:10px;"><b>Investigations:</b><textarea id="t_investigations"></textarea></div>
        <div style="margin-bottom:10px;"><b>Past History:</b><textarea id="t_history"></textarea></div>
        <table border="1" style="width:100%; margin:10px 0; border-collapse: collapse;">
            <thead><tr style="background:#eee;"><th>Drug Name</th><th>Dur</th><th>Route</th><th>Rem</th><th></th></tr></thead>
            <tbody id="medBody"></tbody>
        </table>
        <button class="btn" style="background:#2196f3; color:white; margin-bottom:10px;" onclick="addMedRow()">+ Add Drug</button>
        <div><b>Notes:</b><textarea id="t_notes"></textarea></div>
        <button class="btn btn-reg" onclick="saveTreatment()">Save Treatment</button>
        <button class="btn" style="width:100%; margin-top:10px; background:#666; color:white;" onclick="document.getElementById('treatModal').style.display='none'">Cancel</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbybybQ8Z-63ZqoGpGyzjLdE5YgNopWSIRr1BHdrKgF3wNliSigX689zFIWco02kAJbo/exec";
    let patients = [], selectedP = null;

    function loadData() {
        const script = document.createElement('script');
        script.src = `${API_URL}?callback=handleResponse&ts=${Date.now()}`;
        document.body.appendChild(script);
    }
    function handleResponse(data) { patients = data; renderTable(data); }
    function renderTable(list) {
        document.getElementById('tbody').innerHTML = list.map(p => `<tr><td>${p.opd_number}</td><td>${p.name}</td><td><button class="btn-select" onclick="openMenu('${p.opd_number}')">SELECT</button></td></tr>`).reverse().join('');
    }
    function openMenu(id) {
        selectedP = patients.find(p => p.opd_number === id);
        document.getElementById('menuPatientName').innerText = selectedP.name;
        document.getElementById('actionModal').style.display = "block";
    }

    function openEdit() {
        if (!selectedP) return;
        // Force the ID into the hidden field and change button text
        document.getElementById('current_opd_id').value = selectedP.opd_number;
        document.getElementById('mainActionBtn').innerText = "Update Patient Details";
        ['name','age','sex','phone','address','weight','bp','pr','spo2','temp'].forEach(f => {
            const el = document.getElementById('p_'+f);
            if(el) el.value = selectedP[f] || "";
        });
        document.getElementById('actionModal').style.display = "none";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function openTreat() {
        if (!selectedP) return;
        document.getElementById('actionModal').style.display = "none";
        document.getElementById('treatModal').style.display = "block";
        ['complaints','investigations','history','notes'].forEach(f => {
            const el = document.getElementById('t_'+f);
            if(el) el.value = selectedP[f] || "";
        });
        document.getElementById('medBody').innerHTML = "";
        try {
            const meds = JSON.parse(selectedP.medications || "[]");
            if (meds.length > 0) meds.forEach(m => addMedRow(m));
            else addMedRow();
        } catch(e) { addMedRow(); }
    }

    function addMedRow(data = {n:'', d:'', r:'', rem:''}) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td><textarea class="m-name">${data.n || ''}</textarea></td><td><textarea class="m-dur">${data.d || ''}</textarea></td><td><textarea class="m-route">${data.r || ''}</textarea></td><td><textarea class="m-rem">${data.rem || ''}</textarea></td><td style="cursor:pointer; color:red; font-weight:bold; text-align:center;" onclick="this.parentElement.remove()">×</td>`;
        document.getElementById('medBody').appendChild(tr);
    }

    async function saveTreatment() {
        const meds = Array.from(document.querySelectorAll('#medBody tr')).map(tr => ({
            n: tr.querySelector('.m-name').value, d: tr.querySelector('.m-dur').value, r: tr.querySelector('.m-route').value, rem: tr.querySelector('.m-rem').value
        })).filter(m => m.n !== "");
        const data = { type: "SAVE_TREATMENT", opd: selectedP.opd_number, complaints: document.getElementById('t_complaints').value, investigations: document.getElementById('t_investigations').value, history: document.getElementById('t_history').value, medications: JSON.stringify(meds), notes: document.getElementById('t_notes').value };
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        location.reload();
    }

    function sendWhatsApp() {
        if (!selectedP.phone) { alert("Phone missing!"); return; }
        const meds = JSON.parse(selectedP.medications || "[]");
        let medText = meds.map((m, i) => `${i+1}. *${m.n}* - ${m.d}`).join('%0A');
        const message = `*SRR HOSPITAL*%0A*Patient:* ${selectedP.name}%0A*Rx:*%0A${medText}%0A%0A*Dr. M. Jayachander*`;
        window.open(`https://wa.me/91${selectedP.phone}?text=${message}`, '_blank');
    }

    const getFullPageSetup = (pContent) => `
        <div class="print-page-wrapper">
            <img src="logo.jpg" class="watermark">
            <div class="print-main-content">
                <div class="print-header">
                    <img src="logo.jpg" style="width:85px;">
                    <div class="print-hospital-name">
                        <h1>SRI RAJA RAJESHWARI HOSPITAL</h1>
                        <p style="font-size:10pt; font-weight:bold; margin-top:2px;">Suraram Colony, NTR Road, Opp: Ramaleela Maidanam, TG 500055</p>
                    </div>
                    <div class="print-doc-box">
                        <div style="font-size:18pt; font-weight:900;">DR. M. JAYACHANDER</div>
                        <div style="font-size:11pt; font-weight:bold;">MBBS, M.D. (GENERAL MEDICINE)</div>
                        <div style="color:#c62828; font-size:11pt; font-weight:bold;">Reg No: TSMC/FMR/43070</div>
                    </div>
                </div>
                ${pContent}
            </div>
            <div class="print-footer-container">
                <div class="signature-right">
                    <div style="font-size:14pt; font-weight:bold;">DR. M. JAYACHANDER</div>
                    <div style="font-size:10pt; font-weight:bold;">MBBS, M.D. (GENERAL MEDICINE)</div>
                </div>
                <div style="border-top:3px solid #000; width:100%; margin-bottom:3px;"></div>
                <div style="font-size:9pt; font-weight:900; text-align:center; text-decoration:underline;">NOTE: (NOT VALID FOR MEDICO LEGAL PURPOSE)</div>
                <div style="font-size:11pt; color:#c62828; font-weight:bold; text-align:center; margin:2px 0;">దయచేసి ప్రతిసారి వచ్చేటప్పుడు ఈ ప్రిస్క్రిప్షన్ ఫైల్ తీసుకురావలెను</div>
                <div class="telugu-services">మా ప్రత్యేక సేవలు: బిపి, షుగర్ ,గుండె వ్యాధులు కాలేయ వ్యాధులు (జాండీస్), కిడ్నీ సమస్యలు, నరాల వ్యాధులు (పక్షవాతం) ,వైరల్ ఫీవర్, జీర్ణకోశ వ్యాధులు (అల్సర్), ఊపిరితిత్తుల వ్యాధులు, థైరాయిడ్ మరియు ఫిట్స్ చూడబడును.</div>
                <div style="display:flex; align-items:center; justify-content:center; gap:8px;">
                    <img src="https://cdn-icons-png.flaticon.com/512/4320/4320337.png" style="width:38px;">
                    <div class="footer-banner">SRI RAJA RAJESHWARI MEDICAL AND GENERAL STORES</div>
                    <img src="https://cdn-icons-png.flaticon.com/512/3774/3774299.png" style="width:38px;">
                </div>
            </div>
        </div>
    `;

    function generatePrint(type) {
        const info = `<div class="print-data-box"><div>OPD ID: ${selectedP.opd_number}<br>Name: <span style="font-size:18pt; text-transform:uppercase;">${selectedP.name}</span><br>Phone: ${selectedP.phone || 'N/A'}</div><div style="text-align:right;">Date: ${new Date().toLocaleDateString()}<br>Age/Sex: ${selectedP.age} / ${selectedP.sex}<br>Address: ${selectedP.address}</div></div><div class="print-vitals-box"><span>Wt: ${selectedP.weight}kg</span><span>BP: ${selectedP.bp}</span><span>Pulse: ${selectedP.pr}</span><span>SpO2: ${selectedP.spo2}%</span><span>Temp: ${selectedP.temp}°F</span></div>`;
        
        if (type === 'REGISTRATION') {
            document.getElementById('printArea').innerHTML = getFullPageSetup(info);
        } else {
            const meds = JSON.parse(selectedP.medications || "[]");
            const p1Meds = meds.slice(0, 7);
            const p2Meds = meds.slice(7);

            let p1Content = info + `
                <p style="margin:5px 0;"><b>Complaints:</b> <span style="font-weight:bold; font-size:15pt;">${selectedP.complaints || '---'}</span></p>
                <p style="margin:5px 0;"><b>Investigations:</b> <span style="font-weight:bold; font-size:15pt;">${selectedP.investigations || '---'}</span></p>
                <p style="margin:5px 0;"><b>Past History:</b> <span style="font-weight:bold; font-size:15pt;">${selectedP.history || '---'}</span></p>
                <h3 style="border-bottom:2px solid #000; font-size:15pt; margin-top:10px;">Rx (Medications)</h3>
                <table class="med-print-table">
                    <thead><tr><th>Drug Name</th><th>Dur</th><th>Route</th><th>Remarks</th></tr></thead>
                    <tbody>${p1Meds.map(m => `<tr><td>${m.n}</td><td>${m.d}</td><td>${m.r}</td><td>${m.rem}</td></tr>`).join('')}</tbody>
                </table>
                ${p2Meds.length === 0 ? `<p style="margin-top:10px;"><b>Notes:</b> <span style="font-weight:bold; font-size:15pt;">${selectedP.notes || '---'}</span></p>` : ''}
            `;
            
            let finalHtml = getFullPageSetup(p1Content);

            if (p2Meds.length > 0) {
                let p2Content = info + `
                    <h3 style="border-bottom:2px solid #000; font-size:15pt; margin-top:10px;">Rx (Continued)</h3>
                    <table class="med-print-table">
                        <thead><tr><th>Drug Name</th><th>Dur</th><th>Route</th><th>Remarks</th></tr></thead>
                        <tbody>${p2Meds.map(m => `<tr><td>${m.n}</td><td>${m.d}</td><td>${m.r}</td><td>${m.rem}</td></tr>`).join('')}</tbody>
                    </table>
                    <p style="margin-top:10px;"><b>Notes:</b> <span style="font-weight:bold; font-size:15pt;">${selectedP.notes || '---'}</span></p>
                `;
                finalHtml += getFullPageSetup(p2Content);
            }
            document.getElementById('printArea').innerHTML = finalHtml;
        }
        window.print();
    }

    /* === RECTIFIED SAVE FUNCTION: FORCED UPDATE CHECK === */
    async function savePatient() {
        const idField = document.getElementById('current_opd_id');
        const actionBtn = document.getElementById('mainActionBtn');
        let opd_to_use = "";

        // FORCE CHECK: If button says Update AND we have an ID, do NOT create a new one.
        if (actionBtn.innerText === "Update Patient Details" && idField.value && idField.value !== "") {
            opd_to_use = idField.value;
        } else {
            opd_to_use = "SRR-" + Date.now().toString().slice(-4);
        }

        const data = { 
            type: "REGISTRATION", 
            opd: opd_to_use, 
            name: document.getElementById('p_name').value, 
            age: document.getElementById('p_age').value, 
            sex: document.getElementById('p_sex').value, 
            phone: document.getElementById('p_phone').value, 
            address: document.getElementById('p_address').value, 
            weight: document.getElementById('p_weight').value, 
            bp: document.getElementById('p_bp').value, 
            pr: document.getElementById('p_pr').value, 
            spo2: document.getElementById('p_spo2').value, 
            temp: document.getElementById('p_temp').value 
        };

        // Disable to prevent duplicate requests from rapid clicking
        actionBtn.innerText = "Processing...";
        actionBtn.disabled = true;

        try {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            location.reload(); 
        } catch (e) {
            actionBtn.innerText = "Error Saving";
            actionBtn.disabled = false;
        }
    }

    function filterTable() { renderTable(patients.filter(p => p.name.toLowerCase().includes(document.getElementById('pSearch').value.toLowerCase()))); }
    window.onload = loadData;
</script>
</body>
</html>
