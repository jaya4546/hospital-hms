<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRR Hospital Management System</title>
    <style>
        :root { --primary: #1b5e20; --accent: #c62828; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; font-size: 14px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 8px; border-top: 8px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; }
        .header h1 { color: var(--accent); margin: 0; font-size: 22px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1.5px solid #000; border-radius: 4px; box-sizing: border-box; }
        
        .btn { padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-reg { background: var(--primary); color: white; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn-sel { background: #2e7d32; color: white; }
        .btn-tests { background: #1565c0; color: white; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #333; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #ddd; font-weight: bold; }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); overflow-y: auto; }
        .modal-content { background: white; margin: 2% auto; padding: 20px; width: 90%; max-width: 800px; border-radius: 10px; }
        
        #printArea { display: none; }
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { display: block; position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>SRI RAJA RAJESHWARI HOSPITAL</h1>
            <small>Suraram Colony, Hyderabad | 📞 9201955976</small>
        </div>
        <div style="text-align:right;">
            <strong>DR. M. JAYACHANDER</strong><br>
            <small>MD (General Medicine)</small>
        </div>
    </div>

    <!-- Registration Form -->
    <div class="grid">
        <input type="text" id="p_name" placeholder="Patient Name">
        <input type="number" id="p_age" placeholder="Age">
        <select id="p_sex"><option>Male</option><option>Female</option></select>
        <input type="text" id="p_phone" placeholder="Phone (Q)">
        <input type="text" id="p_address" placeholder="Address">
        <input type="text" id="p_weight" placeholder="Weight">
        <input type="text" id="p_bp" placeholder="BP">
        <input type="text" id="p_pr" placeholder="Pulse (P.R.)">
        <input type="text" id="p_spo2" placeholder="SpO2">
        <input type="text" id="p_temp" placeholder="Temp">
    </div>
    <button class="btn btn-reg" id="regBtn" onclick="savePatient()">Register Patient</button>

    <!-- Search -->
    <input type="text" id="pSearch" style="width:100%; margin-top:20px; padding:12px; border: 2px solid var(--primary);" placeholder="🔍 Search Name or OPD ID..." oninput="searchTable()">

    <table>
        <thead><tr><th>OPD ID</th><th>Date</th><th>Name</th><th>Phone</th><th>Actions</th></tr></thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<!-- Modals -->
<div id="actionModal" class="modal">
    <div class="modal-content">
        <h2 id="menuName"></h2>
        <div class="grid">
            <button class="btn btn-tests" onclick="openLab()">Lab Billing</button>
            <button class="btn btn-sel" onclick="openTreat()">Add Treatment</button>
            <button class="btn" style="background:#ef6c00; color:white;" onclick="requestOTP()">View History</button>
        </div>
        <button class="btn" style="width:100%; background:#444; color:white; margin-top:10px;" onclick="closeModal()">Close</button>
    </div>
</div>

<div id="labModal" class="modal">
    <div class="modal-content">
        <h3>Lab Billing: <span id="labName"></span></h3>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <select id="test_dropdown"></select>
            <button class="btn btn-sel" onclick="addTest()">Add</button>
        </div>
        <table id="labTable">
            <thead><tr><th>Test</th><th>Price</th><th>-</th></tr></thead>
            <tbody id="labBody"></tbody>
        </table>
        <div style="text-align:right; margin-top:10px;">
            <b>Total: ₹ <span id="labTotal">0</span></b><br>
            <button class="btn btn-reg" onclick="saveLabBill()">Save & Print</button>
        </div>
        <button class="btn" style="width:100%; background:#444; color:white; margin-top:10px;" onclick="closeModal()">Back</button>
    </div>
</div>

<div id="otpModal" class="modal">
    <div class="modal-content" style="max-width:350px; text-align:center;">
        <h3>🔒 Security Code</h3>
        <input type="number" id="otpInput" placeholder="Enter OTP">
        <button class="btn btn-reg" onclick="verifyOTP()">Verify</button>
    </div>
</div>

<div id="printArea"></div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxRFOEzBLp9BgCYesNSd3of00f5h1hN5N_8dWYcRfFbp7oDnhlu44Cn5uek1km23Qpu/exec";
    let patients = [], selectedP = null, generatedOTP = null;

    const masterTests = [
        {n: "Cbp", p: 250}, {n: "Esr", p: 100}, {n: "Rbs", p: 50}, {n: "LFT", p: 800}, {n: "ECG", p: 300}
    ];

    async function loadData() {
        const res = await fetch(`${API_URL}?type=GET_ALL&ts=${Date.now()}`);
        patients = await res.json();
        renderTable(patients);
        document.getElementById('test_dropdown').innerHTML = masterTests.map(t => `<option value="${t.n}">${t.n} (₹${t.p})</option>`).join('');
    }

    function renderTable(list) {
        document.getElementById('tbody').innerHTML = list.map(p => `
            <tr>
                <td>${p.opd_number}</td>
                <td>${p.date}</td>
                <td>${p.name}</td>
                <td>${p.phone}</td>
                <td><button class="btn btn-sel" onclick="openMenu('${p.opd_number}')">Select</button></td>
            </tr>`).reverse().join('');
    }

    async function savePatient() {
        const btn = document.getElementById('regBtn');
        const pData = {
            type: "REGISTER",
            name: document.getElementById('p_name').value,
            age: document.getElementById('p_age').value,
            sex: document.getElementById('p_sex').value,
            phone: document.getElementById('p_phone').value,
            address: document.getElementById('p_address').value,
            weight: document.getElementById('p_weight').value,
            bp: document.getElementById('p_bp').value,
            pr: document.getElementById('p_pr').value,
            spo2: document.getElementById('p_spo2').value,
            temp: document.getElementById('p_temp').value
        };
        if(!pData.name) return alert("Name required");
        btn.innerText = "Registering...";
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(pData) });
        location.reload();
    }

    function openMenu(id) {
        selectedP = patients.find(p => String(p.opd_number) === String(id));
        document.getElementById('menuName').innerText = selectedP.name;
        document.getElementById('actionModal').style.display = 'block';
    }

    function openLab() {
        document.getElementById('labName').innerText = selectedP.name;
        document.getElementById('labBody').innerHTML = "";
        document.getElementById('labTotal').innerText = "0";
        document.getElementById('labModal').style.display = 'block';
    }

    function addTest() {
        const test = masterTests.find(t => t.n === document.getElementById('test_dropdown').value);
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${test.n}</td><td>${test.p}</td><td onclick="this.parentElement.remove(); calcTotal()">❌</td>`;
        document.getElementById('labBody').appendChild(tr);
        calcTotal();
    }

    function calcTotal() {
        let total = 0;
        document.querySelectorAll('#labBody tr').forEach(tr => total += parseInt(tr.cells[1].innerText));
        document.getElementById('labTotal').innerText = total;
    }

    async function saveLabBill() {
        const tests = Array.from(document.querySelectorAll('#labBody tr')).map(tr => ({n: tr.cells[0].innerText, p: tr.cells[1].innerText}));
        let history = JSON.parse(selectedP.investigations || "[]");
        history.push({date: new Date().toLocaleString(), tests: tests, total: document.getElementById('labTotal').innerText});
        
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({type: "SAVE_LAB_BILL", opd: selectedP.opd_number, lab_bill: JSON.stringify(history)}) });
        alert("Lab Bill Saved!");
        location.reload();
    }

    function requestOTP() {
        generatedOTP = Math.floor(100000 + Math.random() * 900000);
        alert("Security Code: " + generatedOTP);
        document.getElementById('otpModal').style.display = 'block';
    }

    function verifyOTP() {
        if(document.getElementById('otpInput').value == generatedOTP) {
            alert("Verified. Patient Investigations (Column M): " + selectedP.investigations);
            closeModal();
        } else { alert("Wrong OTP"); }
    }

    function searchTable() {
        const q = document.getElementById('pSearch').value.toUpperCase();
        document.querySelectorAll("#tbody tr").forEach(r => r.style.display = r.innerText.toUpperCase().includes(q) ? "" : "none");
    }

    function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    window.onload = loadData;
</script>
</body>
</html>
