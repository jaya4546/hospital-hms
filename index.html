<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRR Hospital Management System</title>
    <style>
        :root { --primary: #1b5e20; --accent: #c62828; --bg: #f4f7f6; }
        body { font-family: 'Calibri', sans-serif; background: var(--bg); margin: 0; padding: 10px; font-size: 11pt; color: #000; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 8px; border-top: 8px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 15px; }
        .center-side { text-align: center; flex: 1; }
        .center-side h1 { color: var(--accent); margin: 0; font-size: 24px; text-transform: uppercase; }
        .doc-side { border: 2px solid #000; padding: 8px; text-align: right; background: #fffde7; min-width: 260px; border-radius: 4px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 6px; border: 1px solid #000; border-radius: 4px; box-sizing: border-box; }
        .btn { padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-reg { background: var(--primary); color: white; width: 100%; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); overflow-y: auto; }
        .modal-content { background: white; margin: 2% auto; padding: 20px; width: 90%; max-width: 800px; border-radius: 10px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .menu-btn { padding: 18px; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #263238; color: white; padding: 10px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #eee; }

        #printArea { display: none; }
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { display: block; position: absolute; left: 0; top: 0; width: 100%; }
            .print-page { padding: 0.5cm; position: relative; }
            .watermark { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); opacity: 0.1; width: 400px; z-index: -1; }
            @page { margin: 0; }
        }
        .print-data-box { border: 1px solid #000; padding: 8px; margin-top: 10px; }
        .print-data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .print-vitals-box { border: 1px solid #000; border-top: none; padding: 8px; display: flex; justify-content: space-between; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.jpg" style="width:85px">
        <div class="center-side">
            <h1>SRI RAJA RAJESHWARI HOSPITAL</h1>
            <p style="font-size:10px; font-weight:bold;">SURARAM COLONY, HYDERABAD 500055</p>
        </div>
        <div class="doc-side"><b>DR. M. JAYACHANDER</b><br><span>MBBS, M.D. (GENERAL MEDICINE)</span></div>
    </div>

    <div class="grid">
        <input type="text" id="p_name" placeholder="Patient Name">
        <input type="number" id="p_age" placeholder="Age">
        <select id="p_sex"><option>Male</option><option>Female</option></select>
        <input type="text" id="p_phone" placeholder="Phone Number">
        <input type="text" id="p_address" placeholder="Address">
        <input type="text" id="p_weight" placeholder="Weight">
        <input type="text" id="p_bp" placeholder="BP">
        <input type="text" id="p_pr" placeholder="Pulse">
        <input type="text" id="p_spo2" placeholder="SpO2">
        <input type="text" id="p_temp" placeholder="Temp">
    </div>
    <button class="btn btn-reg" id="submitBtn" onclick="savePatient('REGISTRATION')">Register Patient</button>

    <input type="text" id="pSearch" style="width:100%; margin-top:20px; padding:12px; border:2px solid var(--primary);" placeholder="🔍 Search Patient..." onkeyup="filterTable()">

    <table>
        <thead><tr><th>OPD ID</th><th>Name</th><th>Action</th></tr></thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<div id="printArea"></div>

<div id="actionModal" class="modal">
    <div class="modal-content">
        <h2 id="menuPatientName"></h2>
        <div class="menu-grid">
            <button class="menu-btn" style="background:#1565c0;" onclick="openEdit()">EDIT DETAILS</button>
            <button class="menu-btn" style="background:#2e7d32;" onclick="generatePrint('PRESCRIPTION')">PRINT PRESCRIPTION</button>
            <button class="menu-btn" style="background:#c62828;" onclick="generatePrint('REGISTRATION')">PRINT REGISTRATION</button>
        </div>
        <button class="btn" style="width:100%; margin-top:15px; background:#ddd;" onclick="resetForm()">Close</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzV-ESeeCJ5hFxSJusNYqxzj7bQKxWQOkjn1yIBx1G_vxc5cMBKmy-viBPzUzAbFYWx/exec";
    let patients = [], selectedP = null;

    function loadData() {
        const script = document.createElement('script');
        script.src = `${API_URL}?callback=handleResponse&ts=${Date.now()}`;
        document.body.appendChild(script);
    }

    function handleResponse(data) { patients = data; renderTable(data); }

    function renderTable(list) {
        document.getElementById('tbody').innerHTML = list.map(p => `
            <tr><td><b>${p.opd_number}</b></td><td>${p.name}</td>
            <td><button onclick="openMenu('${p.opd_number}')">Select</button></td></tr>
        `).reverse().join('');
    }

    function openMenu(id) {
        selectedP = patients.find(p => p.opd_number === id);
        document.getElementById('menuPatientName').innerText = selectedP.name;
        document.getElementById('actionModal').style.display = "block";
    }

    function resetForm() {
        ['name','age','sex','phone','address','weight','bp','pr','spo2','temp'].forEach(k => {
            document.getElementById('p_'+k).value = (k==='sex'?'Male':'');
        });
        document.getElementById('submitBtn').innerText = "Register Patient";
        document.getElementById('submitBtn').onclick = () => savePatient('REGISTRATION');
        document.getElementById('actionModal').style.display = "none";
    }

    function openEdit() {
        ['name','age','sex','phone','address','weight','bp','pr','spo2','temp'].forEach(k => {
            document.getElementById('p_'+k).value = selectedP[k] || "";
        });
        document.getElementById('submitBtn').innerText = "UPDATE DETAILS";
        document.getElementById('submitBtn').onclick = () => savePatient('UPDATE_DETAILS');
        document.getElementById('actionModal').style.display = "none";
        window.scrollTo(0,0);
    }

    async function savePatient(type) {
        const data = { 
            type: type, 
            opd: type === 'REGISTRATION' ? "SRR-"+Date.now().toString().slice(-4) : selectedP.opd_number, 
            name: document.getElementById('p_name').value, 
            age: document.getElementById('p_age').value, 
            sex: document.getElementById('p_sex').value, 
            phone: document.getElementById('p_phone').value, 
            address: document.getElementById('p_address').value, 
            weight: document.getElementById('p_weight').value, 
            bp: document.getElementById('p_bp').value, 
            pr: document.getElementById('p_pr').value, 
            spo2: document.getElementById('p_spo2').value, 
            temp: document.getElementById('p_temp').value 
        };
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        alert("Action Successful!"); resetForm(); location.reload();
    }

    function generatePrint(type) {
        const content = `
            <div class="print-page">
                <img src="logo.jpg" class="watermark">
                <div class="print-header">
                    <img src="logo.jpg" style="width:70px;">
                    <div style="flex:1; text-align:center;">
                        <h1 style="color:#c62828; margin:0; font-size:22pt;">SRI RAJA RAJESHWARI HOSPITAL</h1>
                        <p style="margin:0; font-size:9pt; font-weight:bold;">HYDERABAD - 500055</p>
                    </div>
                </div>
                <div class="print-data-box">
                    <div class="print-data-grid">
                        <div>
                            <b>OPD ID:</b> ${selectedP.opd_number}<br>
                            <b>Name:</b> ${selectedP.name}<br>
                            <b>Phone:</b> ${selectedP.phone || 'N/A'}
                        </div>
                        <div style="text-align:right;">
                            <b>Date:</b> ${new Date().toLocaleDateString()}<br>
                            <b>Age/Sex:</b> ${selectedP.age} / ${selectedP.sex}<br>
                            <b>Address:</b> ${selectedP.address}
                        </div>
                    </div>
                </div>
                <div class="print-vitals-box">
                    <span>Wt: ${selectedP.weight}kg</span><span>BP: ${selectedP.bp}</span>
                    <span>PR: ${selectedP.pr}</span><span>SpO2: ${selectedP.spo2}%</span><span>T: ${selectedP.temp}°F</span>
                </div>
            </div>`;
        document.getElementById('printArea').innerHTML = content;
        window.print();
    }

    function filterTable() {
        const val = document.getElementById('pSearch').value.toLowerCase();
        renderTable(patients.filter(p => p.name.toLowerCase().includes(val)));
    }
    loadData();
</script>
</body>
</html>
