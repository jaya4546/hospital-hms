<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRR Hospital Management System</title>
    <style>
        :root { --primary: #1b5e20; --accent: #c62828; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 10px; font-size: 12pt; color: #333; overflow-x: hidden; }
        
        .container { max-width: 1150px; margin: auto; background: white; padding: 20px; border-radius: 8px; border-top: 8px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Dashboard Header */
        .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 20px; gap: 15px; }
        .center-side { text-align: center; flex: 1; min-width: 300px; }
        .center-side h1 { color: var(--accent); margin: 0; font-size: 26px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .full-address { font-size: 13px; font-weight: bold; color: #1b5e20; margin-top: 5px; line-height: 1.4; display: block; }
        
        /* Doctor Box 3 Lines - Fixed Dashboard View */
        .doc-side { border: 2.5px solid #000; padding: 12px; text-align: center; background: #fffde7; min-width: 280px; border-radius: 8px; box-shadow: 4px 4px 0px #000; }
        .doc-name { font-size: 19px; font-weight: 900; display: block; color: #000; }
        .doc-degree { font-size: 13px; font-weight: bold; display: block; color: #333; }
        .doc-reg { font-size: 13px; font-weight: 900; display: block; color: var(--accent); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1.5px solid #000; border-radius: 4px; font-size: 11pt; box-sizing: border-box; }
        
        .btn { padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .btn-reg { background: var(--primary); color: white; width: 100%; font-size: 14pt; margin-top: 10px; }
        
        .btn-select { background: #2e7d32; color: white; padding: 8px 16px; border-radius: 4px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th { background: #263238; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; font-weight: bold; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; padding: 25px; width: 95%; max-width: 800px; border-radius: 12px; border-top: 10px solid var(--accent); }

        /* PRINT LAYOUT - COMPLEX A4 BREAKING & FITNESS */
        #printArea { display: none; }
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { 
                display: block !important; 
                position: absolute; 
                left: 0; top: 0; 
                width: 100%; 
                margin: 0 !important; 
                padding: 0 !important; 
            }
            
            /* Strict Page Wrapper - Enforces fitness and prevents spill */
            .print-page-wrapper { 
                width: 21cm; 
                height: 29.6cm; /* Exact A4 height to prevent collapse */
                position: relative; 
                margin: 0 auto; 
                padding: 8mm 10mm; /* Minimal Padding: removes mobile whitespace, stops PC cutting */
                box-sizing: border-box; 
                page-break-after: always; /* Force new page after this wrapper */
                background: white !important; 
                overflow: hidden; /* Strict containment of content */
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important;
            }
            
            /* Dynamic Print Header: Prevents collapsed doctor details on mobile */
            .print-header-grid { 
                display: grid; 
                grid-template-columns: 1fr 280px; 
                align-items: center; 
                border-bottom: 5px solid #1b5e20; 
                padding-bottom: 8px; 
                margin-bottom: 12px; 
                width: 100%;
            }
            
            /* Vitals Box fitness */
            .vitals-box { 
                background: #e8f5e9 !important; 
                border: 2.5px solid #000; 
                border-top: none; 
                padding: 10px; 
                display: flex; 
                justify-content: space-between; 
                font-size: 14pt; 
                font-weight: bold; 
                position: relative; 
                z-index: 10;
            }
            
            /* Table fitness */
            .print-table { 
                width: 100%; 
                border-collapse: collapse; 
                border: 2px solid #000; 
                margin-top: 10px; 
            }
            .print-table th { background: #333; color: white; padding: 10px; border: 1px solid #000; font-size: 14pt; }
            .print-table td { padding: 10px; border: 1px solid #000; font-size: 14pt; font-weight: bold; }
            
            /* Forced Footer Containment */
            .print-footer-container { 
                position: absolute; 
                bottom: 8mm; /* Reduced bottom gap for fitness */
                left: 10mm; right: 10mm; 
                width: calc(100% - 20mm); 
                z-index: 10; 
            }
            
            @page { size: A4 portrait; margin: 0 !important; }
        }
    </style>
</head>

        location.reload();
