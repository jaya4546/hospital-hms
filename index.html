<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRR Hospital Management System</title>
    <style>
        :root { --primary: #1b5e20; --accent: #c62828; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 10px; font-size: 12pt; color: #333; }
        .container { max-width: 1150px; margin: auto; background: white; padding: 20px; border-radius: 8px; border-top: 8px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Header Style */
        .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 20px; }
        .center-side h1 { color: var(--accent); margin: 0; font-size: 18px; font-weight: 900; text-transform: uppercase; }
        .doc-side { border: 2px solid #000; padding: 6px; text-align: center; background: #fffde7; border-radius: 8px; }

        /* Form Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #000; border-radius: 4px; font-size: 11pt; box-sizing: border-box; }
        
        /* Buttons */
        .btn { padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-reg { background: var(--primary); color: white; width: 100%; font-size: 14pt; }
        .btn-select { background: #2e7d32; color: white; padding: 8px 12px; }
        .btn-delete { background: #d32f2f; color: white; padding: 8px 12px; }
        .btn-tests { background: #1565c0; color: white; padding: 8px 12px; }

        /* Modal / Action Menu Styling from Photo */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; margin: 10% auto; padding: 20px; width: 90%; max-width: 600px; border-radius: 8px; text-align: center; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .menu-btn { padding: 15px; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 10pt; }
        .btn-blue { background: #1565c0; }
        .btn-orange { background: #ef6c00; }
        .btn-green { background: #2e7d32; }
        .btn-red { background: #d32f2f; }
        .btn-close { background: #37474f; width: 100%; margin-top: 10px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #263238; color: white; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #ddd; font-weight: bold; }
    </style>
</head>
<body onload="loadData()">

<div class="container">
    <div class="header">
        <div class="center-side">
            <h1>SRI RAJA RAJESHWARI HOSPITAL</h1>
            <small>Suraram Colony, Hyderabad | 📞 9201955976</small>
        </div>
        <div class="doc-side">
            <strong>DR. M. JAYACHANDER</strong><br>
            <small>MBBS, M.D. (GEN. MED)</small>
        </div>
    </div>

    <!-- Registration Form -->
    <div class="grid">
        <input type="text" id="p_name" placeholder="Patient Name">
        <input type="number" id="p_age" placeholder="Age">
        <select id="p_sex"><option>Male</option><option>Female</option></select>
        <input type="text" id="p_phone" placeholder="Phone Number">
        <input type="text" id="p_address" placeholder="Address">
        <input type="text" id="p_weight" placeholder="Weight">
        <input type="text" id="p_bp" placeholder="BP">
        <input type="text" id="p_temp" placeholder="Temp">
    </div>
    <button class="btn btn-reg" id="saveBtn" onclick="savePatient()">Register & Save Patient</button>
    
    <!-- Search and Table -->
    <input type="text" id="pSearch" style="margin-top:20px; border: 2px solid var(--primary);" placeholder="🔍 Search Patient Name..." oninput="searchPatient()">
    <table>
        <thead><tr><th>OPD</th><th>Name</th><th>Actions</th></tr></thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<!-- ACTION MODAL (Rebuilt from WhatsApp Image 2026-05-13 at 10.24.29 AM.jpg) -->
<div id="actionModal" class="modal">
    <div class="modal-content">
        <h2 id="menuName" style="color: #c62828;">PATIENT NAME</h2>
        <div class="menu-grid">
            <button class="menu-btn btn-blue" onclick="alert('Edit logic here')">EDIT DETAILS</button>
            <button class="menu-btn btn-orange" onclick="alert('Add treatment logic')">ADD TREATMENT</button>
            <button class="menu-btn btn-green" onclick="alert('Printing RX...')">PRINT RX (WITH HEADER)</button>
            <button class="menu-btn btn-red" onclick="alert('Printing REG...')">PRINT REG (WITH HEADER)</button>
            <button class="menu-btn btn-green" onclick="alert('Printing RX...')">PRINT RX (WITHOUT HEADER)</button>
            <button class="menu-btn btn-red" onclick="alert('Printing REG...')">PRINT REG (WITHOUT HEADER)</button>
        </div>
        <button class="menu-btn btn-close" onclick="closeModal()">CLOSE</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzRFOEzBLp9BgCYesNSd3of00f5h1hN5N_8dWYcRfFbp7oDnhlu44Cn5uek1km23Qpu/exec";
    let patients = [];

    // Load Records
    function loadData() {
        const script = document.createElement('script');
        script.src = `${API_URL}?callback=handleResponse&ts=${Date.now()}`;
        document.body.appendChild(script);
    }

    function handleResponse(data) {
        patients = data;
        renderTable(patients);
    }

    function renderTable(list) {
        const html = list.map(p => `
            <tr>
                <td>${p.opd_number || 'N/A'}</td>
                <td>${p.name}</td>
                <td>
                    <button class="btn-select" onclick="openMenu('${p.opd_number}', '${p.name}')">SELECT</button>
                    <button class="btn-tests" onclick="alert('Lab Tests for ' + '${p.name}')">TESTS</button>
                    <button class="btn-delete" onclick="deletePatient('${p.opd_number}')">DELETE</button>
                </td>
            </tr>
        `).reverse().join('');
        document.getElementById('tbody').innerHTML = html;
    }

    // Fixed Registration Logic
    async function savePatient() {
        const btn = document.getElementById('saveBtn');
        const payload = {
            type: "SAVE_PATIENT",
            name: document.getElementById('p_name').value,
            phone: document.getElementById('p_phone').value,
            age: document.getElementById('p_age').value,
            sex: document.getElementById('p_sex').value,
            address: document.getElementById('p_address').value,
            weight: document.getElementById('p_weight').value,
            bp: document.getElementById('p_bp').value,
            temp: document.getElementById('p_temp').value
        };

        if(!payload.name) return alert("Please enter a name");

        btn.innerText = "SAVING... PLEASE WAIT";
        btn.disabled = true;

        try {
            // Using no-cors for Google Apps Script POST
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            alert("Patient Registered Successfully!");
            location.reload(); // Refresh to see the new patient
        } catch (e) {
            alert("Error saving. Check internet.");
            btn.disabled = false;
            btn.innerText = "Register & Save Patient";
        }
    }

    function openMenu(id, name) {
        document.getElementById('menuName').innerText = name.toUpperCase();
        document.getElementById('actionModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('actionModal').style.display = 'none';
    }

    function searchPatient() {
        const val = document.getElementById('pSearch').value.toLowerCase();
        const filtered = patients.filter(p => p.name.toLowerCase().includes(val));
        renderTable(filtered);
    }

    async function deletePatient(id) {
        if(!confirm("Are you sure you want to delete this patient?")) return;
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({type: "DELETE_PATIENT", opd: id}) });
        location.reload();
    }
</script>
</body>
</html>
