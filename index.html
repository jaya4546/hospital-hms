<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRR Hospital Management System</title>
    <style>
        :root { --primary: #1b5e20; --accent: #c62828; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #000; }
        
        /* UI Container */
        .container { max-width: 1150px; margin: auto; background: white; padding: 20px; border-radius: 8px; border-top: 8px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Header UI */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 15px; }
        .center-side { text-align: center; flex: 2; }
        .center-side h1 { color: var(--accent); margin: 0; font-size: 28px; font-weight: bold; text-transform: uppercase; }
        .doc-side { border: 2.5px solid #000; padding: 15px; text-align: center; background: #fffde7; min-width: 320px; border-radius: 4px; box-shadow: 3px 3px 0px #000; }
        
        /* Grid Input */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1.5px solid #333; border-radius: 4px; font-size: 11pt; box-sizing: border-box; }
        
        .btn { padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .btn-reg { background: var(--primary); color: white; width: 100%; font-size: 14pt; }

        /* RECTIFIED MODAL BUTTONS (Bold & Solid) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); overflow-y: auto; }
        .modal-content { background: white; margin: 2% auto; padding: 30px; width: 90%; max-width: 900px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        
        .menu-btn { 
            padding: 25px; 
            font-size: 16pt; 
            font-weight: 900; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            text-transform: uppercase;
            box-shadow: 0 4px 0px rgba(0,0,0,0.2);
        }
        .btn-edit { background-color: #0d47a1; } /* Deep Blue */
        .btn-treat { background-color: #e65100; } /* Deep Orange */
        .btn-print-rx { background-color: #2e7d32; } /* Deep Green */
        .btn-print-reg { background-color: #c62828; } /* Deep Red */
        .menu-btn:active { transform: translateY(2px); box-shadow: none; }

        /* Medication Table UI */
        .med-table { width: 100%; border-collapse: collapse; margin: 10px 0; border: 2px solid #000; }
        .med-table th { background: #333; color: #fff; padding: 12px; border: 1px solid #000; }
        .med-table td { border: 1px solid #000; background: #fff; }
        .med-table textarea { width: 100%; border: none; font-weight: bold; resize: none; font-size: 13pt; min-height: 40px; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #263238; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; font-weight: bold; }

        /* --- FINAL PRINT RECTIFICATION (FORCING FOOTER TO BOTTOM) --- */
        #printArea { display: none; }
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { display: block; position: absolute; left: 0; top: 0; width: 100%; }
            
            .print-page { 
                page-break-after: always; 
                height: 296mm; /* Exact A4 Height */
                display: flex; 
                flex-direction: column; 
                padding: 1cm; 
                box-sizing: border-box; 
                background: white; 
                position: relative;
            }
            .print-main-content { flex-grow: 1; } /* This pushes everything below it to the bottom */
            
            .watermark { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); opacity: 0.06; width: 500px; z-index: -1; }
            @page { margin: 0; size: A4; }
        }

        /* Print Typography */
        .print-header { display: flex; align-items: center; border-bottom: 5px solid #1b5e20; padding-bottom: 10px; margin-bottom: 15px; }
        .print-hospital-name { text-align: center; flex: 1; }
        .print-hospital-name h1 { color: #c62828; margin: 0; font-size: 34pt; text-transform: uppercase; font-weight: 900; }
        .print-doc-box { border: 2.5px solid #000; padding: 10px; text-align: center; min-width: 350px; border-radius: 8px; }
        
        .print-data-box { border: 2px solid #000; padding: 15px; font-size: 16pt; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 10px; font-weight: bold; }
        .print-vitals-box { border: 2px solid #000; border-top: none; padding: 12px; background: #f1f8e9 !important; display: flex; justify-content: space-between; font-size: 16pt; -webkit-print-color-adjust: exact; font-weight: 900; margin-bottom: 20px; }
        
        .med-print-table { width: 100%; border-collapse: collapse; border: 2.5px solid #000; }
        .med-print-table th { 
            background: #000 !important; 
            color: #fff !important; 
            padding: 12px; 
            border: 1px solid #000; 
            font-size: 17pt; 
            font-weight: 900;
            -webkit-print-color-adjust: exact; 
        }
        .med-print-table td { padding: 12px; border: 1.5px solid #000; font-size: 16pt; font-weight: bold; color: #000; }
        .print-text-wrap { white-space: pre-wrap; font-weight: bold; font-size: 16pt; display: block; margin-top: 5px; }

        /* FOOTER & SIGNATURE FIXED TO ABSOLUTE BOTTOM */
        .print-footer-area { margin-top: auto; width: 100%; }
        .signature-block { text-align: right; margin-bottom: 5px; padding-right: 15px; }
        .signature-line { border-top: 3.5px solid #000; width: 100%; margin-bottom: 12px; }
        
        .note-medico { font-size: 13pt; font-weight: 900; text-align: center; text-decoration: underline; margin-bottom: 5px; }
        .note-telugu-file { font-size: 14pt; color: #c62828; font-weight: 900; text-align: center; margin-bottom: 8px; }
        .note-telugu-services { font-size: 12pt; color: #1b5e20; font-weight: 900; text-align: center; margin-bottom: 15px; line-height: 1.5; }
        
        .banner-pharmacy { background: #1976d2 !important; color: white !important; padding: 15px; border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 20px; -webkit-print-color-adjust: exact; }
        .banner-text { font-size: 17pt; font-weight: 900; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.jpg" style="width:90px">
        <div class="center-side">
            <h1>SRI RAJA RAJESHWARI HOSPITAL</h1>
            <p style="font-weight:bold; font-size: 12px;">SURARAM COLONY TG 500055</p>
        </div>
        <div class="doc-side">
            <b style="font-size: 20px;">DR. M. JAYACHANDER</b><br>
            <span>MBBS, M.D. (GENERAL MEDICINE)</span>
        </div>
    </div>

    <div class="grid">
        <input type="text" id="p_name" placeholder="Patient Name">
        <input type="number" id="p_age" placeholder="Age">
        <select id="p_sex"><option>Male</option><option>Female</option></select>
        <input type="text" id="p_phone" placeholder="Phone">
        <input type="text" id="p_address" placeholder="Address">
        <input type="text" id="p_weight" placeholder="Weight">
        <input type="text" id="p_bp" placeholder="BP">
        <input type="text" id="p_pr" placeholder="Pulse">
        <input type="text" id="p_spo2" placeholder="SpO2">
        <input type="text" id="p_temp" placeholder="Temp">
    </div>
    <button class="btn btn-reg" id="submitBtn" onclick="savePatient('REGISTRATION')">Register Patient</button>
    <input type="text" id="pSearch" style="width:100%; margin-top:20px;" placeholder="🔍 Search Patient..." onkeyup="filterTable()">
    <table>
        <thead><tr><th>ID</th><th>Name</th><th>Action</th></tr></thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<div id="printArea"></div>

<div id="actionModal" class="modal">
    <div class="modal-content">
        <h2 id="menuPatientName" style="color:var(--primary); border-bottom: 3px solid var(--primary); padding-bottom: 10px;"></h2>
        <div class="menu-grid">
            <button class="menu-btn btn-edit" onclick="openEdit()">EDIT DETAILS</button>
            <button class="menu-btn btn-treat" onclick="openTreat()">TREAT</button>
            <button class="menu-btn btn-print-rx" onclick="generatePrint('PRESCRIPTION')">PRINT PRESCRIPTION</button>
            <button class="menu-btn btn-print-reg" onclick="generatePrint('REGISTRATION')">PRINT REGISTRATION</button>
        </div>
        <button class="btn" style="width:100%; margin-top:30px; background:#444; color:white; font-size:14pt;" onclick="resetForm()">Close Menu</button>
    </div>
</div>

<div id="treatModal" class="modal">
    <div class="modal-content">
        <h2 style="color:#e65100;">Add Treatment</h2>
        <div style="margin-bottom:10px;"><b>Complaints:</b><textarea id="t_complaints"></textarea></div>
        <div style="margin-bottom:10px;"><b>Investigations:</b><textarea id="t_investigations"></textarea></div>
        <div style="margin-bottom:10px;"><b>Past History:</b><textarea id="t_history"></textarea></div>
        <div style="margin-bottom:10px;">
            <b>Medications:</b>
            <table class="med-table">
                <thead><tr><th style="width:40%">Drug Name</th><th style="width:12%">Dur</th><th style="width:15%">Route</th><th>Remarks</th><th style="width:40px"></th></tr></thead>
                <tbody id="medBody"></tbody>
            </table>
            <button class="btn" style="background:#1976d2; color:white; margin-top:5px;" onclick="addMedRow()">+ Add Medicine</button>
        </div>
        <div><b>Notes:</b><textarea id="t_notes"></textarea></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn" style="background:var(--primary); color:white; flex:1;" onclick="saveTreatment()">Save Treatment</button>
            <button class="btn" style="background:#666; color:white; flex:1;" onclick="closeTreat()">Cancel</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbybybQ8Z-63ZqoGpGyzjLdE5YgNopWSIRr1BHdrKgF3wNliSigX689zFIWco02kAJbo/exec";
    let patients = [], selectedP = null;

    function loadData() {
        const script = document.createElement('script');
        script.src = `${API_URL}?callback=handleResponse&ts=${Date.now()}`;
        document.body.appendChild(script);
    }
    function handleResponse(data) { patients = data; renderTable(data); }
    function renderTable(list) {
        document.getElementById('tbody').innerHTML = list.map(p => `<tr><td><b>${p.opd_number}</b></td><td>${p.name}</td><td><button class="btn" style="background:var(--primary); color:white;" onclick="openMenu('${p.opd_number}')">Select</button></td></tr>`).reverse().join('');
    }
    function openMenu(id) {
        selectedP = patients.find(p => p.opd_number === id);
        document.getElementById('menuPatientName').innerText = "PATIENT: " + selectedP.name;
        document.getElementById('actionModal').style.display = "block";
    }

    function openEdit() {
        ['name','age','sex','phone','address','weight','bp','pr','spo2','temp'].forEach(f => document.getElementById('p_'+f).value = selectedP[f] || "");
        document.getElementById('submitBtn').innerText = "UPDATE DETAILS";
        document.getElementById('submitBtn').onclick = () => savePatient('UPDATE_DETAILS');
        document.getElementById('actionModal').style.display = "none";
    }

    function openTreat() {
        document.getElementById('actionModal').style.display = "none";
        document.getElementById('treatModal').style.display = "block";
        ['complaints','investigations','history','notes'].forEach(f => document.getElementById('t_'+f).value = selectedP[f] || "");
        document.getElementById('medBody').innerHTML = "";
        try { JSON.parse(selectedP.medications || "[]").forEach(m => addMedRow(m)); } catch(e) { addMedRow(); }
    }

    function addMedRow(data = {n:'', d:'', r:'', rem:''}) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td><textarea class="m-name">${data.n}</textarea></td><td><textarea class="m-dur">${data.d}</textarea></td><td><textarea class="m-route">${data.r}</textarea></td><td><textarea class="m-rem">${data.rem}</textarea></td><td style="text-align:center; cursor:pointer; font-weight:bold; color:red;" onclick="this.parentElement.remove()">X</td>`;
        document.getElementById('medBody').appendChild(tr);
    }

    async function saveTreatment() {
        const meds = Array.from(document.querySelectorAll('#medBody tr')).map(tr => ({
            n: tr.querySelector('.m-name').value, d: tr.querySelector('.m-dur').value, r: tr.querySelector('.m-route').value, rem: tr.querySelector('.m-rem').value
        })).filter(m => m.n !== "");
        const data = { type: "SAVE_TREATMENT", opd: selectedP.opd_number, complaints: document.getElementById('t_complaints').value, investigations: document.getElementById('t_investigations').value, history: document.getElementById('t_history').value, medications: JSON.stringify(meds), notes: document.getElementById('t_notes').value };
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        location.reload();
    }

    const getFullPageSetup = (pContent) => `
        <div class="print-page">
            <img src="logo.jpg" class="watermark">
            <div class="print-header">
                <img src="logo.jpg" style="width:100px;">
                <div class="print-hospital-name">
                    <h1>SRI RAJA RAJESHWARI HOSPITAL</h1>
                    <p style="font-size:11pt; font-weight:900;">SURARAM COLONY TG 500055</p>
                </div>
                <div class="print-doc-box">
                    <div style="font-size:22pt; font-weight:900;">DR. M. JAYACHANDER</div>
                    <div style="font-size:13pt; font-weight:bold;">MBBS, M.D. (GENERAL MEDICINE)</div>
                    <div style="color:#c62828; font-size:13pt; font-weight:bold;">Reg No: TSMC/FMR/43070</div>
                </div>
            </div>

            <div class="print-main-content">
                ${pContent}
            </div>

            <div class="print-footer-area">
                <div class="signature-block">
                    <div style="font-size:16pt; font-weight:900;">DR. M. JAYACHANDER</div>
                    <div style="font-size:12pt; font-weight:bold;">MBBS, M.D. (GENERAL MEDICINE)</div>
                </div>
                <div class="signature-line"></div>
                <div class="note-medico">NOTE: (NOT VALID FOR MEDICO LEGAL PURPOSE)</div>
                <div class="note-telugu-file">దయచేసి ప్రతిసారి వచ్చేటప్పుడు ఈ ప్రిస్క్రిప్షన్ ఫైల్ తీసుకురావలెను</div>
                <div class="note-telugu-services">మా ప్రత్యేక సేవలు: బిపి, షుగర్ ,గుండె వ్యాధులు, కాలేవ్యాధులు (జాండీస్) కిడ్నీ సమస్యలు ,నరాల వ్యాధులు (పక్షవాతం) వైరల్ ఫీవర్ వ్యాధులు, జీర్ణకోశ వ్యాధులు (అల్సర్), ఊపిరితిత్తుల వ్యాధులు, థైరాయిడ్ మరియు ఫిట్స్ చూడబడును.</div>
                <div class="banner-pharmacy">
                    <img src="https://cdn-icons-png.flaticon.com/512/4320/4320337.png" style="width:45px">
                    <div class="banner-text">SRI RAJA RAJESHWARI MEDICAL AND GENERAL STORES</div>
                    <img src="https://cdn-icons-png.flaticon.com/512/3774/3774299.png" style="width:45px">
                </div>
            </div>
        </div>
    `;

    function generatePrint(type) {
        const info = `<div class="print-data-box"><div>OPD ID: ${selectedP.opd_number}<br><br>Name: <span style="font-size:22pt; text-transform:uppercase;">${selectedP.name}</span><br><br>Phone: ${selectedP.phone || 'N/A'}</div><div style="text-align:right;">Date: ${new Date().toLocaleDateString()}<br><br>Age / Sex: ${selectedP.age} / ${selectedP.sex}<br><br>Address: ${selectedP.address}</div></div><div class="print-vitals-box"><span>Weight: ${selectedP.weight}kg</span><span>BP: ${selectedP.bp}</span><span>Pulse: ${selectedP.pr}</span><span>SpO2: ${selectedP.spo2}%</span><span>Temp: ${selectedP.temp}°F</span></div>`;

        if (type === 'REGISTRATION') {
            document.getElementById('printArea').innerHTML = getFullPageSetup(info);
        } else {
            const meds = JSON.parse(selectedP.medications || "[]");
            const first8 = meds.slice(0, 8);
            const remaining = meds.slice(8);
            let p1 = info + `<p><b>Complaints:</b> <span class="print-text-wrap">${selectedP.complaints || '---'}</span></p><p><b>Investigations:</b> <span class="print-text-wrap">${selectedP.investigations || '---'}</span></p><h3 style="border-bottom:3px solid #000; font-size:18pt; margin-bottom:10px;">Rx (Medications)</h3><table class="med-print-table"><thead><tr><th>Drug Name</th><th style="width:12%">Dur</th><th style="width:15%">Route</th><th>Remarks</th></tr></thead><tbody>${first8.map(m => `<tr><td>${m.n}</td><td>${m.d}</td><td>${m.r}</td><td>${m.rem}</td></tr>`).join('')}</tbody></table>${remaining.length === 0 ? `<p><b>Notes:</b> <span class="print-text-wrap">${selectedP.notes || '---'}</span></p>` : ''}`;
            let finalHtml = getFullPageSetup(p1);
            if(remaining.length > 0) {
                let p2 = info + `<h3 style="border-bottom:3px solid #000; font-size:18pt; margin-bottom:10px;">Rx (Continued)</h3><table class="med-print-table"><thead><tr><th>Drug Name</th><th style="width:12%">Dur</th><th style="width:15%">Route</th><th>Remarks</th></tr></thead><tbody>${remaining.map(m => `<tr><td>${m.n}</td><td>${m.d}</td><td>${m.r}</td><td>${m.rem}</td></tr>`).join('')}</tbody></table><p><b>Notes:</b> <span class="print-text-wrap">${selectedP.notes || '---'}</span></p>`;
                finalHtml += getFullPageSetup(p2);
            }
            document.getElementById('printArea').innerHTML = finalHtml;
        }
        window.print();
    }

    async function savePatient(type) {
        const data = { type: type, opd: type === 'REGISTRATION' ? "SRR-"+Date.now().toString().slice(-4) : selectedP.opd_number, name: document.getElementById('p_name').value, age: document.getElementById('p_age').value, sex: document.getElementById('p_sex').value, phone: document.getElementById('p_phone').value, address: document.getElementById('p_address').value, weight: document.getElementById('p_weight').value, bp: document.getElementById('p_bp').value, pr: document.getElementById('p_pr').value, spo2: document.getElementById('p_spo2').value, temp: document.getElementById('p_temp').value };
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        location.reload();
    }
    function filterTable() { renderTable(patients.filter(p => p.name.toLowerCase().includes(document.getElementById('pSearch').value.toLowerCase()))); }
    function closeTreat() { document.getElementById('treatModal').style.display = "none"; }
    function resetForm() { document.getElementById('actionModal').style.display = "none"; }
    window.onload = loadData;
</script>
</body>
</html>
