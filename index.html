<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRR Hospital Management System</title>
    <style>
        :root { --primary: #1b5e20; --accent: #c62828; --bg: #f4f7f6; }
        body { font-family: 'Calibri', sans-serif; background: var(--bg); margin: 0; padding: 10px; font-size: 12pt; color: #000; }
        .container { max-width: 1150px; margin: auto; background: white; padding: 20px; border-radius: 8px; border-top: 8px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 15px; }
        .center-side { text-align: center; flex: 2; }
        .center-side h1 { color: var(--accent); margin: 0; font-size: 28px; font-weight: bold; text-transform: uppercase; white-space: nowrap; }
        .doc-side { border: 2.5px solid #000; padding: 10px; text-align: right; background: #fffde7; min-width: 300px; border-radius: 4px; box-shadow: 3px 3px 0px #000; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 8px; border: 1.5px solid #000; border-radius: 4px; font-size: 11pt; box-sizing: border-box; color: #000; font-family: 'Calibri'; }
        
        .btn { padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-reg { background: var(--primary); color: white; width: 100%; font-size: 14pt; }
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); overflow-y: auto; }
        .modal-content { background: white; margin: 2% auto; padding: 25px; width: 95%; max-width: 950px; border-radius: 10px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .menu-btn { padding: 20px; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .med-table { width: 100%; border-collapse: collapse; margin: 10px 0; border: 2px solid #000; table-layout: fixed; }
        .med-table th { background: #333; color: #fff; padding: 8px; border: 1px solid #000; }
        .med-table td { padding: 2px; border: 1px solid #000; background: #fff; vertical-align: top; }
        .med-table textarea { width: 100%; border: none; font-weight: bold; resize: none; overflow: hidden; min-height: 30px; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #263238; color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-weight: bold; }

        /* PRINT STYLES */
        #printArea { display: none; }
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { display: block; position: absolute; left: 0; top: 0; width: 100%; }
            .print-page { page-break-after: always; height: 297mm; position: relative; padding: 0.8cm; box-sizing: border-box; color: #000; }
            .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.08; width: 450px; z-index: -1; }
            .print-text-wrap { white-space: pre-wrap; font-weight: bold; display: block; font-size: 14pt; }
            @page { margin: 0; size: A4; }
        }

        .print-header { display: flex; align-items: center; border-bottom: 4px solid #1b5e20; padding-bottom: 8px; margin-bottom: 15px; }
        .print-hospital-name { text-align: center; flex: 1; }
        .print-hospital-name h1 { color: #c62828; margin: 0; font-size: 32pt; text-transform: uppercase; white-space: nowrap; }
        .print-doc-box { border: 2px solid #000; padding: 8px; text-align: right; min-width: 320px; border-radius: 6px; }
        .print-data-box { border: 1.5px solid #000; padding: 12px; font-size: 14pt; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 10px; }
        .print-vitals-box { border: 1.5px solid #000; border-top: none; padding: 12px; background: #e8f5e9 !important; display: flex; justify-content: space-between; font-size: 14pt; -webkit-print-color-adjust: exact; font-weight: bold; }
        
        .print-footer { position: absolute; bottom: 0.8cm; left: 0.8cm; right: 0.8cm; text-align: center; }
        .telugu-line { font-size: 12pt; color: #1b5e20; font-weight: bold; margin-bottom: 5px; }
        .footer-banner { background: #0d47a1 !important; color: white !important; padding: 12px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 15pt; -webkit-print-color-adjust: exact; border-radius: 8px; }
        .footer-icon { width: 45px; height: 45px; filter: brightness(0) invert(1); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.jpg" style="width:90px">
        <div class="center-side">
            <h1>SRI RAJA RAJESHWARI HOSPITAL</h1>
            <p style="font-size:11px; font-weight:bold;">SURARAM COLONY 1ST OM JANDA NTR ROAD OPP: RAMALEELA MAIDANAM TG 500055</p>
        </div>
        <div class="doc-side">
            <b style="font-size: 18px;">DR. M. JAYACHANDER</b><br>
            <span>MBBS, M.D. (GENERAL MEDICINE)</span>
        </div>
    </div>

    <div class="grid">
        <input type="text" id="p_name" placeholder="Patient Name">
        <input type="number" id="p_age" placeholder="Age">
        <select id="p_sex"><option>Male</option><option>Female</option></select>
        <input type="text" id="p_phone" placeholder="Phone Number">
        <input type="text" id="p_address" placeholder="Address">
        <input type="text" id="p_weight" placeholder="Weight">
        <input type="text" id="p_bp" placeholder="BP">
        <input type="text" id="p_pr" placeholder="Pulse">
        <input type="text" id="p_spo2" placeholder="SpO2">
        <input type="text" id="p_temp" placeholder="Temp">
    </div>
    <button class="btn btn-reg" id="submitBtn" onclick="savePatient('REGISTRATION')">Register Patient</button>

    <input type="text" id="pSearch" style="width:100%; margin-top:20px; padding:15px; border:3px solid var(--primary); border-radius: 8px;" placeholder="🔍 Search Patient Name..." onkeyup="filterTable()">

    <table>
        <thead><tr><th>OPD ID</th><th>Name</th><th>Action</th></tr></thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<div id="printArea"></div>

<div id="actionModal" class="modal">
    <div class="modal-content">
        <h2 id="menuPatientName" style="color: var(--primary); border-bottom: 2px solid #ccc; padding-bottom: 10px;"></h2>
        <div class="menu-grid">
            <button class="menu-btn" style="background:#1565c0;" onclick="openEdit()">EDIT DETAILS</button>
            <button class="menu-btn" style="background:#ef6c00;" onclick="openTreat()">TREAT</button>
            <button class="menu-btn" style="background:#2e7d32;" onclick="generatePrint('PRESCRIPTION')">PRINT PRESCRIPTION</button>
            <button class="menu-btn" style="background:#c62828;" onclick="generatePrint('REGISTRATION')">PRINT REGISTRATION</button>
        </div>
        <button class="btn" style="width:100%; margin-top:20px; background:#666; color: white;" onclick="resetForm()">Close</button>
    </div>
</div>

<div id="treatModal" class="modal">
    <div class="modal-content">
        <h2 style="color: #ef6c00; border-bottom: 2px solid #ef6c00;">Patient Treatment</h2>
        <div style="margin-top:10px;"><label><b>1. Complaints:</b></label><textarea id="t_complaints" rows="2"></textarea></div>
        <div style="margin-top:10px;"><label><b>2. Investigations:</b></label><textarea id="t_investigations" rows="2"></textarea></div>
        <div style="margin-top:10px;"><label><b>3. Past History:</b></label><textarea id="t_history" rows="2"></textarea></div>
        <div style="margin-top:10px;">
            <label><b>4. Medications:</b></label>
            <table class="med-table">
                <thead><tr><th style="width:40%;">Drug Name</th><th style="width:10%;">Dur</th><th style="width:15%;">Route</th><th style="width:30%;">Remarks</th><th style="width:5%;"></th></tr></thead>
                <tbody id="medBody"></tbody>
            </table>
            <button class="btn" style="background:#2196f3; color:white; padding:5px 15px;" onclick="addMedRow()">+ Add Drug</button>
        </div>
        <div style="margin-top:10px;"><label><b>5. Notes:</b></label><textarea id="t_notes" rows="2"></textarea></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn" style="background:var(--primary); color:white; flex:1;" onclick="saveTreatment()">Save Treatment</button>
            <button class="btn" style="background:#666; color:white; flex:1;" onclick="closeTreat()">Cancel</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbybybQ8Z-63ZqoGpGyzjLdE5YgNopWSIRr1BHdrKgF3wNliSigX689zFIWco02kAJbo/exec";
    let patients = [], selectedP = null;

    function loadData() {
        const script = document.createElement('script');
        script.src = `${API_URL}?callback=handleResponse&ts=${Date.now()}`;
        document.body.appendChild(script);
    }

    function handleResponse(data) { patients = data; renderTable(data); }

    function renderTable(list) {
        document.getElementById('tbody').innerHTML = list.map(p => `
            <tr><td><b style="color:var(--accent);">${p.opd_number}</b></td><td>${p.name}</td>
            <td><button class="btn" style="background:var(--primary); color:white; padding:5px 15px;" onclick="openMenu('${p.opd_number}')">Select</button></td></tr>
        `).reverse().join('');
    }

    function openMenu(id) {
        selectedP = patients.find(p => p.opd_number === id);
        document.getElementById('menuPatientName').innerText = "Patient: " + selectedP.name;
        document.getElementById('actionModal').style.display = "block";
    }

    // FIXED EDIT FUNCTION
    function openEdit() {
        document.getElementById('p_name').value = selectedP.name || "";
        document.getElementById('p_age').value = selectedP.age || "";
        document.getElementById('p_sex').value = selectedP.sex || "Male";
        document.getElementById('p_phone').value = selectedP.phone || "";
        document.getElementById('p_address').value = selectedP.address || "";
        document.getElementById('p_weight').value = selectedP.weight || "";
        document.getElementById('p_bp').value = selectedP.bp || "";
        document.getElementById('p_pr').value = selectedP.pr || "";
        document.getElementById('p_spo2').value = selectedP.spo2 || "";
        document.getElementById('p_temp').value = selectedP.temp || "";
        
        const subBtn = document.getElementById('submitBtn');
        subBtn.innerText = "UPDATE DETAILS";
        subBtn.onclick = () => savePatient('UPDATE_DETAILS');
        document.getElementById('actionModal').style.display = "none";
        window.scrollTo(0,0);
    }

    function openTreat() {
        document.getElementById('actionModal').style.display = "none";
        document.getElementById('treatModal').style.display = "block";
        document.getElementById('t_complaints').value = selectedP.complaints || "";
        document.getElementById('t_investigations').value = selectedP.investigations || "";
        document.getElementById('t_history').value = selectedP.history || "";
        document.getElementById('t_notes').value = selectedP.notes || "";
        document.getElementById('medBody').innerHTML = "";
        try {
            const meds = JSON.parse(selectedP.medications || "[]");
            if(meds.length > 0) meds.forEach(m => addMedRow(m)); else addMedRow();
        } catch(e) { addMedRow(); }
    }

    function addMedRow(data = {n:'', d:'', r:'', rem:''}) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><textarea class="m-name">${data.n}</textarea></td>
            <td><textarea class="m-dur">${data.d}</textarea></td>
            <td><textarea class="m-route">${data.r}</textarea></td>
            <td><textarea class="m-rem">${data.rem}</textarea></td>
            <td class="remove-btn" onclick="this.parentElement.remove()">×</td>
        `;
        document.getElementById('medBody').appendChild(tr);
    }

    async function saveTreatment() {
        const meds = Array.from(document.querySelectorAll('#medBody tr')).map(tr => ({
            n: tr.querySelector('.m-name').value,
            d: tr.querySelector('.m-dur').value,
            r: tr.querySelector('.m-route').value,
            rem: tr.querySelector('.m-rem').value
        })).filter(m => m.n !== "");
        const data = { type: "SAVE_TREATMENT", opd: selectedP.opd_number, complaints: document.getElementById('t_complaints').value, investigations: document.getElementById('t_investigations').value, history: document.getElementById('t_history').value, medications: JSON.stringify(meds), notes: document.getElementById('t_notes').value };
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        alert("Saved!"); location.reload();
    }

    const getFullPageSetup = (pContent) => `
        <div class="print-page">
            <img src="logo.jpg" class="watermark">
            <div class="print-header">
                <img src="logo.jpg" style="width:85px;">
                <div class="print-hospital-name">
                    <h1>SRI RAJA RAJESHWARI HOSPITAL</h1>
                    <p style="font-size:10pt; font-weight:bold; margin-top:5px;">SURARAM COLONY 1ST OM JANDA NTR ROAD OPP: RAMALEELA MAIDANAM TG 500055</p>
                </div>
                <div class="print-doc-box">
                    <div style="font-size:19pt; font-weight:bold;">DR. M. JAYACHANDER</div>
                    <div style="font-size:12pt; font-weight:bold;">MBBS, M.D. (GENERAL MEDICINE)</div>
                    <div style="color:#c62828; font-size:12pt; font-weight:bold;">Reg No: TSMC/FMR/43070</div>
                </div>
            </div>
            ${pContent}
            <div class="print-footer">
                <div style="text-align:right; margin-bottom:35px; font-weight:bold; font-size:14pt;">DR. M. JAYACHANDER<br><span style="font-size:11pt;">MBBS, M.D. (GENERAL MEDICINE)</span></div>
                <div class="telugu-line">మా ప్రత్యేక సేవలు: బిపి, షుగర్, గుండె వ్యాధులు, కాలేయ వ్యాధులు, కిడ్నీ సమస్యలు, పక్షవాతం, థైరాయిడ్ చూడబడును.</div>
                <div style="font-size:11pt; color:black; font-weight:bold; margin-bottom:8px;">NOTE: దయచేసి ప్రతిసారి వచ్చేటప్పుడు ఈ ప్రిస్క్రిప్షన్ ఫైల్ తీసుకురావలెను.</div>
                <div class="footer-banner">
                    <img src="https://cdn-icons-png.flaticon.com/512/3028/3028573.png" class="footer-icon">
                    <span>SRI RAJA RAJESHWARI MEDICAL AND GENERAL STORES</span>
                    <img src="https://cdn-icons-png.flaticon.com/512/822/822143.png" class="footer-icon">
                </div>
            </div>
        </div>
    `;

    function generatePrint(type) {
        const info = `<div class="print-data-box"><div><b>OPD ID:</b> ${selectedP.opd_number}<br><br><b>Name:</b> <span style="font-size:18pt; text-transform:uppercase;">${selectedP.name}</span><br><br><b>Phone:</b> ${selectedP.phone || 'N/A'}</div><div style="text-align:right;"><b>Date:</b> ${new Date().toLocaleDateString()}<br><br><b>Age/Sex:</b> ${selectedP.age} / ${selectedP.sex}<br><br><b>Address:</b> ${selectedP.address}</div></div><div class="print-vitals-box"><span>Weight: ${selectedP.weight}kg</span><span>BP: ${selectedP.bp}</span><span>Pulse: ${selectedP.pr}</span><span>SpO2: ${selectedP.spo2}%</span><span>Temp: ${selectedP.temp}°F</span></div>`;

        if (type === 'REGISTRATION') {
            document.getElementById('printArea').innerHTML = getFullPageSetup(info);
        } else {
            const meds = JSON.parse(selectedP.medications || "[]");
            const first8 = meds.slice(0, 8);
            const remaining = meds.slice(8);
            
            let p1 = info + `<div style="margin-top:15px;"><p><b>Complaints:</b> <span class="print-text-wrap">${selectedP.complaints || '---'}</span></p><p><b>Investigations:</b> <span class="print-text-wrap">${selectedP.investigations || '---'}</span></p><p><b>Past History:</b> <span class="print-text-wrap">${selectedP.history || '---'}</span></p><h3 style="border-bottom:2px solid #000;">Rx (Medications)</h3><table class="med-table"><thead><tr><th>Drug Name</th><th style="width:12%">Dur</th><th style="width:15%">Route</th><th>Remarks</th></tr></thead><tbody>${first8.map(m => `<tr><td>${m.n}</td><td>${m.d}</td><td>${m.r}</td><td>${m.rem}</td></tr>`).join('')}</tbody></table>${remaining.length === 0 ? `<p><b>Notes:</b> <span class="print-text-wrap">${selectedP.notes || '---'}</span></p>` : ''}</div>`;
            
            let finalHtml = getFullPageSetup(p1);
            if(remaining.length > 0) {
                let p2 = info + `<div style="margin-top:15px;"><h3 style="border-bottom:2px solid #000;">Rx (Continued)</h3><table class="med-table"><thead><tr><th>Drug Name</th><th style="width:12%">Dur</th><th style="width:15%">Route</th><th>Remarks</th></tr></thead><tbody>${remaining.map(m => `<tr><td>${m.n}</td><td>${m.d}</td><td>${m.r}</td><td>${m.rem}</td></tr>`).join('')}</tbody></table><p><b>Notes:</b> <span class="print-text-wrap">${selectedP.notes || '---'}</span></p></div>`;
                finalHtml += getFullPageSetup(p2);
            }
            document.getElementById('printArea').innerHTML = finalHtml;
        }
        window.print();
    }

    async function savePatient(type) {
        const data = { type: type, opd: type === 'REGISTRATION' ? "SRR-"+Date.now().toString().slice(-4) : selectedP.opd_number, name: document.getElementById('p_name').value, age: document.getElementById('p_age').value, sex: document.getElementById('p_sex').value, phone: document.getElementById('p_phone').value, address: document.getElementById('p_address').value, weight: document.getElementById('p_weight').value, bp: document.getElementById('p_bp').value, pr: document.getElementById('p_pr').value, spo2: document.getElementById('p_spo2').value, temp: document.getElementById('p_temp').value };
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        alert("Success!"); resetForm(); location.reload();
    }

    function filterTable() { renderTable(patients.filter(p => p.name.toLowerCase().includes(document.getElementById('pSearch').value.toLowerCase()))); }
    function closeTreat() { document.getElementById('treatModal').style.display = "none"; }
    function resetForm() {
        ['name','age','sex','phone','address','weight','bp','pr','spo2','temp'].forEach(k => document.getElementById('p_'+k).value = (k==='sex'?'Male':''));
        document.getElementById('submitBtn').innerText = "Register Patient";
        document.getElementById('submitBtn').onclick = () => savePatient('REGISTRATION');
        document.getElementById('actionModal').style.display = "none";
    }
    window.onload = loadData;
</script>
</body>
</html>
