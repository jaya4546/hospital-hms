<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRR Hospital Management System</title>
    <style>
        :root { --primary: #1b5e20; --accent: #c62828; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 10px; font-size: 12pt; color: #333; }
        
        .container { max-width: 1150px; margin: auto; background: white; padding: 20px; border-radius: 8px; border-top: 8px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Header */
        .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 20px; gap: 10px; }
        .logo-img { width: 80px; height: auto; object-fit: contain; }
        .center-side { text-align: left; flex: 1; padding-left: 15px; }
        .center-side h1 { color: var(--accent); margin: 0; font-size: 22px; font-weight: 900; text-transform: uppercase; }
        
        .doc-side { border: 2px solid #000; padding: 10px; text-align: center; background: #fffde7; min-width: 250px; border-radius: 8px; }
        .doc-name { font-size: 16px; font-weight: 900; display: block; }

        /* Input Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1.5px solid #000; border-radius: 4px; font-size: 11pt; box-sizing: border-box; }
        
        /* Buttons */
        .btn { padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .btn-reg { background: var(--primary); color: white; width: 100%; font-size: 14pt; margin-top: 10px; }
        
        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th { background: #263238; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; font-weight: bold; }

        /* Action Modal from Photo */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: white; margin: 5% auto; padding: 30px; width: 90%; max-width: 700px; border-radius: 12px; text-align: center; border: 4px solid var(--primary); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        
        .m-btn { padding: 20px; color: white; border: none; border-radius: 6px; font-weight: 900; cursor: pointer; font-size: 11pt; text-transform: uppercase; }
        .m-blue { background: #1565c0; }
        .m-orange { background: #e65100; }
        .m-green { background: #2e7d32; }
        .m-red { background: #c62828; }
        .m-close { background: #263238; width: 100%; margin-top: 20px; }

        .btn-select { background: #2e7d32; color: white; padding: 8px 15px; border-radius: 4px; }
        .btn-delete { background: #d32f2f; color: white; padding: 8px 15px; border-radius: 4px; margin-left: 5px; }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body onload="loadData()">

<div class="container no-print">
    <div class="header">
        <!-- Logo Restored -->
        <img src="logo.jpg" class="logo-img" alt="Hospital Logo" onerror="this.src='https://via.placeholder.com/80?text=LOGO'">
        <div class="center-side">
            <h1>SRI RAJA RAJESHWARI HOSPITAL</h1>
            <span style="font-weight: bold; color: var(--primary);">Suraram Colony, NTR Road, Hyderabad - 500055</span><br>
            <span style="font-weight: bold;">📞 9201955976</span>
        </div>
        <div class="doc-side">
            <span class="doc-name">DR. M. JAYACHANDER</span>
            <small>MBBS, M.D. (GENERAL MEDICINE)</small><br>
            <small style="color:var(--accent); font-weight:bold;">Reg No: TSMC/FMR/43070</small>
        </div>
    </div>

    <!-- Registration Fields -->
    <div class="grid">
        <input type="text" id="p_name" placeholder="Patient Name">
        <input type="number" id="p_age" placeholder="Age">
        <select id="p_sex"><option>Male</option><option>Female</option></select>
        <input type="text" id="p_phone" placeholder="Phone Number">
        <input type="text" id="p_address" placeholder="Address">
        <input type="text" id="p_weight" placeholder="Weight">
        <input type="text" id="p_bp" placeholder="B.P.">
        <input type="text" id="p_temp" placeholder="Temp">
        <input type="text" id="p_spo2" placeholder="SpO2">
        <input type="text" id="p_pr" placeholder="Pulse Rate">
    </div>
    <button class="btn btn-reg" id="regBtn" onclick="savePatient()">Register & Save Patient</button>

    <input type="text" id="pSearch" style="margin-top:30px; border: 3px solid var(--primary); padding:15px; font-size:14pt;" placeholder="🔍 SEARCH BY NAME..." oninput="searchData()">

    <table>
        <thead>
            <tr>
                <th>OPD ID</th>
                <th>Patient Name</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<!-- ACTION MENU MODAL (Matching WhatsApp Image 2026-05-13 at 10.24.29 AM.jpg) -->
<div id="actionModal" class="modal">
    <div class="modal-content">
        <h2 id="modalPatientName" style="color: #c62828; border-bottom: 2px solid #ddd; padding-bottom: 10px;">PATIENT NAME</h2>
        <div class="menu-grid">
            <button class="m-btn m-blue" onclick="editPatient()">EDIT DETAILS</button>
            <button class="m-btn m-orange" onclick="openTreatment()">ADD TREATMENT</button>
            
            <button class="m-btn m-green" onclick="printReport('RX_WITH')">PRINT RX (WITH HEADER)</button>
            <button class="m-btn m-red" onclick="printReport('REG_WITH')">PRINT REG (WITH HEADER)</button>
            
            <button class="m-btn m-green" onclick="printReport('RX_WITHOUT')">PRINT RX (WITHOUT HEADER)</button>
            <button class="m-btn m-red" onclick="printReport('REG_WITHOUT')">PRINT REG (WITHOUT HEADER)</button>
        </div>
        <button class="m-btn m-close" onclick="closeModal()">CLOSE</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzRFOEzBLp9BgCYesNSd3of00f5h1hN5N_8dWYcRfFbp7oDnhlu44Cn5uek1km23Qpu/exec";
    let patients = [];
    let selectedOPD = null;

    // Load Data
    function loadData() {
        const script = document.createElement('script');
        script.src = `${API_URL}?callback=callbackFunc&ts=${Date.now()}`;
        document.body.appendChild(script);
    }

    function callbackFunc(data) {
        patients = data;
        renderTable(patients);
    }

    function renderTable(list) {
        const rows = list.map(p => `
            <tr>
                <td>${p.opd_number}</td>
                <td>${p.name}</td>
                <td>
                    <button class="btn-select" onclick="openActionMenu('${p.opd_number}', '${p.name}')">SELECT</button>
                    <button class="btn-delete" onclick="deletePatient('${p.opd_number}')">DELETE</button>
                </td>
            </tr>
        `).reverse().join('');
        document.getElementById('tbody').innerHTML = rows;
    }

    // Modal Controls
    function openActionMenu(opd, name) {
        selectedOPD = opd;
        document.getElementById('modalPatientName').innerText = name.toUpperCase();
        document.getElementById('actionModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('actionModal').style.display = 'none';
    }

    // Functions for Menu Buttons
    function editPatient() {
        const p = patients.find(x => String(x.opd_number) === String(selectedOPD));
        document.getElementById('p_name').value = p.name;
        document.getElementById('p_phone').value = p.phone;
        // Add other fields as needed...
        closeModal();
        window.scrollTo(0,0);
    }

    function openTreatment() {
        alert("Opening Treatment Records for OPD: " + selectedOPD);
        // Add your treatment modal logic here
    }

    function printReport(type) {
        alert("Preparing to print: " + type + " for OPD: " + selectedOPD);
        // Add your window.print() logic or redirect to print page here
    }

    // Save Patient
    async function savePatient() {
        const btn = document.getElementById('regBtn');
        const data = {
            type: "SAVE_PATIENT",
            name: document.getElementById('p_name').value,
            phone: document.getElementById('p_phone').value,
            age: document.getElementById('p_age').value,
            sex: document.getElementById('p_sex').value,
            address: document.getElementById('p_address').value,
            weight: document.getElementById('p_weight').value,
            bp: document.getElementById('p_bp').value,
            temp: document.getElementById('p_temp').value
        };

        if(!data.name) return alert("Enter Name");

        btn.innerText = "SAVING...";
        btn.disabled = true;

        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        
        alert("Patient Registered!");
        location.reload();
    }

    async function deletePatient(id) {
        if(!confirm("Delete record " + id + "?")) return;
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({type: "DELETE_PATIENT", opd: id}) });
        location.reload();
    }

    function searchData() {
        const term = document.getElementById('pSearch').value.toLowerCase();
        const filtered = patients.filter(p => p.name.toLowerCase().includes(term));
        renderTable(filtered);
    }
</script>
</body>
</html>
