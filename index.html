<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRR Hospital HMS - Final Build</title>
    <style>
        :root { --primary: #1b5e20; --accent: #c62828; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 12px; border-top: 10px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Header Styling */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; }
        .logo { width: 80px; height: 80px; object-fit: cover; }
        .hosp-title { text-align: center; flex: 1; }
        .hosp-title h1 { color: var(--accent); margin: 0; font-size: 24px; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; }
        .hosp-title p { margin: 2px; font-weight: bold; color: #333; }
        
        /* Dashboard Bar */
        .opd-bar { background: #e8f5e9; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; color: var(--primary); display: flex; justify-content: space-between; font-size: 14px; border: 1px solid #c8e6c9; }
        
        /* Form Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; transition: border 0.3s; }
        input:focus { border-color: var(--primary); outline: none; background: #fffde7; }
        
        /* Buttons */
        .btn { padding: 14px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; width: 100%; font-size: 16px; text-transform: uppercase; transition: 0.3s; }
        .btn-reg { background: var(--primary); box-shadow: 0 4px #144316; }
        .btn-reg:active { box-shadow: 0 2px #144316; transform: translateY(2px); }
        .btn:disabled { background: #999 !important; box-shadow: none !important; cursor: not-allowed; }
        
        /* Table Styling */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; background: white; }
        th { background: #263238; color: white; padding: 12px; text-align: left; font-size: 14px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; color: #333; }
        tr:hover { background-color: #f9f9f9; }
        .opd-cell { font-weight: 900; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.jpg" class="logo" alt="SRR Logo">
        <div class="hosp-title">
            <h1>SRI RAJA RAJESHWARI HOSPITAL</h1>
            <p>Suraram Colony, Hyderabad, Telangana</p>
        </div>
        <div style="text-align: right; font-size: 13px; line-height: 1.4;">
            <b style="color:var(--primary); font-size: 15px;">Dr. M. Jayachander</b><br>
            MBBS, MD (General Medicine)
        </div>
    </div>

    <div class="opd-bar">
        <span><i class="icon">📅</i> Date: <span id="curDate"></span></span>
        <span><i class="icon">🆔</i> Next OPD: <span id="nextOPD">Loading...</span></span>
    </div>

    <div class="grid">
        <input type="text" id="p_name" placeholder="Patient Name (Required)">
        <input type="number" id="p_age" placeholder="Age">
        <select id="p_sex">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
        </select>
        <input type="text" id="p_vil" placeholder="Village/Area">
        <input type="text" id="p_phone" placeholder="Phone Number">
        <input type="text" id="p_weight" placeholder="Weight (kg)">
        <input type="text" id="p_bp" placeholder="Blood Pressure (BP)">
        <input type="text" id="p_pulse" placeholder="Pulse Rate">
        <input type="text" id="p_spo2" placeholder="SpO2 %">
        <input type="text" id="p_temp" placeholder="Temperature">
    </div>
    
    <input type="hidden" id="edit_opd">
    <button id="saveBtn" class="btn btn-reg" onclick="savePatient()">Register & Save Patient</button>
    <button id="cancelBtn" class="btn" style="background:#7f8c8d; display:none; margin-top:8px;" onclick="resetForm()">Cancel Edit</button>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>OPD ID</th>
                    <th>Patient Name</th>
                    <th>Phone Number</th>
                    <th>Weight</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tbody">
                </tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxWIJnOjylaYJBb_KvYjrE58m3VXWQf9n-tPWPYol9uqs1b8yC77cnAilUNAOLUv9Dt/exec";
    
    // Set current date on load
    document.getElementById('curDate').innerText = new Date().toLocaleDateString('en-IN');

    async function load() {
        const tbody = document.getElementById('tbody');
        try {
            const r = await fetch(API_URL + "?nocache=" + Date.now());
            const patients = await r.json();
            
            // Calculate Next OPD Number
            if(patients.length > 0) {
                const lastOPD = patients[0].opd_no; 
                const numOnly = parseInt(lastOPD.replace("SRR-", ""));
                document.getElementById('nextOPD').innerText = "SRR-" + (isNaN(numOnly) ? 1001 : numOnly + 1);
            } else {
                document.getElementById('nextOPD').innerText = "SRR-1001";
            }

            // Render Rows - Use phone_number and weight keys strictly
            tbody.innerHTML = patients.map(p => `
                <tr>
                    <td class="opd-cell">${p.opd_no}</td>
                    <td>${p.name}</td>
                    <td>${p.phone_number || '-'}</td>
                    <td>${p.weight ? p.weight + ' kg' : '-'}</td>
                    <td>
                        <button style="background:#0288d1; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer;" 
                        onclick="editPatient('${p.opd_no}')">Edit</button>
                    </td>
                </tr>
            `).join('');
        } catch(e) {
            tbody.innerHTML = "<tr><td colspan='5' style='text-align:center; color:red;'>Failed to sync with server. Check Apps Script.</td></tr>";
        }
    }

    async function savePatient() {
        const nameInput = document.getElementById('p_name');
        if(!nameInput.value) {
            alert("Please enter the Patient Name.");
            return;
        }

        const editOpd = document.getElementById('edit_opd').value;
        const saveBtn = document.getElementById('saveBtn');
        
        // Prepare strict data object
        const data = {
            type: editOpd ? "UPDATE_DETAILS" : "REGISTRATION",
            opd: editOpd || document.getElementById('nextOPD').innerText,
            date: document.getElementById('curDate').innerText,
            name: nameInput.value,
            age: document.getElementById('p_age').value,
            sex: document.getElementById('p_sex').value,
            village: document.getElementById('p_vil').value,
            phone: document.getElementById('p_phone').value,
            weight: document.getElementById('p_weight').value,
            bp: document.getElementById('p_bp').value,
            pulse: document.getElementById('p_pulse').value,
            spo2: document.getElementById('p_spo2').value,
            temp: document.getElementById('p_temp').value
        };

        saveBtn.disabled = true;
        saveBtn.innerText = "Syncing with Database...";

        try {
            const res = await fetch(API_URL, { 
                method: 'POST', 
                mode: 'no-cors', // Essential for Google Apps Script POST
                body: JSON.stringify(data) 
            });
            
            // Since no-cors doesn't return text, we wait a moment then reload
            setTimeout(() => {
                resetForm();
                load();
            }, 1500);
            
        } catch(e) {
            alert("Error saving data. Try again.");
            saveBtn.disabled = false;
            saveBtn.innerText = "Register & Save Patient";
        }
    }

    function resetForm() {
        document.getElementById('edit_opd').value = "";
        const sBtn = document.getElementById('saveBtn');
        sBtn.innerText = "Register & Save Patient";
        sBtn.disabled = false;
        document.getElementById('cancelBtn').style.display = "none";
        document.querySelectorAll('.grid input').forEach(i => i.value = "");
    }

    // Initialize data
    load();
</script>
</body>
</html>
