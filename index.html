<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRR Hospital Management</title>
    <style>
        :root { --primary: #1b5e20; --accent: #c62828; --bg: #f4f7f6; --lab: #0277bd; --edit: #1565c0; --treat: #ef6c00; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; border-top: 10px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Header Fixes */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); padding-bottom: 12px; margin-bottom: 20px; }
        .logo { width: 85px; height: 85px; object-fit: contain; }
        .hosp-title { text-align: center; flex: 1; }
        .hosp-title h1 { color: var(--accent); margin: 0; font-size: 20px; text-transform: uppercase; font-weight: 900; white-space: nowrap; letter-spacing: -0.5px; }
        
        .doc-box { border: 2px solid #000; padding: 8px; min-width: 250px; text-align: right; background: #fffde7; border-radius: 4px; box-shadow: 2px 2px 0px #000; line-height: 1.2; }
        .doc-box b { font-weight: 900; font-size: 15px; display: block; margin-bottom: 2px; }
        .doc-box span { font-size: 11px; font-weight: 700; display: block; }

        .opd-bar { background: #e8f5e9; padding: 12px; border-radius: 6px; margin-bottom: 15px; font-weight: bold; color: var(--primary); display: flex; justify-content: space-between; border: 1px solid #c8e6c9; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }

        .btn { padding: 10px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; text-transform: uppercase; }
        .btn-reg { background: var(--primary); width: 100%; padding: 15px; font-size: 16px; }
        .btn-edit { background: var(--edit); padding: 5px 8px; font-size: 11px; }
        .btn-treat { background: var(--treat); padding: 5px 8px; font-size: 11px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #263238; color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }

        #printSection { display: none; }

        @media print {
            @page { size: A4; margin: 0; }
            body * { visibility: hidden; }
            #printSection, #printSection * { visibility: visible; }
            #printSection { display: flex; flex-direction: column; position: absolute; left: 0; top: 0; width: 100%; height: 100vh; padding: 40px; box-sizing: border-box; background: white !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.jpg" class="logo">
        <div class="hosp-title">
            <h1>SRI RAJA RAJESHWARI HOSPITAL</h1>
            <div style="font-size: 10px; font-weight: 700;">Suraram colony NTR road, Telangana 500055</div>
        </div>
        <div class="doc-box">
            <b>DR. M. JAYACHANDER</b>
            <span>MBBS, MD (General Medicine)</span>
            <span style="color:var(--accent); border-top:1px solid #000; margin-top:3px; padding-top:2px;">REG NO: TSMC/FMR/43070</span>
        </div>
    </div>

    <div class="opd-bar">
        <span>📅 Date: <span id="curDate"></span></span>
        <span>🆔 Next OPD ID: <span id="nextOPD">...</span></span>
    </div>

    <div class="grid">
        <input type="text" id="p_name" placeholder="Patient Name">
        <input type="number" id="p_age" placeholder="Age">
        <select id="p_sex"><option>Male</option><option>Female</option></select>
        <input type="text" id="p_vil" placeholder="Village">
        <input type="text" id="p_phone" placeholder="Phone">
        <input type="text" id="p_weight" placeholder="Weight">
        <input type="text" id="p_bp" placeholder="BP">
        <input type="text" id="p_pulse" placeholder="Pulse">
        <input type="text" id="p_spo2" placeholder="SpO2">
        <input type="text" id="p_temp" placeholder="Temp">
    </div>
    
    <input type="hidden" id="edit_opd">
    <button id="saveBtn" class="btn btn-reg" onclick="savePatient()">Register Patient</button>

    <input type="text" id="pSearch" style="width:100%; margin-top:20px; padding:12px; border:2px solid var(--primary); border-radius:8px;" placeholder="🔍 Search Patients..." onkeyup="filterTable()">

    <table>
        <thead><tr><th>OPD ID</th><th>Name</th><th>Phone</th><th>Actions</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="4" style="text-align:center;">Connecting to clinical database...</td></tr></tbody>
    </table>
</div>

<div id="printSection"></div>

<script>
    // Updated API URL
    const API_URL = "https://script.google.com/macros/s/AKfycbwkHV41HwwKwvH8GgiYNkwcgmJPfPrIo0gfHnbW9IldvSynQcXXHuA5X8SSqLbXvM1T/exec";
    
    let patients = [];

    document.getElementById('curDate').innerText = new Date().toLocaleDateString('en-IN');

    // JSONP Loader to bypass security blocks
    function loadData() {
        const script = document.createElement('script');
        script.src = API_URL + "?callback=handleResponse&ts=" + new Date().getTime();
        document.body.appendChild(script);
    }

    // This handles the data when Google sends it back
    function handleResponse(data) {
        patients = data;
        renderTable(patients);
        if(patients.length > 0) {
            // Find highest OPD ID to set next ID
            const lastNo = parseInt(patients[patients.length-1].opd_no.split('-')[1]) || 1000;
            document.getElementById('nextOPD').innerText = "SRR-" + (lastNo + 1);
        } else { document.getElementById('nextOPD').innerText = "SRR-1001"; }
    }

    function renderTable(dataList) {
        if(!dataList || dataList.length === 0) {
            document.getElementById('tbody').innerHTML = "<tr><td colspan='4' style='text-align:center;'>No records found in database.</td></tr>";
            return;
        }
        document.getElementById('tbody').innerHTML = dataList.map(p => `
            <tr>
                <td><b>${p.opd_no}</b></td>
                <td style="text-transform:uppercase;">${p.name}</td>
                <td>${p.phone_number || '-'}</td>
                <td>
                    <button class="btn btn-edit" onclick="editPatient('${p.opd_no}')">Edit</button>
                    <button class="btn btn-treat" onclick="alert('Treating ${p.name}')">Treat</button>
                </td>
            </tr>
        `).reverse().join('');
    }

    async function savePatient() {
        const data = {
            type: "REGISTRATION",
            opd: document.getElementById('nextOPD').innerText,
            date: document.getElementById('curDate').innerText,
            name: document.getElementById('p_name').value,
            age: document.getElementById('p_age').value,
            sex: document.getElementById('p_sex').value,
            village: document.getElementById('p_vil').value,
            phone: document.getElementById('p_phone').value,
            weight: document.getElementById('p_weight').value,
            bp: document.getElementById('p_bp').value,
            pulse: document.getElementById('p_pulse').value,
            spo2: document.getElementById('p_spo2').value,
            temp: document.getElementById('p_temp').value
        };
        if(!data.name) return alert("Please enter a patient name");

        // Submit via no-cors mode for widest compatibility
        fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
        .then(() => {
            alert("Registration Submitted Successfully!");
            location.reload();
        });
    }

    function filterTable() {
        const t = document.getElementById('pSearch').value.toLowerCase();
        renderTable(patients.filter(p => p.name.toLowerCase().includes(t) || p.opd_no.toLowerCase().includes(t)));
    }

    // Trigger data load
    loadData();
</script>
</body>
</html>
