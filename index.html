<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRR Hospital Management System</title>
    <style>
        :root { --primary: #1b5e20; --accent: #c62828; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 10px; font-size: 12pt; color: #333; overflow-x: hidden; }
        
        .container { max-width: 1150px; margin: auto; background: white; padding: 20px; border-radius: 8px; border-top: 8px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 20px; gap: 5px; flex-wrap: nowrap; }
        .center-side { text-align: left; flex: 1; min-width: 0; padding-left: 10px; }
        .center-side h1 { color: var(--accent); margin: 0; font-size: 14px; font-weight: 900; text-transform: uppercase; white-space: nowrap; letter-spacing: -0.2px; }
        .full-address { font-size: 9px; font-weight: bold; color: #1b5e20; margin-top: 2px; display: block; white-space: nowrap; letter-spacing: -0.3px; }
        .hospital-phone { font-size: 11px; font-weight: bold; color: #000; margin-top: 3px; display: block; }
        
        .doc-side { border: 2px solid #000; padding: 6px; text-align: center; background: #fffde7; min-width: 220px; border-radius: 8px; flex-shrink: 0; }
        .doc-name { font-size: 15px; font-weight: 900; display: block; color: #000; }
        .doc-reg { font-size: 10px; font-weight: 900; display: block; color: var(--accent); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1.5px solid #000; border-radius: 4px; font-size: 11pt; box-sizing: border-box; }
        
        .btn { padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .btn-reg { background: var(--primary); color: white; width: 100%; font-size: 14pt; margin-top: 10px; }
        .btn-select { background: #2e7d32; color: white; padding: 8px 16px; border-radius: 4px; }
        .btn-delete { background: #d32f2f; color: white; padding: 8px 16px; border-radius: 4px; margin-left: 5px; }
        .btn-whatsapp { background: #25D366; color: white; padding: 8px 16px; border-radius: 4px; text-decoration: none; font-size: 10pt; display: inline-block; margin-left: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th { background: #263238; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; font-weight: bold; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; padding: 25px; width: 95%; max-width: 800px; border-radius: 12px; }

        #printArea { display: none; }
        
        @media print {
            @page { size: A4 portrait; margin: 0 !important; }
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { display: block !important; position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 0; }
            
            .print-page-wrapper { width: 210mm; min-height: 296mm; padding: 10mm; box-sizing: border-box; position: relative; page-break-after: always; background: white; overflow: hidden; }
            
            .watermark-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.1; z-index: 0; width: 400px; pointer-events: none; }
            
            .no-header-space { padding-top: 55mm !important; }

            .print-header { display: flex; align-items: center; justify-content: space-between; border-bottom: 4px solid #1b5e20; padding-bottom: 8px; margin-bottom: 15px; position: relative; z-index: 1; gap: 5px; }
            .hosp-title { color: #c62828 !important; margin: 0; font-size: 16pt; font-weight: 900; white-space: nowrap; letter-spacing: -0.5px; }
            
            .vitals-row { background: #e8f5e9 !important; border: 2.5px solid #000; border-top: none; padding: 8px; display: flex; justify-content: space-between; font-size: 13pt; font-weight: bold; position: relative; z-index: 1; }
            
            .med-table { width: 100%; border-collapse: collapse; border: 2px solid #000; margin-top: 10px; position: relative; z-index: 1; }
            .med-table th { background: #333 !important; color: white !important; padding: 8px; border: 1px solid #000; font-size: 11pt; }
            .med-table td { padding: 8px; border: 1px solid #000; font-size: 11pt; }

            .print-footer { position: absolute; bottom: 8mm; left: 10mm; right: 10mm; z-index: 1; }
            .footer-line { border-top: 2.5px solid #000; margin-top: 5px; }
            .services-list { font-size: 9.5pt; font-weight: bold; text-align: center; color: #1b5e20; line-height: 1.3; margin-bottom: 5px; }
            .notes-section { font-size: 8.5pt; font-weight: 900; text-align: left; color: #000; }
            .telugu-note { color: #1565c0; }
            
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.jpg" style="width:60px;">
        <div class="center-side">
            <h1>SRI RAJA RAJESHWARI HOSPITAL</h1>
            <span class="full-address">Suraram Colony, NTR Road, Opp: Ramaleela Maidanam, Hyderabad 500055</span>
            <span class="hospital-phone">📞 9201955976</span>
        </div>
        <div class="doc-side">
            <span class="doc-name">DR. M. JAYACHANDER</span>
            <span class="doc-degree" style="font-size:10px; font-weight:bold;">MBBS, M.D. (GENERAL MEDICINE)</span>
            <span class="doc-reg">Reg No: TSMC/FMR/43070</span>
        </div>
    </div>

    <input type="hidden" id="current_opd_id" value="">

    <div class="grid">
        <input type="text" id="p_name" placeholder="Patient Name">
        <input type="number" id="p_age" placeholder="Age">
        <select id="p_sex"><option>Male</option><option>Female</option></select>
        <input type="text" id="p_phone" placeholder="Phone">
        <input type="text" id="p_address" placeholder="Address">
        <input type="text" id="p_weight" placeholder="Weight">
        <input type="text" id="p_bp" placeholder="BP">
        <input type="text" id="p_pr" placeholder="Pulse">
        <input type="text" id="p_spo2" placeholder="SpO2">
        <input type="text" id="p_temp" placeholder="Temp">
    </div>
    <button class="btn btn-reg" id="mainActionBtn" onclick="savePatient()">Register Patient</button>
    
    <input type="text" id="pSearch" style="width:100%; margin-top:25px; padding:15px; border: 3px solid var(--primary); font-size: 14pt;" placeholder="🔍 TYPE NAME TO SEARCH..." oninput="aggressiveSearch()">
    <table>
        <thead><tr><th>OPD ID</th><th>Name</th><th>Action</th></tr></thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<div id="printArea"></div>

<div id="actionModal" class="modal">
    <div class="modal-content">
        <h2 id="menuPatientName" style="color:var(--accent); text-align:center;"></h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:20px;">
            <button class="btn" style="background:#1565c0; color:white;" onclick="openEdit()">EDIT DETAILS</button>
            <button class="btn" style="background:#ef6c00; color:white;" onclick="openTreat()">ADD TREATMENT</button>
            
            <button class="btn" style="background:#2e7d32; color:white;" onclick="generatePrint('PRESCRIPTION', true)">PRINT Rx (With Header)</button>
            <button class="btn" style="background:#c62828; color:white;" onclick="generatePrint('REGISTRATION', true)">PRINT REG (With Header)</button>
            
            <button class="btn" style="background:#2e7d32; color:white; border:2px solid #000;" onclick="generatePrint('PRESCRIPTION', false)">PRINT Rx (Without Header)</button>
            <button class="btn" style="background:#c62828; color:white; border:2px solid #000;" onclick="generatePrint('REGISTRATION', false)">PRINT REG (Without Header)</button>
        </div>
        <button class="btn" style="width:100%; margin-top:15px; background:#444; color:white;" onclick="document.getElementById('actionModal').style.display='none'">CLOSE</button>
    </div>
</div>

<div id="treatModal" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--primary);">Treatment for <span id="treatName"></span></h2>
        <textarea id="t_complaints" placeholder="Chief Complaints" rows="2"></textarea>
        <textarea id="t_investigations" placeholder="Investigations" rows="2"></textarea>
        <textarea id="t_history" placeholder="Past Medical History" rows="2"></textarea>
        <table style="width:100%; border-collapse: collapse;">
            <thead><tr style="background:#eee;"><th>Drug Name</th><th>Dur</th><th>Route</th><th>Remarks</th><th></th></tr></thead>
            <tbody id="medBody"></tbody>
        </table>
        <button class="btn" style="background:#2196f3; color:white; margin:10px 0;" onclick="addMedRow()">+ Add Medicine</button>
        <textarea id="t_notes" placeholder="Clinical Notes" rows="2"></textarea>
        <button class="btn btn-reg" onclick="saveTreatment()">Save Treatment</button>
        <button class="btn" style="width:100%; margin-top:10px; background:#666; color:white;" onclick="document.getElementById('treatModal').style.display='none'">Cancel</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwuHAceOQ9uOA60sIxpfBgpZ1Dv9uNAl9dwh3eMNtXz83hq0v39BSvB-232mru-Cdm-/exec";
    let patients = [], selectedP = null;

    function loadData() {
        const script = document.createElement('script');
        script.src = `${API_URL}?callback=handleResponse&ts=${Date.now()}`;
        document.body.appendChild(script);
    }
    
    function handleResponse(data) { 
        patients = data; 
        renderTable(patients); 
    }
    
    function renderTable(list) {
        const html = list.map(p => {
            return `<tr><td>${p.opd_number}</td><td>${p.name}</td><td>
                <button class="btn-select" onclick="openMenu('${p.opd_number}')">SELECT</button>
                <button class="btn-delete" onclick="deletePatient('${p.opd_number}')">DELETE</button>
                <button class="btn-whatsapp" onclick="sendWhatsApp('${p.opd_number}')">WhatsApp</button>
            </td></tr>`;
        }).reverse().join('');
        document.getElementById('tbody').innerHTML = html;
    }

    function sendWhatsApp(id) {
        const p = patients.find(pat => String(pat.opd_number) === String(id));
        if (!p) return;
        let medText = "";
        try {
            const meds = JSON.parse(p.medications || "[]");
            if (meds.length > 0) {
                medText = "%0A%0A*PRESCRIPTION:*%0A";
                meds.forEach((m, i) => { medText += `${i + 1}. ${m.n} -- ${m.d} -- ${m.r} -- (${m.rem})%0A`; });
            }
        } catch (e) { medText = ""; }
        const clinicalNotes = p.notes ? `%0A*Clinical Notes:* ${p.notes}` : "";
        const message = `*SRI RAJA RAJESHWARI HOSPITAL*%0A📞 9201955976%0A*Patient:* ${p.name}%0A*OPD ID:* ${p.opd_number}${medText}${clinicalNotes}`;
        window.open(`https://wa.me/91${p.phone}?text=${message}`, '_blank');
    }

    function deletePatient(id) {
        if(!confirm("⚠️ PERMANENTLY DELETE " + id + "?")) return;
        const ifrm = document.createElement('iframe'); ifrm.style.display = 'none'; ifrm.name = 'del_frame'; document.body.appendChild(ifrm);
        const form = document.createElement('form'); form.method = 'POST'; form.action = API_URL; form.target = 'del_frame';
        const t = document.createElement('input'); t.name = 'type'; t.value = 'DELETE_PATIENT'; form.appendChild(t);
        const o = document.createElement('input'); o.name = 'opd'; o.value = id; form.appendChild(o);
        document.body.appendChild(form); form.submit();
        alert("DELETION COMMAND SENT."); setTimeout(() => { location.reload(); }, 1200);
    }
    
    function aggressiveSearch() {
        const query = document.getElementById('pSearch').value.toUpperCase();
        document.querySelectorAll("#tbody tr").forEach(row => {
            row.style.display = row.innerText.toUpperCase().indexOf(query) > -1 ? "" : "none";
        });
    }

    function openMenu(id) {
        selectedP = patients.find(p => String(p.opd_number) === String(id));
        document.getElementById('menuPatientName').innerText = selectedP.name;
        document.getElementById('actionModal').style.display = "block";
    }

    function openEdit() {
        document.getElementById('current_opd_id').value = selectedP.opd_number;
        ['name','age','sex','phone','address','weight','bp','spo2','temp'].forEach(f => document.getElementById('p_'+f).value = selectedP[f] || "");
        document.getElementById('p_pr').value = selectedP.pulse || "";
        document.getElementById('mainActionBtn').innerText = "UPDATE PATIENT DETAILS";
        document.getElementById('actionModal').style.display = "none";
    }

    async function savePatient() {
        const data = { type: "REGISTRATION", opd: document.getElementById('current_opd_id').value || "SRR-"+Date.now().toString().slice(-4), name: document.getElementById('p_name').value, age: document.getElementById('p_age').value, sex: document.getElementById('p_sex').value, phone: document.getElementById('p_phone').value, address: document.getElementById('p_address').value, weight: document.getElementById('p_weight').value, bp: document.getElementById('p_bp').value, pulse: document.getElementById('p_pr').value, spo2: document.getElementById('p_spo2').value, temp: document.getElementById('p_temp').value };
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        location.reload();
    }

    function generatePrint(type, withHeaderFooter) {
        const headerHTML = withHeaderFooter ? `
            <div class="print-header">
                <img src="logo.jpg" style="width:70px; margin-right:10px;">
                <div style="flex:1; min-width: 0;">
                    <h1 class="hosp-title">SRI RAJA RAJESHWARI HOSPITAL</h1>
                    <p style="font-size:8.5pt; font-weight:bold; margin:2px 0; color:#1b5e20; white-space:nowrap; letter-spacing:-0.4px;">Suraram Colony, NTR Road, Opp: Ramaleela Maidanam, Hyd-55</p>
                    <p style="font-size:10pt; font-weight:bold; margin:0;">📞 9201955976</p>
                </div>
                <div style="border:2px solid #000; padding:8px; text-align:center; border-radius:8px; min-width:230px; background:#fffde7; flex-shrink:0;">
                    <div style="font-size:14pt; font-weight:900;">DR. M. JAYACHANDER</div>
                    <div style="font-size:8.5pt; font-weight:bold;">MBBS, M.D. (GENERAL MEDICINE)</div>
                    <div style="font-size:8.5pt; font-weight:900; color:#c62828;">Reg No: TSMC/FMR/43070</div>
                </div>
            </div>` : "";
        
        const footerHTML = withHeaderFooter ? `
            <div class="print-footer">
                <div style="text-align:right; margin-bottom:5px;">
                    <div style="font-size:15pt; font-weight:900;">DR. M. JAYACHANDER</div>
                    <div style="font-size:9pt; font-weight:bold;">MBBS, M.D. (GENERAL MEDICINE)</div>
                </div>
                <div class="footer-line"></div>
                <div class="services-list">
                    మా ప్రత్యేక సేవలు: బిపి, షుగర్ ,గుండె వ్యాధులు కాలేయ వ్యాధులు (జాండీస్), కిడ్నీ సమస్యలు, నరాల వ్యాధులు (పక్షవాతం) ,వైరల్ ఫీవర్, జీర్ణకోశ వ్యాధులు (అల్సర్), ఊపిరితిత్తుల వ్యాధులు, థైరాయిడ్ మరియు ఫిట్స్ చూడబడును.
                </div>
                <div class="notes-section">
                    <span class="telugu-note">NOTE: ప్రతిసారి వచ్చేటప్పుడు ఈ ప్రిస్క్రిప్షన్ ఫైల్ తప్పక తీసుకురావలెను</span><br>
                    <span style="color:#c62828;">NOTE: NOT VALID FOR MEDICO LEGAL PURPOSE.</span>
                </div>
                <div style="background:#1565c0 !important; color:white !important; padding:8px; text-align:center; font-weight:bold; font-size:14pt; border-radius:8px; margin-top:5px;">SRI RAJA RAJESHWARI MEDICAL AND GENERAL STORES</div>
            </div>` : "";

        const watermarkHTML = withHeaderFooter ? `<div class="watermark-container"><img src="logo.jpg" style="width:100%;"></div>` : "";

        const details = `
            <div style="border:2.5px solid #000; padding:10px; font-size:13pt; display:grid; grid-template-columns: 1.2fr 0.8fr; font-weight:bold; position:relative; z-index:1;">
                <div>OPD ID: ${selectedP.opd_number}<br>Name: <span style="font-size:18pt; text-transform:uppercase;">${selectedP.name}</span><br>Address: ${selectedP.address || ''}</div>
                <div style="text-align:right;">Date: ${new Date().toLocaleDateString()}<br>Age/Sex: ${selectedP.age} / ${selectedP.sex}<br>Phone: ${selectedP.phone || ''}</div>
            </div>
            <div class="vitals-row">
                <span>Wt: ${selectedP.weight}kg</span><span>BP: ${selectedP.bp}</span><span>P.R.: ${selectedP.pulse}</span><span>SpO2: ${selectedP.spo2}%</span><span>Temp: ${selectedP.temp}°F</span>
            </div>`;

        let printHTML = "";
        const spaceClass = withHeaderFooter ? "" : "no-header-space";

        if(type === 'REGISTRATION') {
            printHTML = `<div class="print-page-wrapper ${spaceClass}">${watermarkHTML}${headerHTML}${details}${footerHTML}</div>`;
        } else {
            const meds = JSON.parse(selectedP.medications || "[]");
            const chunkSize = 6;
            for (let i = 0; i < meds.length || i === 0; i += chunkSize) {
                const chunk = meds.slice(i, i + chunkSize);
                let medRows = chunk.map(m => `<tr><td>${m.n}</td><td style="text-align:center;">${m.d}</td><td style="text-align:center;">${m.r}</td><td>${m.rem}</td></tr>`).join('');
                let clinicalInfo = i === 0 ? `<div style="position:relative; z-index:1; margin-top:10px;"><p><b>Chief Complaints:</b> ${selectedP.complaints || ''}</p><p><b>History:</b> ${selectedP.history || ''}</p></div>` : "";
                
                printHTML += `<div class="print-page-wrapper ${spaceClass}">
                    ${watermarkHTML}${headerHTML}${details}${clinicalInfo}
                    <h3 style="border-bottom:2px solid #000; margin-top:10px; position:relative; z-index:1;">Rx Prescription ${meds.length > chunkSize ? `(Page ${Math.floor(i/chunkSize)+1})` : ''}</h3>
                    <table class="med-table"><thead><tr><th>Drug Name</th><th>Dur</th><th>Route</th><th>Remarks</th></tr></thead><tbody>${medRows}</tbody></table>
                    ${i + chunkSize >= meds.length ? `<div style="margin-top:15px; position:relative; z-index:1;"><p><b>Clinical Notes:</b> ${selectedP.notes || ''}</p><p><b>Investigations:</b> ${selectedP.investigations || ''}</p></div>` : ''}
                    ${footerHTML}
                </div>`;
            }
        }

        document.getElementById('printArea').innerHTML = printHTML;
        window.print();
    }

    function openTreat() {
        document.getElementById('actionModal').style.display = "none";
        document.getElementById('treatName').innerText = selectedP.name;
        document.getElementById('treatModal').style.display = "block";
        ['complaints','investigations','history','notes'].forEach(f => document.getElementById('t_'+f).value = selectedP[f] || "");
        document.getElementById('medBody').innerHTML = "";
        try { JSON.parse(selectedP.medications || "[]").forEach(m => addMedRow(m)); } catch(e) { addMedRow(); }
    }
    function addMedRow(data = {n:'', d:'', r:'', rem:''}) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td><textarea class="m-name">${data.n}</textarea></td><td><textarea class="m-dur">${data.d}</textarea></td><td><textarea class="m-route">${data.r}</textarea></td><td><textarea class="m-rem">${data.rem}</textarea></td><td style="color:red; cursor:pointer;" onclick="this.parentElement.remove()">×</td>`;
        document.getElementById('medBody').appendChild(tr);
    }
    async function saveTreatment() {
        const meds = Array.from(document.querySelectorAll('#medBody tr')).map(tr => ({ n: tr.querySelector('.m-name').value, d: tr.querySelector('.m-dur').value, r: tr.querySelector('.m-route').value, rem: tr.querySelector('.m-rem').value })).filter(m => m.n !== "");
        const data = { type: "SAVE_TREATMENT", opd: selectedP.opd_number, complaints: document.getElementById('t_complaints').value, investigations: document.getElementById('t_investigations').value, history: document.getElementById('t_history').value, medications: JSON.stringify(meds), notes: document.getElementById('t_notes').value };
        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        location.reload();
    }
    
    window.onload = loadData;
</script>
</body>
</html>
