<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SRI RAJA RAJESHWARI HOSPITAL</title>
    <style>
        /* Dashboard UI Styling */
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; padding-bottom: 50px; font-size: 16px; }
        header { display: flex; align-items: center; background: white; padding: 15px 40px; border-bottom: 4px solid #0047AB; }
        
        /* INCREASED LOGO SIZE */
        .logo img { height: 120px; margin-right: 25px; } 
        
        .hospital-info { flex-grow: 1; text-align: center; }
        .hospital-info h1 { color: #0047AB; margin: 0; font-size: 36px; }
        
        .doctor-info { 
            border: 2px solid #333; padding: 10px 15px; border-radius: 6px; 
            font-size: 17px; background: #fff; line-height: 1.4; 
            display: inline-block; text-align: left; min-width: 220px; font-weight: 600;
        }

        .container { max-width: 1250px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .section-title { color: #0047AB; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 25px; font-size: 20px; }
        
        .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 15px; }
        .field { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 14px; color: #555; margin-bottom: 5px; }
        input, select, textarea { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; width: 100%; box-sizing: border-box; }
        
        #clinical-section { display: none; background: #fffdf2; border: 2px solid #0047AB; padding: 30px; border-radius: 10px; margin-top: 20px; }
        .drug-row { display: grid; grid-template-columns: 2.5fr 1fr 1fr 2fr 45px; gap: 10px; margin-bottom: 10px; align-items: center; }
        
        button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; font-size: 15px; }
        .btn-reg { background: #28a745; width: 250px; }
        .btn-update { background: #0047AB; }
        .btn-print { background: #6c757d; }
        .btn-del { background: #dc3545; padding: 0; height: 35px; width: 35px; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #0047AB; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }

        #print-area { display: none; }

        /* PRINT STYLING */
        @media print {
            html, body { margin: 0 !important; padding: 0 !important; }
            .no-print { display: none !important; }
            #print-area { display: block !important; }
            @page { size: A4; margin: 0; }
            
            .print-page { 
                width: 210mm; height: 297mm; padding: 10mm 15mm; 
                box-sizing: border-box; display: flex; flex-direction: column; 
                background: white; position: relative; page-break-after: always;
            }
            
            .print-header { display: flex; align-items: center; border-bottom: 3px solid #0047AB; padding-bottom: 10px; }
            .print-header img { height: 120px !important; } /* LARGE LOGO IN PRINT */
            
            .print-doctor-box { 
                text-align: left; font-size: 16px; border: 2px solid #333; 
                padding: 8px 12px; line-height: 1.3; min-width: 200px; font-weight: bold;
            }

            .patient-detail-strip { 
                margin: 15px 0; border: 2px solid #000; padding: 12px; 
                display: grid; grid-template-columns: 1.2fr 1fr; gap: 8px; 
                font-size: 16px; background: #f9f9f9; 
            }

            .print-content-wrapper { display: flex; flex: 1; border-top: 2px solid #000; margin-top: 10px; position: relative; min-height: 0; }
            .print-sidebar { width: 25%; border-right: 2px solid #000; padding: 15px 5px; display: flex; flex-direction: column; box-sizing: border-box; }
            .print-main { width: 75%; padding: 15px 0 0 20px; box-sizing: border-box; display: flex; flex-direction: column; }
            
            .vitals-box-print { font-size: 16px; line-height: 2.2; font-weight: bold; color: #000; margin-bottom: 20px; }
            
            .instructions-area { font-size: 14px; line-height: 1.4; color: #000; margin-top: auto; padding-bottom: 80px; width: 100%; }
            .instructions-area p { margin: 0 0 8px 0; font-weight: bold; }
            .instructions-heading { font-weight: bold; text-decoration: underline; margin-bottom: 8px; font-size: 16px; display: block; }
            .telugu-notice { color: #D32F2F; font-weight: bold; font-size: 14px; margin-top: 12px; line-height: 1.3; }
            
            /* CLINICAL BOXES FOR PRINT */
            .clinical-box { border: 1.5px solid #000; padding: 10px; margin-bottom: 12px; font-size: 15px; background: #fff; }
            .clinical-box b { color: #0047AB; display: block; margin-bottom: 4px; border-bottom: 1px solid #ccc; width: fit-content; }

            .rx-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
            .rx-table th, .rx-table td { border: 1px solid #000; padding: 6px; font-size: 15px; text-align: left; }
            
            .notes-box { border: 1px solid #000; padding: 10px; margin-top: 15px; min-height: 60px; font-size: 14px; }

            .signature-block { margin-top: auto; text-align: right; padding-bottom: 85px; }
            .signature-block p { margin: 0; font-weight: bold; }

            .footer-print { position: absolute; bottom: 8mm; left: 0; width: 100%; text-align: center; background: white; padding: 5px 0; }
            .footer-print h2 { font-size: 15px !important; margin-bottom: 2px; padding: 4px 15px !important; }
            .footer-print p { font-size: 11px !important; margin: 0; font-weight: bold; color: #0047AB; }
        }
    </style>
</head>
<body onload="initApp()">

<header class="no-print">
    <div class="logo"><img src="logo.jpg" id="mainLogo" alt="Logo"></div>
    <div class="hospital-info">
        <h1>SRI RAJA RAJESHWARI HOSPITAL</h1>
        <p>SURARAM COLONY, NTR ROAD, TS 500055</p>
    </div>
    <div class="doctor-info">
        <b>DR. M. JAYACHANDER</b><br>
        MBBS, MD (GENERAL MEDICINE)<br>
        TSMC / FMR43070
    </div>
</header>

<div class="container no-print">
    <h2 class="section-title">1. Patient Registration</h2>
    <div class="form-grid">
        <div class="field"><label>OPD No</label><input type="text" id="opd_id" readonly style="background:#eee"></div>
        <div class="field"><label>Full Name</label><input type="text" id="name"></div>
        <div class="field"><label>Age</label><input type="number" id="age"></div>
        <div class="field"><label>Sex</label><select id="sex"><option>Male</option><option>Female</option></select></div>
        <div class="field"><label>Village</label><input type="text" id="village"></div>
        <div class="field"><label>Phone</label><input type="text" id="phone"></div>
        <div class="field"><label>BP</label><input type="text" id="bp"></div>
        <div class="field"><label>Weight (kg)</label><input type="text" id="weight"></div>
        <div class="field"><label>Temp (°F)</label><input type="text" id="temp"></div>
        <div class="field"><label>Pulse</label><input type="text" id="pulse"></div>
        <div class="field"><label>SpO2 (%)</label><input type="text" id="spo2"></div>
        <div class="field"><label>Date</label><input type="date" id="reg_date"></div>
    </div>
    <div style="text-align:center; margin-top:20px;"><button class="btn-reg" onclick="saveRegistration()">REGISTER PATIENT</button></div>

    <div id="clinical-section">
        <h2 style="color: #0047AB; border-bottom: 2px solid #0047AB;">2. Treatment: <span id="display_name"></span></h2>
        <div class="form-grid">
            <div class="field"><label>Date</label><input type="date" id="e_date"></div>
            <div class="field"><label>BP</label><input type="text" id="e_bp"></div>
            <div class="field"><label>Temp</label><input type="text" id="e_temp"></div>
            <div class="field"><label>Pulse</label><input type="text" id="e_pulse"></div>
            <div class="field"><label>SpO2</label><input type="text" id="e_spo2"></div>
            <div class="field"><label>Weight</label><input type="text" id="e_weight"></div>
            <div class="field"><label>Village</label><input type="text" id="e_village"></div>
            <div class="field"><label>Phone</label><input type="text" id="e_phone"></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px;">
            <div class="field"><label>Complaints</label><textarea id="complaints" rows="4"></textarea></div>
            <div class="field"><label>Investigations</label><textarea id="investigations" rows="4"></textarea></div>
            <div class="field"><label>Clinical Notes</label><textarea id="clinical_notes" rows="3"></textarea></div>
        </div>
        <h3>Prescription (Rx)</h3>
        <div id="drug-list">
             <div class="drug-row"><b>Drug Name</b><b>Duration</b><b>Route</b><b>Remarks</b><b></b></div>
        </div>
        <button style="background:#17a2b8; margin:10px 0;" onclick="addDrugRow()">+ Add Medicine</button>
        <div style="display: flex; gap: 10px; margin-top: 25px; border-top: 2px solid #0047AB; padding-top: 20px;">
            <button class="btn-print" onclick="preparePrint('reg')">PRINT REGISTRATION ONLY</button>
            <button class="btn-print" style="background:#4a4a4a;" onclick="preparePrint('full')">PRINT PRESCRIPTION</button>
            <div style="flex-grow:1"></div>
            <button class="btn-update" onclick="saveFullUpdate()">SAVE ALL CHANGES</button>
        </div>
    </div>

    <h2 class="section-title">3. Registered Patients</h2>
    <input type="text" id="searchInput" placeholder="Search Patients..." onkeyup="filterPatients()" style="width:100%; padding:12px; border:2px solid #0047AB; border-radius:8px; margin:15px 0; font-size:16px;">
    <table>
        <thead><tr><th>OPD No</th><th>Name</th><th>Age/Sex</th><th>Phone</th><th>Action</th></tr></thead>
        <tbody id="patientTableBody"></tbody>
    </table>
</div>

<div id="print-area"></div>

<script>
    let allPatients = [];
    let currentOPD = "";

    async function initApp() {
        document.getElementById('reg_date').valueAsDate = new Date();
        document.getElementById('opd_id').value = "SRR-" + Math.floor(10000 + Math.random() * 90000);
        await fetchPatients();
    }

    async function fetchPatients() {
        try {
            const res = await fetch('http://localhost:5000/get-patients');
            allPatients = await res.json();
            renderTable(allPatients);
        } catch(e) { console.error("Database Error:", e); }
    }

    function renderTable(data) {
        const tableBody = document.getElementById('patientTableBody');
        tableBody.innerHTML = ""; 
        data.forEach(p => {
            const row = document.createElement('tr');
            row.innerHTML = `<td><b>${p.opd_no}</b></td><td>${p.name}</td><td>${p.age}/${p.sex}</td><td>${p.phone}</td>
                <td><button style="background:#007bff;" onclick="openClinical('${p.opd_no}')">Treat</button></td>`;
            tableBody.appendChild(row);
        });
    }

    function filterPatients() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allPatients.filter(p => p.name.toLowerCase().includes(val) || p.opd_no.toLowerCase().includes(val));
        renderTable(filtered);
    }

    async function openClinical(opd) {
        currentOPD = opd;
        const res = await fetch(`http://localhost:5000/get-patient/${opd}`);
        const p = await res.json();
        document.getElementById('display_name').innerText = p.name;
        document.getElementById('e_date').value = p.date || "";
        document.getElementById('e_bp').value = p.bp || "";
        document.getElementById('e_temp').value = p.temp || "";
        document.getElementById('e_pulse').value = p.pulse || "";
        document.getElementById('e_spo2').value = p.spo2 || "";
        document.getElementById('e_weight').value = p.weight || "";
        document.getElementById('e_village').value = p.village || "";
        document.getElementById('e_phone').value = p.phone || "";
        document.getElementById('complaints').value = p.complaints || "";
        document.getElementById('investigations').value = p.investigations || "";
        document.getElementById('clinical_notes').value = p.notes || "";
        const drugList = document.getElementById('drug-list');
        drugList.innerHTML = '<div class="drug-row"><b>Drug Name</b><b>Duration</b><b>Route</b><b>Remarks</b><b></b></div>';
        if(p.medicines && p.medicines.length > 0) p.medicines.forEach(m => addDrugRow(m.drugName, m.duration, m.route, m.remarks));
        else addDrugRow();
        document.getElementById('clinical-section').style.display = 'block';
        window.scrollTo({ top: 400, behavior: 'smooth' });
    }

    function addDrugRow(n="", d="", r="", rem="") {
        const div = document.createElement('div');
        div.className = 'drug-row';
        div.innerHTML = `<input type="text" class="d-name" value="${n}"><input type="text" class="d-dur" value="${d}"><input type="text" class="d-route" value="${r}"><input type="text" class="d-rem" value="${rem}"><button class="btn-del" onclick="this.parentElement.remove()">X</button>`;
        document.getElementById('drug-list').appendChild(div);
    }

    function captureCurrentData() {
        const names = document.getElementsByClassName('d-name'), durs = document.getElementsByClassName('d-dur'), routes = document.getElementsByClassName('d-route'), rems = document.getElementsByClassName('d-rem');
        let medicines = [];
        for(let i=0; i < names.length; i++) {
            if(names[i].value.trim() !== "") medicines.push({ drugName: names[i].value, duration: durs[i].value, route: routes[i].value, remarks: rems[i].value });
        }
        const pInfo = allPatients.find(x => x.opd_no === currentOPD);
        return {
            name: document.getElementById('display_name').innerText, opd_no: currentOPD, age: pInfo?.age || "", sex: pInfo?.sex || "",
            date: document.getElementById('e_date').value, bp: document.getElementById('e_bp').value, temp: document.getElementById('e_temp').value,
            pulse: document.getElementById('e_pulse').value, spo2: document.getElementById('e_spo2').value, weight: document.getElementById('e_weight').value,
            village: document.getElementById('e_village').value, phone: document.getElementById('e_phone').value,
            complaints: document.getElementById('complaints').value, investigations: document.getElementById('investigations').value, 
            notes: document.getElementById('clinical_notes').value, medicines: medicines
        };
    }

    async function saveFullUpdate() {
        const updateData = captureCurrentData();
        await fetch('http://localhost:5000/update-full-patient', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(updateData) });
        alert("Saved!"); fetchPatients();
    }

    function preparePrint(mode) {
        const p = captureCurrentData();
        const logo = document.getElementById('mainLogo').src;
        const isFull = mode === 'full';
        const medicines = p.medicines;
        const drugsPerPage = 8;
        
        let printHTML = "";

        const createPage = (medSlice, pageNum, totalPages) => {
            return `
            <div class="print-page">
                <div class="print-header">
                    <img src="${logo}" style="height:120px; margin-right:20px;">
                    <div style="flex-grow:1; text-align:center;">
                        <h1 style="margin:0; color:#0047AB; font-size:30px;">SRI RAJA RAJESHWARI HOSPITAL</h1>
                        <p style="margin:2px; font-weight:bold; font-size:14px;">SURARAM COLONY, NTR ROAD, HYDERABAD</p>
                    </div>
                    <div class="print-doctor-box">
                        <b>DR. M. JAYACHANDER</b><br>
                        MBBS, MD (GENERAL MEDICINE)<br>
                        TSMC / FMR43070
                    </div>
                </div>
                
                <div class="patient-detail-strip">
                    <span><b>Name:</b> ${p.name}</span> <span><b>OPD No:</b> ${p.opd_no}</span>
                    <span><b>Age / Sex:</b> ${p.age} / ${p.sex}</span> <span><b>Date:</b> ${p.date}</span>
                    <span><b>Village:</b> ${p.village || 'N/A'}</span> <span><b>Phone:</b> ${p.phone || 'N/A'}</span>
                    <span><b>Weight:</b> ${p.weight || '---'} kg</span> <span><b>Page:</b> ${pageNum} of ${totalPages}</span>
                </div>

                <div class="print-content-wrapper">
                    <div class="print-sidebar">
                        <div class="vitals-box-print">
                            BP: ${p.bp || '---'}<br>
                            PULSE: ${p.pulse || '---'}<br>
                            SPO2: ${p.spo2 || '---'} %<br>
                            TEMP: ${p.temp || '---'} °F
                        </div>
                        <div class="instructions-area">
                            <span class="instructions-heading">INSTRUCTIONS:</span>
                            <p>1. Please Get This Prescription in Next Visits</p>
                            <p>2. Take Medicine for Prescribed Duration</p>
                            <p>3. In case of reaction stop Medicine & Contact Doctor</p>
                            <p>4. Follow Doctor's advice Strictly</p>
                            <div class="telugu-notice">మా వద్ద అన్ని రకముల రక్త మూత్ర పరీక్షలు చేయబడును</div>
                        </div>
                    </div>

                    <div class="print-main">
                        ${isFull ? `
                            ${pageNum === 1 ? `
                                <div class="clinical-box"><b>Complaints:</b> ${p.complaints || 'None'}</div>
                                <div class="clinical-box"><b>Investigations:</b> ${p.investigations || 'None'}</div>
                            ` : ''}

                            <h3 style="border-bottom:2px solid #0047AB; color:#0047AB; font-size:20px; margin:5px 0;">Prescription (Rx)</h3>
                            <table class="rx-table">
                                <thead><tr><th>Drug Name</th><th>Dur</th><th>Route</th><th>Remarks</th></tr></thead>
                                <tbody>${medSlice.map(m => `<tr><td style="font-weight:bold;">${m.drugName}</td><td align="center">${m.duration}</td><td align="center">${m.route}</td><td>${m.remarks}</td></tr>`).join('')}</tbody>
                            </table>
                        ` : '<div style="flex-grow:1;"></div>'}

                        ${(pageNum === totalPages) ? `
                            <div class="notes-box"><b>NOTES:</b><br>${p.notes || ''}</div>
                        ` : ''}
                        
                        <div class="signature-block">
                            <p>__________________________</p>
                            <b>DR. M. JAYACHANDER</b><br>
                            MD (GENERAL MEDICINE)
                        </div>
                    </div>
                </div>

                <div class="footer-print">
                    <h2 style="color: #D32F2F; background: #FFEB3B; padding: 4px 20px; border-radius: 6px; border: 2px solid #D32F2F; display: inline-block;">SRI RAJA RAJESHWARI MEDICAL AND GENERAL STORES</h2>
                    <p>Quality Medicines • Trusted Care • Available 24/7</p>
                </div>
            </div>`;
        };

        if (isFull && medicines.length > 0) {
            const totalPages = Math.ceil(medicines.length / drugsPerPage);
            for (let i = 0; i < totalPages; i++) {
                const slice = medicines.slice(i * drugsPerPage, (i + 1) * drugsPerPage);
                printHTML += createPage(slice, i + 1, totalPages);
            }
        } else {
            printHTML = createPage([], 1, 1);
        }

        document.getElementById('print-area').innerHTML = printHTML;
        setTimeout(() => { window.print(); }, 500);
    }

    async function saveRegistration() {
        const data = {
            opd_no: document.getElementById('opd_id').value, name: document.getElementById('name').value, age: document.getElementById('age').value,
            sex: document.getElementById('sex').value, village: document.getElementById('village').value, phone: document.getElementById('phone').value,
            bp: document.getElementById('bp').value, weight: document.getElementById('weight').value, temp: document.getElementById('temp').value,
            pulse: document.getElementById('pulse').value, spo2: document.getElementById('spo2').value, date: document.getElementById('reg_date').value
        };
        const res = await fetch('http://localhost:5000/register-patient', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
        if(res.ok) { alert("Registered!"); fetchPatients(); }
    }
</script>
</body>
</html>
