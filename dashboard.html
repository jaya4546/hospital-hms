<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRR Hospital Management System</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #eef2f3; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 3px solid #3498db; margin-bottom: 20px; padding-bottom: 10px; }
        .header h1 { margin: 0; color: #2c3e50; font-size: 28px; }
        .doctor-info { color: #555; font-weight: bold; margin-top: 5px; }
        
        .form-section { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .full-width { grid-column: span 2; }
        
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #34495e; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #dcdde1; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        textarea { resize: vertical; }
        
        .prescription-box { border: 2px solid #3498db; background-color: #f9fcff; }
        
        .actions { margin-top: 30px; display: flex; gap: 15px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-save { background-color: #27ae60; color: white; }
        .btn-save:hover { background-color: #219150; }
        .btn-print { background-color: #3498db; color: white; }
        .btn-print:hover { background-color: #2980b9; }

        @media print {
            .actions, .no-print { display: none; }
            body { padding: 0; background: white; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; }
            input, textarea { border: none; padding: 5px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>SRI RAJA RAJESHWARI HOSPITAL</h1>
        <div class="doctor-info">Dr. M. Jayachander, MBBS, MD (General Medicine)</div>
        <p style="margin: 2px; font-size: 13px;">Suraram Colony, Near Ramaleela Maidanam, Hyderabad</p>
    </div>

    <div class="form-section">
        <div class="form-group">
            <label>Patient Name</label>
            <input type="text" id="pName" placeholder="Full Name">
        </div>
        <div class="form-group">
            <label>Age / Gender</label>
            <input type="text" id="pAgeSex" placeholder="e.g. 30/M">
        </div>
        <div class="form-group full-width">
            <label>Chief Complaints</label>
            <textarea id="pComplaints" rows="2"></textarea>
        </div>
        <div class="form-group full-width">
            <label>Clinical Findings & Investigations</label>
            <textarea id="pInvest" rows="2"></textarea>
        </div>
        <div class="form-group full-width">
            <label style="color: #c0392b;">Prescription & Advice (Rx)</label>
            <textarea id="pRx" rows="8" class="prescription-box" placeholder="List medicines and dosage here..."></textarea>
        </div>
    </div>

    <div class="actions">
        <button class="btn-save" onclick="saveToCloud()">💾 SAVE TO DATABASE</button>
        <button class="btn-print" onclick="window.print()">🖨️ PRINT PRESCRIPTION</button>
    </div>
</div>

<script>
    async function saveToCloud() {
        const data = {
            name: document.getElementById('pName').value,
            ageSex: document.getElementById('pAgeSex').value,
            complaints: document.getElementById('pComplaints').value,
            investigations: document.getElementById('pInvest').value,
            prescription: document.getElementById('pRx').value,
            date: new Date()
        };

        if(!data.name) return alert("Please enter Patient Name");

        try {
            const response = await fetch('https://hospital-hms-nsdo.onrender.com/api/patients', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if(response.ok) {
                alert("✔ Patient Record Synced to Cloud!");
            } else {
                alert("❌ Sync Failed. Check Connection.");
            }
        } catch (err) {
            alert("❌ Error: Could not reach the server.");
        }
    }
</script>

</body>
</html>
