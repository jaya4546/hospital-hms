<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRR Hospital HMS v2.6</title>
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --bg: #f0f4f7; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #333; }
        .container { max-width: 1200px; background: white; padding: 25px; border-radius: 15px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
        
        /* HEADER RESTORED */
        .header-main { text-align: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .hospital-logo { width: 220px; height: auto; margin-bottom: 10px; }
        .header-sub { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .doctor-box { border: 2px solid var(--dark); padding: 12px; border-radius: 8px; background: #fdfdfd; text-align: left; }
        .dr-name { font-size: 19px; font-weight: bold; color: #1a5276; display: block; }

        /* FORM */
        h3 { font-size: 16px; color: var(--dark); border-left: 4px solid var(--primary); padding-left: 10px; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 12px; margin-bottom: 5px; color: #555; }
        input, select { padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; outline: none; }
        
        /* BUTTONS */
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-save { background: var(--primary); color: white; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn-action { padding: 6px 12px; font-size: 11px; color: white; border-radius: 4px; border:none; cursor: pointer; }

        /* TABLE */
        .table-container { overflow-x: auto; margin-top: 30px; background: #fff; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: var(--dark); color: white; padding: 12px; text-align: left; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-main">
        <img src="logo.jpg" alt="SRR Hospital" class="hospital-logo">
        <p style="font-size: 12px; font-weight: bold; margin:0;">Suraram colony NTR road Opp: Ramaleela maidanam Telangana 500055</p>
    </div>

    <div class="header-sub">
        <div class="doctor-box">
            <span class="dr-name">Dr. M. Jayachander</span>
            <span style="font-size:13px;">MBBS, MD (General Medicine) | Reg: TSMC/43070</span>
        </div>
        <div style="text-align: right; color: #777; font-size: 12px;">SRR HMS Clinical Suite v2.6</div>
    </div>

    <h3>New Patient Registration</h3>
    <div class="grid">
        <div class="input-group"><label>Date</label><input type="date" id="date"></div>
        <div class="input-group"><label>OPD No</label><input type="text" id="opd_no" style="background:#fffde7" readonly></div>
        <div class="input-group"><label>Patient Name</label><input type="text" id="name"></div>
        <div class="input-group"><label>Age</label><input type="number" id="age"></div>
        <div class="input-group"><label>Sex</label><select id="sex"><option>Male</option><option>Female</option></select></div>
        <div class="input-group"><label>Mobile</label><input type="text" id="phone"></div>
        <div class="input-group"><label>BP</label><input type="text" id="bp"></div>
        <div class="input-group"><label>Pulse</label><input type="text" id="pulse"></div>
        <div class="input-group"><label>SpO2</label><input type="text" id="spo2"></div>
        <div class="input-group"><label>Temp</label><input type="text" id="temp"></div>
    </div>
    <button class="btn btn-save" onclick="registerPatient()">SAVE & REGISTER PATIENT</button>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>OPD No</th>
                    <th>Name</th>
                    <th>Age/Sex</th>
                    <th>Vitals (BP/P/O2/T)</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="6" style="text-align:center;">Synchronizing records...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbxgasf0L15wWic3-g8AY5ltXzaJ8p-6EKR57_PxGyS02DQIVuBmUkEWg3BXOH-VlZsWuw/exec";

    window.onload = () => {
        document.getElementById('date').valueAsDate = new Date();
        document.getElementById('opd_no').value = "SRR-" + Math.floor(100000 + Math.random() * 900000);
        fetchRecords();
    };

    async function registerPatient() {
        const payload = {
            type: "REGISTRATION",
            date: document.getElementById('date').value,
            opd_no: document.getElementById('opd_no').value,
            name: document.getElementById('name').value,
            age: document.getElementById('age').value,
            sex: document.getElementById('sex').value,
            phone: document.getElementById('phone').value,
            bp: document.getElementById('bp').value,
            pulse: document.getElementById('pulse').value,
            spo2: document.getElementById('spo2').value,
            temp: document.getElementById('temp').value
        };
        if(!payload.name) return alert("Enter Patient Name");
        
        await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        alert("Patient Registered Successfully!");
        location.reload();
    }

    async function fetchRecords() {
        try {
            const res = await fetch(GOOGLE_URL);
            const data = await res.json();
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";

            data.reverse().forEach(row => {
                const tr = document.createElement('tr');
                
                /** * RIGID MAPPING: 
                 * We use the exact headers defined in Code.gs doPost (converted to lowercase_underscores)
                 **/
                const dDate = (row.date || row.timestamp || '').toString().split('T')[0];
                const dOPD = row.opd_no || '---';
                const dName = row.name || '---';
                const dAgeSex = (row.age || '-') + " / " + (row.sex || '-');
                
                const vBP = row.bp || '-';
                const vP = row.pulse || '-';
                const vO = row.spo2 || '-';
                const vT = row.temp || '-';

                tr.innerHTML = `
                    <td>${dDate}</td>
                    <td style="font-weight:bold; color:var(--primary);">${dOPD}</td>
                    <td>${dName}</td>
                    <td>${dAgeSex}</td>
                    <td><small>BP: ${vBP} | P: ${vP} | O2: ${vO}% | T: ${vT}</small></td>
                    <td>
                        <button class="btn-action" style="background:#3498db;" onclick="alert('Edit ready')">EDIT</button>
                        <button class="btn-action" style="background:#e67e22;" onclick="alert('Treat ready')">TREAT</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (e) {
            console.error(e);
            document.getElementById('tableBody').innerHTML = "<tr><td colspan='6' style='text-align:center;'>Error loading data. Check internet.</td></tr>";
        }
    }
</script>

</body>
</html>
