<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRR Hospital HMS</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2f3; margin: 0; padding: 20px; }
        .container { max-width: 950px; background: white; padding: 30px; border-radius: 12px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 8px solid #27ae60; }
        
        /* HEADER SECTION */
        .header-main { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #27ae60; padding-bottom: 15px; }
        .hospital-name { margin: 0; color: #1a5276; font-size: 32px; font-weight: bold; text-transform: uppercase; }
        .hospital-address { margin: 5px 0; color: #566573; font-size: 14px; font-weight: bold; }

        .header-sub { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
        
        /* DOCTOR BOX (Left) */
        .doctor-box { border: 2px solid #2c3e50; padding: 12px; border-radius: 5px; background: #f9f9f9; min-width: 280px; text-align: left; line-height: 1.4; }
        .doctor-box .dr-name { font-size: 18px; font-weight: bold; color: #2c3e50; display: block; }
        .doctor-box .dr-qual { font-size: 14px; font-weight: 600; color: #34495e; display: block; }
        .doctor-box .dr-reg { font-size: 13px; color: #e74c3c; font-weight: bold; display: block; margin-top: 5px; }
        
        /* LOGO SECTION (Right) */
        .logo-section img { width: 90px; height: auto; }

        /* FORM STYLING */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-weight: bold; color: #2c3e50; margin-bottom: 5px; font-size: 14px; }
        input, select { padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 15px; }
        
        /* VITALS SECTION */
        .vitals-card { background: #f4f7f6; border: 1px solid #d1d9e0; padding: 20px; border-radius: 8px; }
        .vitals-card h3 { margin: 0 0 15px 0; color: #27ae60; font-size: 18px; text-transform: uppercase; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        .vitals-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }

        /* BUTTONS */
        #saveBtn { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 25px; transition: 0.3s; }
        #saveBtn:hover { background: #219150; }
        #saveBtn:disabled { background: #95a5a6; }

        .auto-tag { background: #fff3cd; color: #856404; font-weight: bold; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-main">
        <h1 class="hospital-name">Sri Raja Rajeshwari Hospital</h1>
        <p class="hospital-address">ADD: Suraram colony NTR road Opp: Ramaleela maidanam telangana 500055</p>
    </div>

    <div class="header-sub">
        <div class="doctor-box">
            <span class="dr-name">Dr. M. Jayachander</span>
            <span class="dr-qual">MBBS, MD (General Medicine)</span>
            <span class="dr-reg">Reg no: TSMC/FMR/43070</span>
        </div>

        <div class="logo-section">
            <img src="https://cdn-icons-png.flaticon.com/512/687/687529.png" alt="Logo">
        </div>
    </div>

    <div class="grid">
        <div class="input-group">
            <label>Visit Date</label>
            <input type="date" id="date">
        </div>
        <div class="input-group">
            <label>OPD Number (Auto-Generated)</label>
            <input type="text" id="opd_no" class="auto-tag" readonly>
        </div>
        <div class="input-group">
            <label>Patient Name</label>
            <input type="text" id="name" placeholder="Full Name">
        </div>
        <div class="input-group">
            <label>Age / Sex</label>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="age" placeholder="Age" style="width: 50%;">
                <select id="sex" style="width: 50%;">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>
        <div class="input-group">
            <label>Mobile Number</label>
            <input type="text" id="phone" placeholder="Phone Number">
        </div>
        <div class="input-group">
            <label>Village / Town</label>
            <input type="text" id="village" placeholder="Location">
        </div>
    </div>

    <div class="vitals-card">
        <h3>Clinical Vitals</h3>
        <div class="vitals-grid">
            <div class="input-group">
                <label>Weight (kg)</label>
                <input type="text" id="weight">
            </div>
            <div class="input-group">
                <label>BP (mmHg)</label>
                <input type="text" id="bp" placeholder="120/80">
            </div>
            <div class="input-group">
                <label>Pulse (bpm)</label>
                <input type="text" id="pulse">
            </div>
            <div class="input-group">
                <label>SpO2 (%)</label>
                <input type="text" id="spo2">
            </div>
            <div class="input-group">
                <label>Temp (°F)</label>
                <input type="text" id="temp">
            </div>
        </div>
    </div>

    <button id="saveBtn" onclick="registerPatient()">SAVE PATIENT RECORD</button>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbzyomvR_bYHCS0mURzmCbG-kx4XrxXko9I_hjc-DamV-NFg0ECgmuIiKuelF4tw9AMliA/exec";

    window.onload = () => {
        document.getElementById('date').valueAsDate = new Date();
        const now = new Date();
        const opdSerial = now.getDate().toString() + (now.getMonth() + 1).toString() + now.getHours().toString() + now.getMinutes().toString();
        document.getElementById('opd_no').value = "SRR-" + opdSerial;
    };

    async function registerPatient() {
        const btn = document.getElementById('saveBtn');
        const data = {
            date: document.getElementById('date').value,
            opd_no: document.getElementById('opd_no').value,
            name: document.getElementById('name').value,
            age: document.getElementById('age').value,
            sex: document.getElementById('sex').value,
            phone: document.getElementById('phone').value,
            village: document.getElementById('village').value,
            weight: document.getElementById('weight').value,
            bp: document.getElementById('bp').value,
            pulse: document.getElementById('pulse').value,
            spo2: document.getElementById('spo2').value,
            temp: document.getElementById('temp').value
        };

        if(!data.name) return alert("Patient Name is required!");

        btn.innerText = "Saving to Records...";
        btn.disabled = true;

        try {
            await fetch(GOOGLE_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            });
            alert("✅ Patient Record Saved Successfully!");
            location.reload();
        } catch (e) {
            alert("Connection Error. Check Internet.");
            btn.disabled = false;
            btn.innerText = "SAVE PATIENT RECORD";
        }
    }
</script>

</body>
</html>
