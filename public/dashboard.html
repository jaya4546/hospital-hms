<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRR Hospital HMS - Professional Edition</title>
    <style>
        :root { --primary: #1b5e20; --dark: #263238; --bg: #eceff1; --accent: #c62828; --edit: #2980b9; --treat: #e67e22; --bill: #1a237e; --table-blue: #1e88e5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 1300px; background: white; padding: 20px; border-radius: 12px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; }
        .header-left { display: flex; align-items: center; gap: 15px; flex: 2; }
        .logo-img { width: 90px; height: 90px; object-fit: contain; }
        .hosp-name { font-size: 26px; color: var(--accent); margin: 0; font-weight: 900; white-space: nowrap; text-transform: uppercase; }
        .hosp-addr { font-size: 11px; color: #444; margin: 4px 0 0 0; font-weight: 600; line-height: 1.2; }
        .doc-card { border: 2px solid var(--primary); padding: 8px 15px; border-radius: 6px; background: #f1f8e9; text-align: left; min-width: 210px; }
        .doc-name { font-size: 18px; font-weight: 800; color: var(--primary); margin: 0; }
        .doc-sub { font-size: 13px; font-weight: 700; margin: 2px 0; color: #333; }

        /* SEARCH BAR STYLING - HIGH VISIBILITY */
        .search-area { background: #e8f5e9; padding: 15px; border-radius: 8px; margin: 20px 0; border: 2px dashed var(--primary); }
        #searchInput { width: 100%; padding: 12px; border: 2px solid var(--primary); border-radius: 6px; font-size: 16px; box-sizing: border-box; outline: none; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .input-box { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 11px; color: #555; margin-bottom: 4px; text-transform: uppercase; }
        input, select, textarea { padding: 10px; border: 1px solid #bbb; border-radius: 4px; font-size: 13px; }

        .btn-row { display: flex; gap: 10px; margin: 15px 0; }
        .save-btn { flex: 2; background: var(--primary); color: white; border: none; padding: 14px; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .clear-btn { flex: 1; background: #78909c; color: white; border: none; padding: 14px; border-radius: 5px; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; border-radius: 8px; overflow: hidden; }
        th { background: var(--dark); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; background: white; }
        .t-btn { border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; color: white !important; font-weight: bold; margin-right: 3px; font-size: 11px; display: inline-block; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; padding: 20px; overflow-y: auto; }
        .modal-body { background: white; max-width: 850px; margin: auto; padding: 30px; border-radius: 10px; border-top: 10px solid var(--treat); }
        
        /* PRINT STYLES */
        #printArea { display: none; }
        @media print {
            body { background: white !important; }
            .container, .modal, .btn-row { display: none !important; }
            #printArea { display: block !important; width: 100%; }
            .print-page { width: 210mm; min-height: 297mm; padding: 10mm 15mm; position: relative; display: flex; flex-direction: column; }
            .bill-table { width: 100%; border-collapse: collapse; border: 1px solid #000; margin-top: 15px; }
            .bill-table th, .bill-table td { border: 1px solid #000; padding: 8px; text-align: left; }
            .lab-footer { position: absolute; bottom: 10mm; left: 15mm; right: 15mm; background: #1a237e !important; color: white !important; text-align: center; padding: 15px; font-weight: bold; font-size: 20px; border-radius: 8px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-left">
            <img src="/logo.jpg" alt="Logo" class="logo-img">
            <div class="hosp-info">
                <h1 class="hosp-name">SRI RAJA RAJESHWARI HOSPITAL</h1>
                <p class="hosp-addr">Suraram colony IDA jeedimetla NTR road, Opp: Ramaleela maidanam, Telangana 500055</p>
            </div>
        </div>
        <div class="doc-card">
            <p class="doc-name">Dr. M. Jayachander</p>
            <p class="doc-sub">MBBS, MD (General Medicine)</p>
            <p style="margin:0; font-size:11px;">Reg No: TSMC/FMR/43070</p>
        </div>
    </div>

    <div class="grid">
        <div class="input-box"><label>Date</label><input type="date" id="date"></div>
        <div class="input-box"><label>OPD No</label><input type="text" id="opd_no" readonly style="background:#f5f5f5; font-weight: bold;"></div>
        <div class="input-box"><label>Patient Name</label><input type="text" id="p_name"></div>
        <div class="input-box"><label>Age</label><input type="number" id="p_age"></div>
        <div class="input-box"><label>Sex</label><select id="p_sex"><option>Male</option><option>Female</option></select></div>
        <div class="input-box"><label>Phone</label><input type="text" id="p_ph"></div>
        <div class="input-box"><label>Village</label><input type="text" id="p_vil"></div>
        <div class="input-box"><label>BP</label><input type="text" id="p_bp"></div>
        <div class="input-box"><label>Pulse</label><input type="text" id="p_pu"></div>
        <div class="input-box"><label>SpO2</label><input type="text" id="p_sp"></div>
        <div class="input-box"><label>Temp</label><input type="text" id="p_te"></div>
    </div>

    <div class="btn-row">
        <button class="save-btn" id="saveBtn" onclick="submitReg()">SAVE PATIENT RECORD</button>
        <button class="clear-btn" onclick="resetForm()">NEW REGISTRATION</button>
    </div>

    <div class="search-area">
        <label style="font-size: 14px; margin-bottom: 8px; display: block;">SEARCH PATIENT (NAME OR OPD):</label>
        <input type="text" id="searchInput" placeholder="Type name or SRR number here..." onkeyup="filterTable()">
    </div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>OPD No</th>
                    <th>Name</th>
                    <th>Vitals</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<div id="printArea"></div>

<div id="mBill" class="modal">
    <div class="modal-body" style="border-top: 10px solid var(--bill);">
        <h2 id="bTitle" style="margin-top:0; color: var(--bill);">Investigation Billing</h2>
        <div style="background: #f1f1f1; padding: 10px; border-radius: 5px; margin-bottom: 15px; display: flex; gap: 10px;">
            <input type="text" id="newTestName" placeholder="New Test Name" style="flex:2;">
            <input type="number" id="newTestPrice" placeholder="Price" style="flex:1;">
            <button onclick="addNewTestToList()" style="background:var(--primary); color:white; border:none; padding:10px; border-radius:4px;">+ ADD</button>
        </div>
        <div id="investList" style="max-height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 15px;"></div>
        <div style="font-size: 22px; font-weight: bold; text-align: right; margin-bottom: 15px;">Total: ₹<span id="totalBill">0</span></div>
        <div class="btn-row">
            <button class="save-btn" style="background:#455a64;" onclick="handleBillAction('SAVE')">SAVE ONLY</button>
            <button class="save-btn" style="background:var(--bill);" onclick="handleBillAction('PRINT')">SAVE & PRINT</button>
            <button class="clear-btn" onclick="document.getElementById('mBill').style.display='none'">CANCEL</button>
        </div>
    </div>
</div>

<div id="mTreat" class="modal">
    <div class="modal-body">
        <h2 id="mTitle" style="margin-top:0; color: var(--treat);">Clinical Assessment</h2>
        
        <div id="billHistory" style="background: #fff9c4; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 2px solid #fbc02d; display: none;">
            <h4 style="margin:0 0 8px 0; color: #827717; text-transform: uppercase;">Previous Lab History:</h4>
            <div id="historyContent" style="font-size: 13px; font-weight: 700; line-height: 1.6; color: #333;"></div>
        </div>

        <div class="grid" style="grid-template-columns: 1fr 1fr;">
            <div class="input-box"><label>Chief Complaints</label><textarea id="mComp" rows="3"></textarea></div>
            <div class="input-box"><label>Investigations</label><textarea id="mInv" rows="3"></textarea></div>
        </div>
        <div id="dList"></div>
        <button onclick="addRow()" style="margin:10px 0;">+ Add Medication</button>
        <div class="input-box"><label>Notes</label><textarea id="mNotes" rows="2"></textarea></div>
        <div class="btn-row">
            <button class="save-btn" style="background:var(--treat);" onclick="saveTreat()">SAVE TREATMENT</button>
            <button class="clear-btn" onclick="document.getElementById('mTreat').style.display='none'">CANCEL</button>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbyxAwycLUjAcJVYfhYNRnmfRGLX8Wq6otcAv-LnBz-uEBj50KNghy8anxqKDVhbDeDIFQ/exec";
    let patients = [], history = [], bills = [];
    
    let PRICELIST = { "CBC": 250, "LFT": 800, "RFT": 800, "ELECTROLYTES": 600, "M.P": 250, "WIDAL TEST": 250, "C.U.E": 100, "E.S.R.": 100, "BLOOD GROUP": 100, "F.B.S": 50, "P.L.B.S.": 50, "HBA1C": 500, "Bl.UREA": 250, "S.CREATININE": 250, "LIPID PROFILE": 500, "S.BILIRUBILIN": 250, "URINE C/S": 500, "HIV": 400, "HBS AG": 250, "VDRL": 250, "MANTOUX TEST": 300, "CRP": 300, "R.A. FACTOR": 300, "T3.T4&TSH": 500, "TESTOTERINE": 800, "VITAMIN B12": 800, "25 OH VITAMIN D": 1200, "CALCIUM": 300, "ECG": 300, "DENGUE RAPID TEST": 1200, "TROP-I": 800, "Sr.URIC ACID": 300, "Sr.AMYLASE": 500 };

    window.onload = () => { resetForm(); loadData(); };

    function resetForm() {
        document.getElementById('date').valueAsDate = new Date();
        document.getElementById('opd_no').value = "SRR-" + Math.floor(Math.random()*900000 + 100000);
        const fields = ['p_name','p_age','p_ph','p_vil','p_bp','p_pu','p_sp','p_te'];
        fields.forEach(f => document.getElementById(f).value = "");
        document.getElementById('saveBtn').innerText = "SAVE PATIENT RECORD";
        document.getElementById('saveBtn').style.background = "var(--primary)";
    }

    async function loadData() {
        try {
            const res = await fetch(API + "?nocache=" + Date.now());
            const data = await res.json();
            patients = data.patients || []; 
            history = data.history || []; 
            bills = data.bills || [];
            renderTable(patients);
        } catch(e) { console.error(e); }
    }

    function renderTable(list) {
        const body = document.getElementById('tbody');
        body.innerHTML = "";
        list.slice().reverse().forEach(p => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${p.date}</td><td><b>${p.opd}</b></td><td>${p.name}</td><td>BP:${p.bp || '--'}</td>
            <td>
                <button class="t-btn" style="background:var(--edit)" onclick="editPatient('${p.opd}')">Edit</button>
                <button class="t-btn" style="background:var(--treat)" onclick="openTreat('${p.opd}','${p.name}')">Treat</button>
                <button class="t-btn" style="background:var(--bill)" onclick="openBill('${p.opd}','${p.name}')">Bill</button>
                <button class="t-btn" style="background:#673ab7" onclick="printRegOnly('${p.opd}')">P-Reg</button>
                <button class="t-btn" style="background:#263238" onclick="printFullRx('${p.opd}')">P-Rx</button>
            </td>`;
            body.appendChild(tr);
        });
    }

    function filterTable() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        const filtered = patients.filter(p => p.name.toLowerCase().includes(val) || p.opd.toLowerCase().includes(val));
        renderTable(filtered);
    }

    function editPatient(opd) {
        const p = patients.find(i => i.opd === opd);
        if(!p) return;
        document.getElementById('date').value = p.date;
        document.getElementById('opd_no').value = p.opd;
        document.getElementById('p_name').value = p.name;
        document.getElementById('p_age').value = p.age;
        document.getElementById('p_sex').value = p.sex;
        document.getElementById('p_ph').value = p.ph || "";
        document.getElementById('p_vil').value = p.vil || "";
        document.getElementById('p_bp').value = p.bp || "";
        document.getElementById('p_pu').value = p.pu || "";
        document.getElementById('p_sp').value = p.sp || "";
        document.getElementById('p_te').value = p.te || "";
        document.getElementById('saveBtn').innerText = "UPDATE RECORD";
        document.getElementById('saveBtn').style.background = "var(--edit)";
        window.scrollTo(0,0);
    }

    function openTreat(opd, name) {
        window.activeOPD = opd; window.activeName = name;
        document.getElementById('mTitle').innerText = "Clinical: " + name;
        document.getElementById('dList').innerHTML = "";
        
        // HISTORY LOGIC
        const pBills = bills.filter(b => b.opd.toString() === opd.toString());
        const box = document.getElementById('billHistory');
        const content = document.getElementById('historyContent');
        if(pBills.length > 0) {
            box.style.display = "block";
            content.innerHTML = pBills.map(b => `📅 <b>${b.date}</b>: ${b.tests} (₹${b.total})`).join('<br>');
        } else { box.style.display = "none"; }

        const h = history.filter(x => x.opd.toString() === opd.toString()).pop();
        if(h) {
            document.getElementById('mComp').value = h.comp || "";
            document.getElementById('mInv').value = h.inv || "";
            document.getElementById('mNotes').value = h.note || "";
            try { JSON.parse(h.rx).forEach(d => addRow(d.n, d.r, d.d, d.m)); } catch(e){ addRow(); }
        } else { addRow(); }
        document.getElementById('mTreat').style.display = "block";
    }

    function openBill(opd, name) {
        window.activeOPD = opd; window.activeName = name;
        renderPriceList();
        document.getElementById('totalBill').innerText = "0";
        document.getElementById('mBill').style.display = 'block';
    }

    function renderPriceList() {
        const container = document.getElementById('investList'); container.innerHTML = "";
        Object.keys(PRICELIST).forEach(test => {
            const row = document.createElement('div'); row.style.display="flex"; row.style.justifyContent="space-between"; row.style.padding="5px";
            row.innerHTML = `<span>${test} (₹${PRICELIST[test]})</span> <input type="checkbox" class="bill-check" data-name="${test}" data-price="${PRICELIST[test]}" onchange="calcTotal()">`;
            container.appendChild(row);
        });
    }

    function addNewTestToList() {
        const n = document.getElementById('newTestName').value.toUpperCase();
        const p = document.getElementById('newTestPrice').value;
        if(n && p) { PRICELIST[n] = parseInt(p); renderPriceList(); }
    }

    function calcTotal() {
        let t = 0; document.querySelectorAll('.bill-check:checked').forEach(c => t += parseInt(c.dataset.price));
        document.getElementById('totalBill').innerText = t;
    }

    async function handleBillAction(mode) {
        const sel = []; document.querySelectorAll('.bill-check:checked').forEach(c => sel.push({ n: c.dataset.name, p: c.dataset.price }));
        if(sel.length === 0) return alert("Select a test!");
        await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: "BILL", opd_no: window.activeOPD, name: window.activeName, tests: sel, total: document.getElementById('totalBill').innerText }) });
        if(mode === 'PRINT') {
            const p = patients.find(i => i.opd === window.activeOPD);
            let rows = sel.map((s, i) => `<tr><td>${i+1}</td><td>${s.n}</td><td>₹${s.p}</td></tr>`).join('');
            const content = `<h2 style="text-align:center;">INVESTIGATION BILL</h2><table class="bill-table"><thead><tr><th>#</th><th>Test</th><th>Price</th></tr></thead><tbody>${rows}</tbody></table><h3 style="text-align:right;">Total: ₹${document.getElementById('totalBill').innerText}</h3>`;
            document.getElementById('printArea').innerHTML = getBasePage(p, content, true);
            window.print();
        }
        location.reload();
    }

    function getBasePage(p, content, isB = false) {
        return `<div class="print-page">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid red; padding-bottom:10px;">
                <div style="display:flex; align-items:center; gap:10px;"><img src="/logo.jpg" style="width:70px;"><div><h1 style="font-size:20px; margin:0; color:red;">SRI RAJA RAJESHWARI HOSPITAL</h1><p style="font-size:10px; margin:0;">Suraram, Telangana</p></div></div>
                <div style="border:1px solid #000; padding:5px; font-size:12px;"><b>Dr. M. Jayachander</b><br>MD (Gen Med) | Reg: 43070</div>
            </div>
            <div style="margin:15px 0; border:1px solid #000; padding:10px; display:flex; justify-content:space-between; font-size:13px;"><div><b>Name:</b> ${p.name}<br><b>Age/Sex:</b> ${p.age}/${p.sex}</div><div><b>Date:</b> ${p.date}<br><b>OPD:</b> ${p.opd}</div></div>
            <div style="flex:1;">${content}</div>
            <div class="lab-footer">24/7 LAB FACILITY AVAILABLE</div>
        </div>`;
    }

    function addRow(n="", r="", d="", m="") {
        const div = document.createElement('div'); div.style.display="flex"; div.style.gap="5px"; div.style.marginBottom="5px";
        div.innerHTML = `<input type="text" placeholder="Drug" class="dn" value="${n}" style="flex:2;"><input type="text" placeholder="Route" class="dr" value="${r}" style="flex:1;"><input type="text" placeholder="Days" class="dd" value="${d}" style="flex:1;"><input type="text" placeholder="Remarks" class="dm" value="${m}" style="flex:2;"><button onclick="this.parentElement.remove()" style="background:red; color:white; border:none; padding:5px;">X</button>`;
        document.getElementById('dList').appendChild(div);
    }

    async function saveTreat() {
        let dr = []; document.querySelectorAll('#dList > div').forEach(r => { let n = r.querySelector('.dn').value; if(n) dr.push({ n: n, r: r.querySelector('.dr').value, d: r.querySelector('.dd').value, m: r.querySelector('.dm').value }); });
        await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: "TREATMENT", opd_no: window.activeOPD, name: window.activeName, complaints: document.getElementById('mComp').value, investigations: document.getElementById('mInv').value, drugs: dr, notes: document.getElementById('mNotes').value }) });
        alert("Clinical Data Saved!"); location.reload();
    }

    async function submitReg() {
        const p = { type: "REG", date: document.getElementById('date').value, opd_no: document.getElementById('opd_no').value, name: document.getElementById('p_name').value, age: document.getElementById('p_age').value, sex: document.getElementById('p_sex').value, phone: document.getElementById('p_ph').value, village: document.getElementById('p_vil').value, bp: document.getElementById('p_bp').value, pulse: document.getElementById('p_pu').value, spo2: document.getElementById('p_sp').value, temp: document.getElementById('p_te').value };
        await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(p) });
        alert("Patient Saved!"); location.reload();
    }

    function printRegOnly(opd) {
        const p = patients.find(i => i.opd === opd);
        document.getElementById('printArea').innerHTML = getBasePage(p, '<h1 style="color:red; font-size:40px; margin-top:20px;">Rx</h1>');
        window.print();
    }

    function printFullRx(opd) {
        const p = patients.find(i => i.opd === opd);
        const h = history.filter(x => x.opd.toString() === opd.toString()).pop();
        if(!h) return alert("No record found!");
        let dRows = JSON.parse(h.rx).map(d => `<tr><td><b>${d.n}</b></td><td>${d.r}</td><td>${d.d}</td><td>${d.m}</td></tr>`).join('');
        const content = `<div><b>Complaints:</b> ${h.comp}</div><h1 style="color:red; font-size:30px;">Rx</h1><table class="bill-table"><thead><tr><th>Drug</th><th>Route</th><th>Days</th><th>Notes</th></tr></thead><tbody>${dRows}</tbody></table>`;
        document.getElementById('printArea').innerHTML = getBasePage(p, content);
        window.print();
    }
</script>
</body>
</html>
