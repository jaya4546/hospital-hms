<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRR Hospital HMS - Professional Edition</title>
    <style>
        :root { --primary: #1b5e20; --dark: #263238; --bg: #eceff1; --accent: #c62828; --edit: #2980b9; --treat: #e67e22; --table-blue: #1e88e5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 1300px; background: white; padding: 20px; border-radius: 12px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; }
        .header-left { display: flex; align-items: center; gap: 15px; flex: 2; }
        .logo-img { width: 90px; height: 90px; object-fit: contain; }
        .hosp-name { font-size: 26px; color: var(--accent); margin: 0; font-weight: 900; white-space: nowrap; text-transform: uppercase; }
        .hosp-addr { font-size: 11px; color: #444; margin: 4px 0 0 0; font-weight: 600; line-height: 1.2; }
        .doc-card { border: 2px solid var(--primary); padding: 8px 15px; border-radius: 6px; background: #f1f8e9; text-align: left; min-width: 210px; }
        .doc-name { font-size: 18px; font-weight: 800; color: var(--primary); margin: 0; }
        .doc-sub { font-size: 13px; font-weight: 700; margin: 2px 0; color: #333; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .input-box { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 11px; color: #555; margin-bottom: 4px; text-transform: uppercase; }
        input, select, textarea { padding: 10px; border: 1px solid #bbb; border-radius: 4px; font-size: 13px; }

        .btn-row { display: flex; gap: 10px; margin: 15px 0; }
        .save-btn { flex: 2; background: var(--primary); color: white; border: none; padding: 14px; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .clear-btn { flex: 1; background: #78909c; color: white; border: none; padding: 14px; border-radius: 5px; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; border-radius: 8px; overflow: hidden; }
        th { background: var(--dark); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; background: white; }
        .t-btn { border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; color: white !important; font-weight: bold; margin-right: 3px; font-size: 11px; display: inline-block; }
        .btn-preg { background: #673ab7 !important; } 
        .btn-prx { background: #263238 !important; }  
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; padding: 20px; overflow-y: auto; }
        .modal-body { background: white; max-width: 850px; margin: auto; padding: 30px; border-radius: 10px; border-top: 10px solid var(--treat); }
        .drug-row { display: grid; grid-template-columns: 2fr 1fr 1fr 2fr auto; gap: 8px; margin-bottom: 8px; }

        /* PRINT STYLES - CAREFULLY MODIFIED TO PREVENT EMPTY PAGES */
        #printArea { display: none; }
        @media print {
            @page { margin: 0; }
            body { background: white !important; padding: 0; margin: 0; }
            .container, .modal, .btn-row, .no-print { display: none !important; }
            #printArea { display: block !important; width: 100%; margin: 0; padding: 0; }
            .page-break { page-break-before: always; }
            
            .print-page { width: 210mm; min-height: 297mm; padding: 10mm 15mm; box-sizing: border-box; display: flex; flex-direction: column; position: relative; }
            .print-header-content { border-bottom: 3px solid var(--accent); padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
            .p-left { display: flex; align-items: center; gap: 15px; }
            .p-logo { width: 90px; height: 90px; object-fit: contain; }
            .p-doc-box { border: 2.5px solid var(--primary); padding: 8px; border-radius: 4px; text-align: left; background: #f9fff9 !important; }
            
            .patient-data-box { border: 2px solid #000; padding: 10px; border-radius: 6px; margin-bottom: 10px; background: #fcfcfc !important; }
            .data-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 13px; }
            .vitals-strip { border-top: 1.5px solid #444; margin-top: 5px; padding-top: 5px; font-weight: bold; font-size: 12px; color: #000; }

            .assessment-box { border: 1.5px solid #555; border-radius: 5px; padding: 8px; margin-bottom: 8px; background: #fff !important; }
            .assessment-label { font-weight: 800; text-decoration: underline; color: #1b5e20; font-size: 12px; margin-bottom: 2px; display: block; }

            .drug-table { width: 100%; border: 1px solid #000; border-collapse: collapse; margin-top: 5px; }
            .drug-table th { background-color: var(--table-blue) !important; color: white !important; padding: 8px; border: 1px solid #000; text-transform: uppercase; font-size: 11px; }
            .drug-table td { padding: 8px; border: 1px solid #000; font-size: 12px; }

            .rx-symbol { font-size: 35px; font-weight: bold; margin: 5px 0; color: #c62828; }
            .notes-section { margin-top: 15px; font-style: italic; border-left: 4px solid var(--primary); padding-left: 10px; font-size: 13px; color: #000; font-weight: 600; }

            .footer-container { position: absolute; bottom: 10mm; left: 15mm; right: 15mm; }
            .sig-area { text-align: right; margin-bottom: 20px; }
            .sig-text { font-weight: 900; font-size: 16px; margin: 0; text-transform: uppercase; }
            .sig-sub { font-weight: 700; font-size: 11px; margin: 2px 0; }

            .print-footer-content { 
                display: flex; align-items: center; justify-content: center; gap: 15px;
                padding: 12px; font-weight: 900; font-size: 18px; 
                color: #ffffff !important; background: #ad1457 !important;
                border-top: 4px solid #880e4f; border-radius: 8px; text-transform: uppercase;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-left">
            <img src="/logo.jpg" alt="Logo" class="logo-img">
            <div class="hosp-info">
                <h1 class="hosp-name">SRI RAJA RAJESHWARI HOSPITAL</h1>
                <p class="hosp-addr">Suraram colony IDA jeedimetla NTR road, Opp: Ramaleela maidanam, Telangana 500055</p>
            </div>
        </div>
        <div class="doc-card">
            <p class="doc-name">Dr. M. Jayachander</p>
            <p class="doc-sub">MBBS, MD (General Medicine)</p>
            <p style="margin:0; font-size:11px;">Reg No: TSMC/FMR/43070</p>
        </div>
    </div>

    <div class="grid">
        <div class="input-box"><label>Date</label><input type="date" id="date"></div>
        <div class="input-box"><label>OPD No</label><input type="text" id="opd_no" readonly style="background:#f5f5f5; font-weight: bold;"></div>
        <div class="input-box"><label>Patient Name</label><input type="text" id="p_name"></div>
        <div class="input-box"><label>Age</label><input type="number" id="p_age"></div>
        <div class="input-box"><label>Sex</label><select id="p_sex"><option>Male</option><option>Female</option></select></div>
        <div class="input-box"><label>Phone</label><input type="text" id="p_ph"></div>
        <div class="input-box"><label>Village</label><input type="text" id="p_vil"></div>
        <div class="input-box"><label>BP</label><input type="text" id="p_bp"></div>
        <div class="input-box"><label>Pulse</label><input type="text" id="p_pu"></div>
        <div class="input-box"><label>SpO2</label><input type="text" id="p_sp"></div>
        <div class="input-box"><label>Temp</label><input type="text" id="p_te"></div>
    </div>

    <div class="btn-row">
        <button class="save-btn" id="saveBtn" onclick="submitReg()">SAVE PATIENT RECORD</button>
        <button class="clear-btn" onclick="resetForm()">NEW REGISTRATION</button>
    </div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>OPD No</th>
                    <th>Name</th>
                    <th>Vitals</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<div id="printArea"></div>

<div id="mTreat" class="modal">
    <div class="modal-body">
        <h2 id="mTitle" style="margin-top:0; color: var(--treat);">Clinical Assessment</h2>
        <div class="grid" style="grid-template-columns: 1fr 1fr;">
            <div class="input-box"><label>Chief Complaints</label><textarea id="mComp" rows="3"></textarea></div>
            <div class="input-box"><label>Investigations</label><textarea id="mInv" rows="3"></textarea></div>
        </div>
        <label>Prescription</label>
        <div id="dList"></div>
        <button onclick="addRow()" style="margin:10px 0;">+ Add Medication</button>
        <div class="input-box"><label>Notes</label><textarea id="mNotes" rows="2"></textarea></div>
        <div class="btn-row">
            <button class="save-btn" style="background:var(--treat);" onclick="saveTreat()">SAVE TREATMENT</button>
            <button class="clear-btn" onclick="document.getElementById('mTreat').style.display='none'">CANCEL</button>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbyxAwycLUjAcJVYfhYNRnmfRGLX8Wq6otcAv-LnBz-uEBj50KNghy8anxqKDVhbDeDIFQ/exec";
    let patients = [], history = [];

    window.onload = () => { resetForm(); loadData(); };

    function resetForm() {
        document.getElementById('date').valueAsDate = new Date();
        document.getElementById('opd_no').value = "SRR-" + Math.floor(Math.random()*900000 + 100000);
        document.getElementById('p_name').value = ""; document.getElementById('p_age').value = "";
        document.getElementById('p_ph').value = ""; document.getElementById('p_vil').value = "";
        document.getElementById('p_bp').value = ""; document.getElementById('p_pu').value = "";
        document.getElementById('p_sp').value = ""; document.getElementById('p_te').value = "";
        document.getElementById('saveBtn').innerText = "SAVE PATIENT RECORD";
        document.getElementById('saveBtn').style.background = "var(--primary)";
    }

    async function loadData() {
        try {
            const res = await fetch(API + "?nocache=" + Date.now());
            const data = await res.json();
            patients = data.patients || []; history = data.history || [];
            const body = document.getElementById('tbody');
            body.innerHTML = "";
            patients.reverse().forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${p.date}</td><td><b>${p.opd}</b></td><td>${p.name}</td><td>BP:${p.bp} P:${p.pu} O2:${p.sp}%</td>
                <td>
                    <button class="t-btn" style="background:var(--edit)" onclick="editPatient('${p.opd}')">Edit</button>
                    <button class="t-btn" style="background:var(--treat)" onclick="openTreat('${p.opd}','${p.name}')">Treat</button>
                    <button class="t-btn btn-preg" onclick="printRegOnly('${p.opd}')">P-Reg</button>
                    <button class="t-btn btn-prx" onclick="printFullRx('${p.opd}')">P-Rx</button>
                </td>`;
                body.appendChild(tr);
            });
        } catch(e) { console.error(e); }
    }

    function getBasePage(p, content) {
        return `
        <div class="print-page">
            <div class="print-header-content">
                <div class="p-left">
                    <img src="/logo.jpg" class="p-logo">
                    <div>
                        <h1 class="hosp-name" style="font-size:22px;">SRI RAJA RAJESHWARI HOSPITAL</h1>
                        <p style="margin:2px 0; font-size:10px; font-weight:bold;">Suraram colony IDA jeedimetla NTR road, TS 500055</p>
                    </div>
                </div>
                <div class="p-doc-box">
                    <p style="font-weight:bold; font-size:16px; margin:0; color:var(--primary);">Dr. M. Jayachander</p>
                    <p style="margin:2px 0; font-weight:bold; font-size:12px;">MBBS, MD (General Medicine)</p>
                    <p style="margin:0; font-size:10px;">Reg No: TSMC/FMR/43070</p>
                </div>
            </div>
            <div class="patient-data-box">
                <div class="data-row"><span><b>Name:</b> ${p.name}</span><span><b>Date:</b> ${p.date}</span></div>
                <div class="data-row"><span><b>Age/Sex:</b> ${p.age}/${p.sex}</span><span><b>OPD:</b> ${p.opd}</span></div>
                <div class="vitals-strip">VITALS: BP: ${p.bp} | Pulse: ${p.pu} | O2: ${p.sp}% | Temp: ${p.te}F</div>
            </div>
            ${content}
            <div class="footer-container">
                <div class="sig-area">
                    <p class="sig-text">DR. M. JAYACHANDER</p>
                    <p class="sig-sub">MBBS, MD (GENERAL MEDICINE)</p>
                </div>
                <div class="print-footer-content">
                    <span class="footer-icon">⚕️</span>
                    SRI RAJA RAJESHWARI MEDICAL AND GENERAL STORES
                    <span class="footer-icon">💊</span>
                </div>
            </div>
        </div>`;
    }

    /* RECTIFIED FUNCTION: Removes Registration Slip title and dashed placeholder box */
    function printRegOnly(opd) {
        const p = patients.find(i => i.opd === opd);
        
        // This clean content removes the title and the huge dashed box. 
        // It leaves the entire top and bottom areas untouched.
        const content = `
            <div class="rx-symbol">Rx</div>
            <div style="flex:1;"></div>
        `;
        document.getElementById('printArea').innerHTML = getBasePage(p, content);
        window.print();
    }

    function printFullRx(opd) {
        const p = patients.find(i => i.opd === opd);
        const h = history.filter(x => x.opd.toString() === opd.toString()).pop();
        if(!h) return alert("Save treatment first!");

        let drugList = [];
        try { drugList = JSON.parse(h.rx); } catch(e) { drugList = []; }

        const chunks = [];
        for (let i = 0; i < drugList.length; i += 6) {
            chunks.push(drugList.slice(i, i + 6));
        }

        let fullHTML = "";
        if (chunks.length === 0) chunks.push([]); 

        chunks.forEach((chunk, index) => {
            let content = "";
            if(index === 0) {
                content += `
                    <div class="assessment-box"><span class="assessment-label">CHIEF COMPLAINTS:</span> ${h.comp || 'N/A'}</div>
                    <div class="assessment-box"><span class="assessment-label">INVESTIGATIONS:</span> ${h.inv || 'N/A'}</div>
                `;
            }
            content += `<div class="rx-symbol">Rx</div>`;
            if(chunk.length > 0) {
                let chunkRows = chunk.map(d => `<tr><td><b>${d.n}</b></td><td>${d.r}</td><td>${d.d} Days</td><td>${d.m}</td></tr>`).join('');
                content += `
                    <table class="drug-table">
                        <thead><tr><th>Medication</th><th>Route</th><th>Duration</th><th>Remarks</th></tr></thead>
                        <tbody>${chunkRows}</tbody>
                    </table>
                `;
            } else {
                content += `<p style="padding-left:10px;">No medications listed.</p>`;
            }
            if(index === chunks.length - 1 && h.note) {
                content += `<div class="notes-section"><b>NOTES:</b> ${h.note}</div>`;
            }
            let pageHTML = getBasePage(p, content);
            if(index > 0) fullHTML += `<div class="page-break"></div>`;
            fullHTML += pageHTML;
        });

        document.getElementById('printArea').innerHTML = fullHTML;
        window.print();
    }

    function editPatient(opd) {
        const p = patients.find(i => i.opd === opd);
        if(!p) return;
        document.getElementById('date').value = p.date;
        document.getElementById('opd_no').value = p.opd;
        document.getElementById('p_name').value = p.name;
        document.getElementById('p_age').value = p.age;
        document.getElementById('p_sex').value = p.sex;
        document.getElementById('p_ph').value = p.ph;
        document.getElementById('p_vil').value = p.vil;
        document.getElementById('p_bp').value = p.bp;
        document.getElementById('p_pu').value = p.pu;
        document.getElementById('p_sp').value = p.sp;
        document.getElementById('p_te').value = p.te;
        document.getElementById('saveBtn').innerText = "UPDATE RECORD";
        document.getElementById('saveBtn').style.background = "var(--edit)";
        window.scrollTo(0,0);
    }

    function openTreat(opd, name) {
        window.activeOPD = opd; window.activeName = name;
        document.getElementById('mTitle').innerText = "Treating: " + name;
        document.getElementById('dList').innerHTML = "";
        const h = history.filter(x => x.opd.toString() === opd.toString()).pop();
        if(h) {
            document.getElementById('mComp').value = h.comp || "";
            document.getElementById('mInv').value = h.inv || "";
            document.getElementById('mNotes').value = h.note || "";
            try { JSON.parse(h.rx).forEach(d => addRow(d.n, d.r, d.d, d.m)); } catch(e) { addRow(); }
        } else { addRow(); }
        document.getElementById('mTreat').style.display = "block";
    }

    function addRow(n="", r="", d="", m="") {
        const div = document.createElement('div'); div.className = 'drug-row';
        div.innerHTML = `<input type="text" placeholder="Drug" class="dn" value="${n}"><input type="text" placeholder="Route" class="dr" value="${r}"><input type="text" placeholder="Days" class="dd" value="${d}"><input type="text" placeholder="Remarks" class="dm" value="${m}"><button onclick="this.parentElement.remove()" style="background:red; color:white; border:none; cursor:pointer;">✖</button>`;
        document.getElementById('dList').appendChild(div);
    }

    async function saveTreat() {
        let drugs = [];
        document.querySelectorAll('.drug-row').forEach(r => {
            let n = r.querySelector('.dn').value;
            if(n) drugs.push({ n: n, r: r.querySelector('.dr').value, d: r.querySelector('.dd').value, m: r.querySelector('.dm').value });
        });
        await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: "TREATMENT", opd_no: window.activeOPD, name: window.activeName, complaints: document.getElementById('mComp').value, investigations: document.getElementById('mInv').value, drugs: drugs, notes: document.getElementById('mNotes').value }) });
        alert("Clinical Data Saved!"); location.reload();
    }

    async function submitReg() {
        const p = { type: "REG", date: document.getElementById('date').value, opd_no: document.getElementById('opd_no').value, name: document.getElementById('p_name').value, age: document.getElementById('p_age').value, sex: document.getElementById('p_sex').value, phone: document.getElementById('p_ph').value, village: document.getElementById('p_vil').value, bp: document.getElementById('p_bp').value, pulse: document.getElementById('p_pu').value, spo2: document.getElementById('p_sp').value, temp: document.getElementById('p_te').value };
        await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(p) });
        alert("Record Synchronized!"); location.reload();
    }
</script>
</body>
</html>
