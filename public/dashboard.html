<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRR Hospital HMS - Professional Print System</title>
    <style>
        :root { --primary: #1b5e20; --dark: #263238; --bg: #eceff1; --accent: #c62828; --edit: #2980b9; --treat: #e67e22; --print: #673ab7; --table-blue: #1e88e5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 1300px; background: white; padding: 25px; border-radius: 8px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.15); border-top: 10px solid var(--primary); }
        
        /* Header Screen Layout */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 20px; }
        .hosp-brand { display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 80px; height: 80px; object-fit: contain; }
        .hosp-name { font-size: 24px; color: var(--accent); margin: 0; font-weight: 900; white-space: nowrap; }
        .doc-info { text-align: right; background: #f1f8e9; padding: 10px; border-radius: 6px; border: 1px solid var(--primary); min-width: 220px; }
        
        /* Form Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 12px; margin-bottom: 15px; }
        .input-box { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 11px; color: #555; margin-bottom: 4px; }
        input, select, textarea { padding: 10px; border: 1px solid #bbb; border-radius: 4px; font-size: 13px; }
        .btn-row { display: flex; gap: 10px; margin: 15px 0; }
        .save-btn { flex: 2; background: var(--primary); color: white; border: none; padding: 14px; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .clear-btn { flex: 1; background: #78909c; color: white; border: none; padding: 14px; border-radius: 5px; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th { background: var(--dark); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .t-btn { border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; margin-right: 3px; font-size: 11px; }
        
        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; padding: 20px; overflow-y: auto; }
        .modal-body { background: white; max-width: 850px; margin: auto; padding: 30px; border-radius: 10px; border-top: 10px solid var(--treat); }
        .drug-row { display: grid; grid-template-columns: 2fr 1fr 1fr 2fr auto; gap: 8px; margin-bottom: 8px; }

        /* PRINT STYLES - CAREFULLY CRAFTED */
        #printArea { display: none; }
        
        @media print {
            @page { margin: 1cm 1.5cm; } /* Increased Left/Right Margins */
            body { background: white !important; }
            .container, .modal, .btn-row, .no-print { display: none !important; }
            #printArea { display: block !important; width: 100%; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            
            /* Logic for Repeating Header on Page 2 */
            .print-table { width: 100%; border-collapse: collapse; }
            .print-header-wrapper { display: table-header-group; } /* Core fix for page 2 header */
            .print-footer-wrapper { display: table-footer-group; } /* Core fix for page 2 footer */

            .print-header-content { border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
            .h-left { display: flex; align-items: center; gap: 10px; max-width: 65%; }
            .h-right { border: 2px solid var(--primary); padding: 8px; border-radius: 4px; text-align: right; min-width: 200px; line-height: 1.2; }
            
            .drug-table { width: 100%; border: 1px solid #ddd; border-collapse: collapse; margin-top: 10px; }
            .drug-table th { background-color: var(--table-blue) !important; color: white !important; padding: 10px; border: 1px solid #ddd; }
            .drug-table td { padding: 10px; border: 1px solid #ddd; }

            .print-footer-content { 
                text-align: center; 
                padding: 15px; 
                font-weight: bold; 
                font-size: 18px; 
                color: #ad1457 !important; /* Beautiful Pinkish-Red */
                border-top: 2px solid #ddd;
                margin-top: 20px;
            }
            .rx-symbol { font-size: 35px; font-weight: bold; margin: 10px 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="hosp-brand">
            <img src="/logo.jpg" alt="Logo" class="logo-img">
            <div class="hosp-info">
                <h1 class="hosp-name">SRI RAJA RAJESHWARI HOSPITAL</h1>
                <p style="margin:2px 0; font-size:12px; font-weight:bold;">Suraram colony NTR road, Telangana</p>
            </div>
        </div>
        <div class="doc-info">
            <p style="margin:0; font-weight:bold; color:var(--primary);">Dr. M. Jayachander</p>
            <p style="margin:2px 0; font-size:13px;">MBBS, MD (Gen Med)</p>
            <p style="margin:0; font-size:11px;">TSMC/FMR/43070</p>
        </div>
    </div>

    <div class="grid">
        <div class="input-box"><label>Date</label><input type="date" id="date"></div>
        <div class="input-box"><label>OPD No</label><input type="text" id="opd_no" readonly style="background:#f5f5f5; font-weight: bold;"></div>
        <div class="input-box"><label>Patient Name</label><input type="text" id="p_name"></div>
        <div class="input-box"><label>Age</label><input type="number" id="p_age"></div>
        <div class="input-box"><label>Sex</label><select id="p_sex"><option>Male</option><option>Female</option></select></div>
        <div class="input-box"><label>Phone</label><input type="text" id="p_ph"></div>
        <div class="input-box"><label>Village</label><input type="text" id="p_vil"></div>
        <div class="input-box"><label>BP</label><input type="text" id="p_bp"></div>
        <div class="input-box"><label>Pulse</label><input type="text" id="p_pu"></div>
        <div class="input-box"><label>SpO2</label><input type="text" id="p_sp"></div>
        <div class="input-box"><label>Temp</label><input type="text" id="p_te"></div>
    </div>

    <div class="btn-row">
        <button class="save-btn" id="saveBtn" onclick="submitReg()">SAVE PATIENT RECORD</button>
        <button class="clear-btn" onclick="resetForm()">NEW REGISTRATION</button>
    </div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>OPD No</th>
                    <th>Name</th>
                    <th>Vitals</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<div id="printArea"></div>

<div id="mTreat" class="modal">
    <div class="modal-body">
        <h2 id="mTitle" style="margin-top:0; color: var(--treat);">Clinical Assessment</h2>
        <div class="grid" style="grid-template-columns: 1fr 1fr;">
            <div class="input-box"><label>Chief Complaints</label><textarea id="mComp" rows="3"></textarea></div>
            <div class="input-box"><label>Investigations</label><textarea id="mInv" rows="3"></textarea></div>
        </div>
        <label>Prescription</label>
        <div id="dList"></div>
        <button onclick="addRow()" style="margin:10px 0;">+ Add Medication</button>
        <div class="input-box"><label>Notes</label><textarea id="mNotes" rows="2"></textarea></div>
        <div class="btn-row">
            <button class="save-btn" style="background:var(--treat);" onclick="saveTreat()">SAVE TREATMENT</button>
            <button class="clear-btn" onclick="document.getElementById('mTreat').style.display='none'">CANCEL</button>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbyxAwycLUjAcJVYfhYNRnmfRGLX8Wq6otcAv-LnBz-uEBj50KNghy8anxqKDVhbDeDIFQ/exec";
    let patients = [], history = [];

    window.onload = () => { resetForm(); loadData(); };

    function resetForm() {
        document.getElementById('date').valueAsDate = new Date();
        document.getElementById('opd_no').value = "SRR-" + Math.floor(Math.random()*900000 + 100000);
        document.getElementById('p_name').value = ""; document.getElementById('p_age').value = "";
        document.getElementById('p_ph').value = ""; document.getElementById('p_vil').value = "";
        document.getElementById('p_bp').value = ""; document.getElementById('p_pu').value = "";
        document.getElementById('p_sp').value = ""; document.getElementById('p_te').value = "";
        document.getElementById('saveBtn').innerText = "SAVE PATIENT RECORD";
        document.getElementById('saveBtn').style.background = "var(--primary)";
    }

    async function loadData() {
        try {
            const res = await fetch(API + "?nocache=" + Date.now());
            const data = await res.json();
            patients = data.patients || []; history = data.history || [];
            const body = document.getElementById('tbody');
            body.innerHTML = "";
            patients.reverse().forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${p.date}</td><td><b>${p.opd}</b></td><td>${p.name}</td><td>BP:${p.bp} O2:${p.sp}%</td>
                <td>
                    <button class="t-btn" style="background:var(--edit)" onclick="editPatient('${p.opd}')">Edit</button>
                    <button class="t-btn" style="background:var(--treat)" onclick="openTreat('${p.opd}','${p.name}')">Treat</button>
                    <button class="t-btn" style="background:var(--print)" onclick="printRegOnly('${p.opd}')">P-Reg</button>
                    <button class="t-btn" style="background:var(--dark)" onclick="printFullRx('${p.opd}')">P-Rx</button>
                </td>`;
                body.appendChild(tr);
            });
        } catch(e) { console.error(e); }
    }

    function generatePrintHTML(headerHtml, contentHtml) {
        return `
        <table class="print-table">
            <thead class="print-header-wrapper">
                <tr><td>
                    <div class="print-header-content">
                        <div class="h-left">
                            <img src="/logo.jpg" class="logo-img">
                            <h1 class="hosp-name">SRI RAJA RAJESHWARI HOSPITAL</h1>
                        </div>
                        <div class="h-right">
                            <p style="font-weight:bold; font-size:18px; margin:0;">Dr. M. Jayachander</p>
                            <p style="margin:2px 0;">MBBS, MD (General Medicine)</p>
                            <p style="margin:0; font-size:11px;">Reg No: TSMC/FMR/43070</p>
                        </div>
                    </div>
                </td></tr>
            </thead>
            <tbody>
                <tr><td>${contentHtml}</td></tr>
            </tbody>
            <tfoot class="print-footer-wrapper">
                <tr><td>
                    <div class="print-footer-content">SRI RAJA RAJESHWARI MEDICAL</div>
                </td></tr>
            </tfoot>
        </table>`;
    }

    function printRegOnly(opd) {
        const p = patients.find(i => i.opd === opd);
        const content = `
            <h2 style="text-align:center; text-decoration: underline;">REGISTRATION SLIP</h2>
            <div style="display:flex; justify-content:space-between; margin-bottom:20px; border:1px solid #eee; padding:10px;">
                <div><b>Patient:</b> ${p.name} (${p.age}/${p.sex})<br><b>Phone:</b> ${p.ph}</div>
                <div style="text-align:right;"><b>Date:</b> ${p.date}<br><b>OPD No:</b> ${p.opd}</div>
            </div>
            <p><b>Vitals:</b> BP: ${p.bp} | Pulse: ${p.pu} | SpO2: ${p.sp}% | Temp: ${p.te}F</p>
            <div class="rx-symbol">Rx</div>
            <div style="height:600px; border:1px dashed #ddd; display:flex; align-items:center; justify-content:center; color:#ccc;">
                [ SPACE FOR MANUAL PRESCRIPTION ]
            </div>
        `;
        document.getElementById('printArea').innerHTML = generatePrintHTML('', content);
        window.print();
    }

    function printFullRx(opd) {
        const p = patients.find(i => i.opd === opd);
        const h = history.filter(x => x.opd.toString() === opd.toString()).pop();
        if(!h) return alert("Save treatment first!");

        let drugRows = "";
        try {
            const drugs = JSON.parse(h.rx);
            drugs.forEach((d, index) => {
                if(index < 7) { // Soft limit for first page view, though the table logic handles spillover
                     drugRows += `<tr><td><b>${d.n}</b></td><td>${d.r}</td><td>${d.d} Days</td><td>${d.m}</td></tr>`;
                } else {
                     drugRows += `<tr><td><b>${d.n}</b></td><td>${d.r}</td><td>${d.d} Days</td><td>${d.m}</td></tr>`;
                }
            });
        } catch(e) { drugRows = "<tr><td colspan='4'>No data</td></tr>"; }

        const content = `
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; background:#f9f9f9; padding:10px;">
                <div><b>Patient:</b> ${p.name} (${p.age}/${p.sex})</div>
                <div style="text-align:right;"><b>OPD:</b> ${p.opd} | <b>Date:</b> ${p.date}</div>
            </div>
            <p><b>Vitals:</b> BP: ${p.bp} | Pulse: ${p.pu} | O2: ${p.sp}% | Temp: ${p.te}F</p>
            <p><b>Complaints:</b> ${h.comp}</p>
            <p><b>Investigations:</b> ${h.inv}</p>
            <div class="rx-symbol">Rx</div>
            <table class="drug-table">
                <thead><tr><th>Medication</th><th>Route</th><th>Duration</th><th>Remarks</th></tr></thead>
                <tbody>${drugRows}</tbody>
            </table>
            <div style="margin-top:40px; text-align:right; font-weight:bold;">
                <br><br><br>Authorized Signature
            </div>
        `;
        document.getElementById('printArea').innerHTML = generatePrintHTML('', content);
        window.print();
    }

    /* EXISTING CODE UNTOUCHED */
    function editPatient(opd) {
        const p = patients.find(i => i.opd === opd);
        if(!p) return;
        document.getElementById('date').value = p.date;
        document.getElementById('opd_no').value = p.opd;
        document.getElementById('p_name').value = p.name;
        document.getElementById('p_age').value = p.age;
        document.getElementById('p_sex').value = p.sex;
        document.getElementById('p_ph').value = p.ph;
        document.getElementById('p_vil').value = p.vil;
        document.getElementById('p_bp').value = p.bp;
        document.getElementById('p_pu').value = p.pu;
        document.getElementById('p_sp').value = p.sp;
        document.getElementById('p_te').value = p.te;
        document.getElementById('saveBtn').innerText = "UPDATE RECORD";
        document.getElementById('saveBtn').style.background = "var(--edit)";
        window.scrollTo(0,0);
    }

    function openTreat(opd, name) {
        window.activeOPD = opd; window.activeName = name;
        document.getElementById('mTitle').innerText = "Treating: " + name;
        document.getElementById('dList').innerHTML = "";
        const h = history.filter(x => x.opd.toString() === opd.toString()).pop();
        if(h) {
            document.getElementById('mComp').value = h.comp || "";
            document.getElementById('mInv').value = h.inv || "";
            document.getElementById('mNotes').value = h.note || "";
            try { JSON.parse(h.rx).forEach(d => addRow(d.n, d.r, d.d, d.m)); } catch(e) { addRow(); }
        } else { addRow(); }
        document.getElementById('mTreat').style.display = "block";
    }

    function addRow(n="", r="", d="", m="") {
        const div = document.createElement('div'); div.className = 'drug-row';
        div.innerHTML = `<input type="text" placeholder="Drug" class="dn" value="${n}"><input type="text" placeholder="Route" class="dr" value="${r}"><input type="text" placeholder="Days" class="dd" value="${d}"><input type="text" placeholder="Remarks" class="dm" value="${m}"><button onclick="this.parentElement.remove()" style="background:red; color:white; border:none; cursor:pointer;">✖</button>`;
        document.getElementById('dList').appendChild(div);
    }

    async function saveTreat() {
        let drugs = [];
        document.querySelectorAll('.drug-row').forEach(r => {
            let n = r.querySelector('.dn').value;
            if(n) drugs.push({ n: n, r: r.querySelector('.dr').value, d: r.querySelector('.dd').value, m: r.querySelector('.dm').value });
        });
        await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: "TREATMENT", opd_no: window.activeOPD, name: window.activeName, complaints: document.getElementById('mComp').value, investigations: document.getElementById('mInv').value, drugs: drugs, notes: document.getElementById('mNotes').value }) });
        alert("Clinical Data Saved!"); location.reload();
    }

    async function submitReg() {
        const p = { type: "REG", date: document.getElementById('date').value, opd_no: document.getElementById('opd_no').value, name: document.getElementById('p_name').value, age: document.getElementById('p_age').value, sex: document.getElementById('p_sex').value, phone: document.getElementById('p_ph').value, village: document.getElementById('p_vil').value, bp: document.getElementById('p_bp').value, pulse: document.getElementById('p_pu').value, spo2: document.getElementById('p_sp').value, temp: document.getElementById('p_te').value };
        await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(p) });
        alert("Record Synchronized!"); location.reload();
    }
</script>
</body>
</html>
