<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRR Hospital HMS - Clinical Fix</title>
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --bg: #f4f7f6; --treat: #e67e22; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; background: white; padding: 30px; border-radius: 12px; margin: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 25px; }
        .hosp-name { font-size: 28px; color: #c0392b; text-transform: uppercase; margin: 0; font-weight: 900; }
        .doctor-info { border-left: 4px solid var(--dark); padding-left: 15px; text-align: left; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .input-box { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 12px; color: #444; margin-bottom: 5px; }
        input, select, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; width: 100%; box-sizing: border-box; }
        
        .save-btn { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .save-btn:hover { opacity: 0.9; }
        
        .table-wrap { margin-top: 30px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: var(--dark); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); overflow-y: auto; padding: 20px; z-index: 1000; }
        .modal-body { background: white; max-width: 850px; margin: 30px auto; padding: 30px; border-radius: 10px; border-top: 10px solid var(--treat); position: relative; }
        .drug-row { display: grid; grid-template-columns: 2fr 1fr 1fr 2fr auto; gap: 10px; margin-bottom: 10px; align-items: center; }
        .drug-row button { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div><img src="logo.jpg" style="width:120px;" alt="Logo"></div>
        <div style="text-align:center;">
            <h1 class="hosp-name">Sri Raja Rajeshwari Hospital</h1>
            <p style="margin:5px 0; color:#555;">Suraram colony, NTR road, Telangana 500055</p>
        </div>
        <div class="doctor-info">
            <b>Dr. M. Jayachander</b><br>
            <small>MBBS, MD (General Medicine)<br>Reg: TSMC/FMR/43070</small>
        </div>
    </div>

    <h3>Patient Registration</h3>
    <div class="grid">
        <div class="input-box"><label>Date</label><input type="date" id="date"></div>
        <div class="input-box"><label>OPD No</label><input type="text" id="opd_no" readonly style="background:#f9f9f9; font-weight:bold;"></div>
        <div class="input-box"><label>Name</label><input type="text" id="p_name"></div>
        <div class="input-box"><label>Age</label><input type="number" id="p_age"></div>
        <div class="input-box"><label>Sex</label><select id="p_sex"><option>Male</option><option>Female</option></select></div>
        <div class="input-box"><label>Village</label><input type="text" id="p_vil"></div>
        <div class="input-box"><label>BP</label><input type="text" id="p_bp"></div>
        <div class="input-box"><label>Pulse</label><input type="text" id="p_pu"></div>
    </div>
    <button class="save-btn" onclick="submitReg()">SAVE PATIENT RECORD</button>

    <div class="table-wrap">
        <table>
            <thead><tr><th>Date</th><th>OPD</th><th>Name</th><th>Age/Sex</th><th>Village</th><th>Action</th></tr></thead>
            <tbody id="tbody">
                <tr><td colspan="6" style="text-align:center; padding:20px;">Connecting to database...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="mTreat" class="modal">
    <div class="modal-body">
        <h2 id="mTitle" style="color:var(--treat); margin-top:0;">Clinical Data</h2>
        
        <div class="grid" style="grid-template-columns: 1fr 1fr;">
            <div class="input-box"><label>Complaints</label><textarea id="mComp" rows="3" placeholder="Enter patient complaints..."></textarea></div>
            <div class="input-box"><label>Investigations</label><textarea id="mInv" rows="3" placeholder="Enter lab results/investigations..."></textarea></div>
        </div>

        <label style="display:block; margin: 15px 0 10px; font-weight:bold;">Prescription (Drug | Route | Duration | Remarks)</label>
        <div id="dList"></div>
        <button onclick="addRow()" style="margin:10px 0; padding: 8px 15px; cursor: pointer; border-radius: 5px; border: 1px solid #ddd;">+ Add Medicine</button>

        <div class="input-box" style="margin-top:15px;"><label>Clinical Notes</label><textarea id="mNotes" rows="2" placeholder="General observations..."></textarea></div>
        
        <div style="margin-top:20px; font-weight:bold; border-top: 1px solid #eee; padding-top:15px;">
            Dr. M. Jayachander, MD
            <div id="lastVisitHint" style="font-weight: normal; font-size: 11px; color: #888; margin-top: 5px;"></div>
        </div>

        <button class="save-btn" style="background:var(--treat); margin-top:20px;" onclick="saveTreat()">SAVE & CLOSE</button>
        <button class="save-btn" style="background:#888; margin-top:10px;" onclick="document.getElementById('mTreat').style.display='none'">CANCEL</button>
    </div>
</div>

<script>
    // NEW DEPLOYMENT URL
    const API = "https://script.google.com/macros/s/AKfycbwrZlnf_YFF9SZ1fsY71bl7iRmzBqwH0w4I7-1o3hnbGB0MOPZnsFl_B6XU759KCQtiIg/exec";
    
    let patients = [], history = [], selOPD = "", selName = "";

    window.onload = () => { 
        document.getElementById('date').valueAsDate = new Date();
        document.getElementById('opd_no').value = "SRR-" + Math.floor(Math.random()*900000 + 100000);
        loadData(); 
    };

    async function loadData() {
        const body = document.getElementById('tbody');
        try {
            const res = await fetch(API);
            if (!res.ok) throw new Error("Connection Error");
            const data = await res.json();
            
            patients = data.patients || [];
            history = data.history || [];
            body.innerHTML = "";

            if (patients.length === 0) {
                body.innerHTML = "<tr><td colspan='6' style='text-align:center;'>No patients found in database.</td></tr>";
                return;
            }

            patients.reverse().forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${(p.date || "").split('T')[0]}</td>
                    <td style="font-weight:bold;">${p.opd}</td>
                    <td>${p.name}</td>
                    <td>${p.age}/${p.sex}</td>
                    <td>${p.vil}</td>
                    <td><button onclick="openTreat('${p.opd}','${p.name}')" style="background:var(--treat); color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer;">TREAT</button></td>`;
                body.appendChild(tr);
            });
        } catch(e) {
            body.innerHTML = `<tr><td colspan='6' style='text-align:center; color:red; padding:20px;'>Database error. Ensure Google Script is set to 'Anyone' access.<br><small>${e.message}</small></td></tr>`;
        }
    }

    function openTreat(opd, name) {
        selOPD = opd; selName = name;
        document.getElementById('mTitle').innerText = "Treating: " + name;
        
        // RECTIFY: Clear all fields to ensure no "Visit History" text remains
        document.getElementById('mComp').value = "";
        document.getElementById('mInv').value = "";
        document.getElementById('mNotes').value = "";
        document.getElementById('dList').innerHTML = "";
        document.getElementById('lastVisitHint').innerText = "";

        // Find only the most recent treatment record
        const record = history.filter(h => h.opd.toString() === opd.toString()).pop();
        
        if (record) {
            document.getElementById('mComp').value = record.comp || "";
            document.getElementById('mInv').value = record.inv || "";
            document.getElementById('mNotes').value = record.note || "";
            document.getElementById('lastVisitHint').innerText = "Loading data from previous visit: " + (record.time || "").split('T')[0];
            
            try {
                const drugs = JSON.parse(record.rx);
                if(Array.isArray(drugs)){
                    drugs.forEach(d => addRow(d.n, d.r, d.d, d.m));
                } else { addRow(); }
            } catch(e) { addRow(); }
        } else {
            addRow(); // Blank row for new patient
        }
        document.getElementById('mTreat').style.display = "block";
    }

    function addRow(n="", r="", d="", m="") {
        const div = document.createElement('div'); div.className = 'drug-row';
        div.innerHTML = `
            <input type="text" placeholder="Medicine" class="dn" value="${n}">
            <input type="text" placeholder="Route" class="dr" value="${r}">
            <input type="text" placeholder="Days" class="dd" value="${d}">
            <input type="text" placeholder="Remarks" class="dm" value="${m}">
            <button onclick="this.parentElement.remove()">✖</button>`;
        document.getElementById('dList').appendChild(div);
    }

    async function saveTreat() {
        let drugs = [];
        document.querySelectorAll('.drug-row').forEach(r => {
            let n = r.querySelector('.dn').value;
            if(n) drugs.push({ n: n, r: r.querySelector('.dr').value, d: r.querySelector('.dd').value, m: r.querySelector('.dm').value });
        });

        const p = { 
            type: "TREATMENT", 
            opd_no: selOPD, 
            name: selName, 
            complaints: document.getElementById('mComp').value, 
            investigations: document.
