<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRR Hospital HMS - Full Data Sync</title>
    <style>
        :root { --primary: #1b5e20; --dark: #263238; --bg: #eceff1; --accent: #c62828; --edit: #2980b9; --treat: #e67e22; --bill: #1a237e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 1400px; background: white; padding: 20px; border-radius: 12px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; }
        .hosp-name { font-size: 24px; color: var(--accent); font-weight: 900; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .input-box { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 11px; color: #555; margin-bottom: 4px; text-transform: uppercase; }
        input, select { padding: 10px; border: 1px solid #bbb; border-radius: 4px; font-size: 13px; }
        .btn-row { display: flex; gap: 10px; margin: 15px 0; }
        .save-btn { flex: 2; background: var(--primary); color: white; border: none; padding: 14px; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .search-area { background: #e8f5e9; padding: 15px; border-radius: 8px; margin: 20px 0; border: 2px dashed var(--primary); }
        #searchInput { width: 100%; padding: 12px; border: 2px solid var(--primary); border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th { background: var(--dark); color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; background: white; }
        .t-btn { border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; color: white !important; font-weight: bold; font-size: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 class="hosp-name">SRI RAJA RAJESHWARI HOSPITAL</h1>
            <p style="font-size:11px; margin:0;">Suraram colony, TS 500055</p>
        </div>
        <div style="border: 2px solid var(--primary); padding: 8px; border-radius: 6px; background: #f1f8e9;">
            <p style="margin:0; font-weight:800; color:var(--primary);">Dr. M. Jayachander</p>
            <p style="margin:0; font-size:11px;">MBBS, MD (General Medicine)</p>
        </div>
    </div>

    <div class="grid">
        <div class="input-box"><label>Date</label><input type="date" id="p_date"></div>
        <div class="input-box"><label>OPD No</label><input type="text" id="p_opd" readonly style="background:#f5f5f5;"></div>
        <div class="input-box"><label>Patient Name</label><input type="text" id="p_name"></div>
        <div class="input-box"><label>Age</label><input type="number" id="p_age"></div>
        <div class="input-box"><label>Sex</label><select id="p_sex"><option>Male</option><option>Female</option></select></div>
        <div class="input-box"><label>Phone</label><input type="text" id="p_phone"></div>
        <div class="input-box"><label>Village</label><input type="text" id="p_village"></div>
        <div class="input-box"><label>BP</label><input type="text" id="p_bp"></div>
        <div class="input-box"><label>Pulse</label><input type="text" id="p_pulse"></div>
        <div class="input-box"><label>SpO2</label><input type="text" id="p_spo2"></div>
        <div class="input-box"><label>Temp</label><input type="text" id="p_temp"></div>
    </div>

    <div class="btn-row">
        <button class="save-btn" id="saveBtn" onclick="submitReg()">SAVE PATIENT RECORD</button>
        <button style="flex:1;" onclick="location.reload()">NEW REGISTRATION</button>
    </div>

    <div class="search-area">
        <input type="text" id="searchInput" placeholder="SEARCH BY NAME, VILLAGE, OR OPD..." onkeyup="filterTable()">
    </div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>OPD No</th>
                    <th>Name</th>
                    <th>Age/Sex</th>
                    <th>Phone/Village</th>
                    <th>Vitals (BP/P/O2)</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbyxAwycLUjAcJVYfhYNRnmfRGLX8Wq6otcAv-LnBz-uEBj50KNghy8anxqKDVhbDeDIFQ/exec";
    let patients = [];
    
    window.onload = () => { 
        document.getElementById('p_date').valueAsDate = new Date();
        document.getElementById('p_opd').value = "SRR-" + Math.floor(Math.random()*900000 + 100000);
        loadData(); 
    };

    async function loadData() {
        const res = await fetch(API + "?nocache=" + Date.now());
        const data = await res.json();
        patients = data.patients || []; 
        renderTable(patients);
    }

    function renderTable(list) {
        const body = document.getElementById('tbody');
        body.innerHTML = "";
        list.slice().reverse().forEach(p => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${p.date}</td>
                <td><b>${p.opd}</b></td>
                <td><b>${p.name}</b></td>
                <td>${p.age || '--'} / ${p.sex || '--'}</td>
                <td>${p.phone || '--'}<br><small>${p.village || '--'}</small></td>
                <td>${p.bp || '--'} / ${p.pulse || '--'} / ${p.spo2 || '--'}</td>
                <td>
                    <button class="t-btn" style="background:var(--edit)" onclick="editPatient('${p.opd}')">Edit</button>
                </td>`;
            body.appendChild(tr);
        });
    }

    function filterTable() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        renderTable(patients.filter(p => 
            p.name.toLowerCase().includes(val) || 
            p.opd.toLowerCase().includes(val) || 
            (p.village && p.village.toLowerCase().includes(val))
        ));
    }

    function editPatient(opd) {
        const p = patients.find(i => i.opd === opd);
        if(!p) return;
        document.getElementById('p_date').value = p.date;
        document.getElementById('p_opd').value = p.opd;
        document.getElementById('p_name').value = p.name;
        document.getElementById('p_age').value = p.age || "";
        document.getElementById('p_sex').value = p.sex || "Male";
        document.getElementById('p_phone').value = p.phone || "";
        document.getElementById('p_village').value = p.village || "";
        document.getElementById('p_bp').value = p.bp || "";
        document.getElementById('p_pulse').value = p.pulse || "";
        document.getElementById('p_spo2').value = p.spo2 || "";
        document.getElementById('p_temp').value = p.temp || "";
        document.getElementById('saveBtn').innerText = "UPDATE RECORD";
        window.scrollTo(0,0);
    }

    async function submitReg() {
        const p = {
            type: "REG",
            date: document.getElementById('p_date').value,
            opd_no: document.getElementById('p_opd').value,
            name: document.getElementById('p_name').value,
            age: document.getElementById('p_age').value,
            sex: document.getElementById('p_sex').value,
            phone: document.getElementById('p_phone').value,
            village: document.getElementById('p_village').value,
            bp: document.getElementById('p_bp').value,
            pulse: document.getElementById('p_pulse').value,
            spo2: document.getElementById('p_spo2').value,
            temp: document.getElementById('p_temp').value
        };
        await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(p) });
        alert("Success! Record sent to Excel.");
        location.reload();
    }
</script>
</body>
</html>
