<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRR Hospital HMS v2.3</title>
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --bg: #f0f4f7; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 1100px; background: white; padding: 20px; border-radius: 12px; margin: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 6px solid var(--primary); }
        .header { text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 11px; margin-bottom: 3px; }
        input, select, textarea { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        .btn { padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-reg { background: var(--primary); color: white; width: 100%; margin-bottom: 20px; }
        .btn-action { padding: 5px 8px; font-size: 11px; margin-right: 3px; color: white; border-radius: 3px; border:none; cursor: pointer; }
        .table-container { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: var(--dark); color: white; padding: 10px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #eee; }
        .modal { display: none; position: fixed; z-index: 100; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.7); }
        .modal-content { background:white; margin: 5% auto; padding: 20px; width: 90%; max-width: 800px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.jpg" alt="Logo" style="width:150px;">
        <h2 style="margin:5px 0;">Sri Raja Rajeshwari Hospital</h2>
    </div>

    <div class="grid">
        <div class="input-group"><label>Date</label><input type="date" id="date"></div>
        <div class="input-group"><label>OPD No</label><input type="text" id="opd_no" readonly style="background:#fffde7"></div>
        <div class="input-group"><label>Name</label><input type="text" id="name"></div>
        <div class="input-group"><label>Age</label><input type="number" id="age"></div>
        <div class="input-group"><label>Sex</label><select id="sex"><option>Male</option><option>Female</option></select></div>
        <div class="input-group"><label>Mobile</label><input type="text" id="phone"></div>
    </div>
    <button class="btn btn-reg" onclick="registerPatient()">SAVE REGISTRATION</button>

    <div class="record-section">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="text" id="searchBar" style="flex-grow:1; padding:8px;" placeholder="Search Patient..." onkeyup="searchTable()">
            <button onclick="fetchRecords()" style="padding:0 10px;">Refresh Data</button>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Date</th><th>OPD No</th><th>Name</th><th>Age/Sex</th><th>Phone</th><th>Actions</th></tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" style="text-align:center;">Fetching Records... Please wait.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="treatModal" class="modal">
    <div class="modal-content">
        <h3 id="mt" style="color:var(--primary);">Treatment</h3>
        <div class="grid">
            <textarea id="comp" placeholder="Complaints"></textarea>
            <textarea id="hist" placeholder="History"></textarea>
            <textarea id="invest" placeholder="Investigations"></textarea>
        </div>
        <button class="btn btn-reg" onclick="saveTreatment()">SAVE CLINICAL DATA</button>
        <button onclick="document.getElementById('treatModal').style.display='none'" style="background:none; border:none; color:red; cursor:pointer; width:100%; margin-top:10px;">Close</button>
    </div>
</div>

<script>
    const G_URL = "https://script.google.com/macros/s/AKfycbxgasf0L15wWic3-g8AY5ltXzaJ8p-6EKR57_PxGyS02DQIVuBmUkEWg3BXOH-VlZsWuw/exec";
    let cur = {};

    window.onload = () => {
        document.getElementById('date').valueAsDate = new Date();
        document.getElementById('opd_no').value = "SRR-" + Math.floor(100000 + Math.random() * 900000);
        fetchRecords();
    };

    async function registerPatient() {
        const d = {
            type: "REGISTRATION",
            date: document.getElementById('date').value,
            opd_no: document.getElementById('opd_no').value,
            name: document.getElementById('name').value,
            age: document.getElementById('age').value,
            sex: document.getElementById('sex').value,
            phone: document.getElementById('phone').value
        };
        await fetch(G_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
        alert("Saved!"); location.reload();
    }

    async function fetchRecords() {
        try {
            const r = await fetch(G_URL);
            const data = await r.json();
            const b = document.getElementById('tableBody');
            b.innerHTML = "";
            data.reverse().forEach(row => {
                const tr = document.createElement('tr');
                // Updated Mapping to match your sheet structure
                const dt = row.date || row.opd_number || '---';
                const opd = row.opd_no || row.name || '---';
                const nm = row.name || row.age || '---';
                const as = (row.age || row.sex) + "/" + (row.sex || row.date);
                const ph = row.phone || row.village || '---';

                tr.innerHTML = `<td>${dt.toString().split('T')[0]}</td><td>${opd}</td><td>${nm}</td><td>${as}</td><td>${ph}</td>
                <td>
                    <button class="btn-action" style="background:#3498db;" onclick="alert('Edit ready')">EDIT</button>
                    <button class="btn-action" style="background:#e67e22;" onclick="openM('${nm}','${opd}')">TREAT</button>
                </td>`;
                b.appendChild(tr);
            });
        } catch(e) { document.getElementById('tableBody').innerHTML = "<tr><td colspan='6'>Error loading data. Try Refresh.</td></tr>"; }
    }

    function openM(n, o) {
        cur = { n, o };
        document.getElementById('mt').innerText = "Treating: " + n;
        document.getElementById('treatModal').style.display = 'block';
    }

    async function saveTreatment() {
        const d = {
            type: "TREATMENT",
            opd_no: cur.o,
            name: cur.n,
            complaints: document.getElementById('comp').value,
            history: document.getElementById('hist').value,
            investigations: document.getElementById('invest').value
        };
        await fetch(G_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
        alert("Treatment Logged!");
        document.getElementById('treatModal').style.display='none';
    }

    function searchTable() {
        let f = document.getElementById("searchBar").value.toUpperCase();
        let r = document.getElementById("tableBody").getElementsByTagName("tr");
        for (let i = 0; i < r.length; i++) {
            r[i].style.display = r[i].innerText.toUpperCase().includes(f) ? "" : "none";
        }
    }
</script>
</body>
</html>
