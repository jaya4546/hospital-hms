<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRR Hospital - Patient Registration</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; margin: 0; padding: 20px; }
        .container { max-width: 800px; background: white; padding: 30px; border-radius: 12px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #27ae60; padding-bottom: 10px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { font-weight: bold; color: #34495e; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .vitals-section { background: #f8fafc; padding: 15px; border-radius: 8px; margin-top: 20px; border-left: 5px solid #3498db; }
        h3 { margin-top: 0; color: #2980b9; font-size: 18px; margin-bottom: 15px; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #219150; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Sri Raja Rajeshwari Hospital</h2>
    
    <div class="grid">
        <div>
            <label>Date</label>
            <input type="date" id="date">
        </div>
        <div>
            <label>OPD Number</label>
            <input type="text" id="opd_no" placeholder="e.g. 101">
        </div>
        <div>
            <label>Patient Name</label>
            <input type="text" id="name" placeholder="Full Name">
        </div>
        <div>
            <label>Age</label>
            <input type="number" id="age">
        </div>
        <div>
            <label>Sex</label>
            <select id="sex">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div>
            <label>Phone Number</label>
            <input type="text" id="phone">
        </div>
        <div>
            <label>Village/Town</label>
            <input type="text" id="village">
        </div>
    </div>

    <div class="vitals-section">
        <h3>Clinical Vitals</h3>
        <div class="grid">
            <div>
                <label>Weight (kg)</label>
                <input type="text" id="weight">
            </div>
            <div>
                <label>BP (mmHg)</label>
                <input type="text" id="bp" placeholder="120/80">
            </div>
            <div>
                <label>Pulse (bpm)</label>
                <input type="text" id="pulse">
            </div>
            <div>
                <label>SpO2 (%)</label>
                <input type="text" id="spo2">
            </div>
            <div>
                <label>Temp (°F)</label>
                <input type="text" id="temp">
            </div>
        </div>
    </div>

    <button id="saveBtn" onclick="registerPatient()">SAVE PATIENT RECORD</button>
</div>

<script>
    // Automatically set today's date
    document.getElementById('date').valueAsDate = new Date();

    async function registerPatient() {
        const btn = document.getElementById('saveBtn');
        const data = {
            date: document.getElementById('date').value,
            opd_no: document.getElementById('opd_no').value,
            name: document.getElementById('name').value,
            age: document.getElementById('age').value,
            sex: document.getElementById('sex').value,
            phone: document.getElementById('phone').value,
            village: document.getElementById('village').value,
            weight: document.getElementById('weight').value,
            bp: document.getElementById('bp').value,
            pulse: document.getElementById('pulse').value,
            spo2: document.getElementById('spo2').value,
            temp: document.getElementById('temp').value
        };

        const googleUrl = "https://script.google.com/macros/s/AKfycbzyomvR_bYHCS0mURzmCbG-kx4XrxXko9I_hjc-DamV-NFg0ECgmuIiKuelF4tw9AMliA/exec";

        if(!data.name || !data.opd_no) {
            alert("Please enter at least Name and OPD Number");
            return;
        }

        btn.innerText = "Saving...";
        btn.disabled = true;

        try {
            await fetch(googleUrl, {
                method: 'POST',
                mode: 'no-cors', 
                body: JSON.stringify(data)
            });
            alert("✅ Patient Record Saved to Google Sheets!");
            location.reload(); 
        } catch (error) {
            alert("Network Error: Check Internet Connection");
            btn.innerText = "SAVE PATIENT RECORD";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
